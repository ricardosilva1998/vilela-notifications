name: Build Atleta Bridge

on:
  push:
    paths:
      - 'bridge/**'
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set version from run number
        working-directory: bridge
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = "1.0.${{ github.run_number }}"
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          Write-Host "Version set to 1.0.${{ github.run_number }}"

      - name: Install Windows SDK via winget
        shell: pwsh
        run: |
          winget install Microsoft.WindowsSDK.10.0.22621 --accept-source-agreements --accept-package-agreements --silent
          Write-Host "Windows SDK installed via winget"
        continue-on-error: true

      - name: Install dependencies with native compilation
        working-directory: bridge
        run: npm install
        env:
          npm_config_msvs_version: '2022'

      - name: Build Windows installer (rebuilds for Electron)
        working-directory: bridge
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: atleta-bridge-installer
          path: bridge/dist/*.exe

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: bridge-v${{ github.run_number }}
          name: Atleta Bridge v1.0.${{ github.run_number }}
          files: bridge/dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
