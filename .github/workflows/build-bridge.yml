name: Build Atleta Bridge

on:
  push:
    paths:
      - 'bridge/**'
    branches:
      - main
      - dev
      - 'feature/**'
  pull_request:
    paths:
      - 'bridge/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set version from run number
        working-directory: bridge
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = "1.0.${{ github.run_number }}"
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          Write-Host "Version set to 1.0.${{ github.run_number }}"

      - name: Install dependencies
        working-directory: bridge
        run: npm install

      - name: Build and publish Windows installer
        working-directory: bridge
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: atleta-bridge-installer
          path: bridge/dist/*.exe
