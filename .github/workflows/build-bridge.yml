name: Build Atleta Bridge

on:
  push:
    paths:
      - 'bridge/**'
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set version from run number
        working-directory: bridge
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = "1.0.${{ github.run_number }}"
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          Write-Host "Version set to 1.0.${{ github.run_number }}"

      - name: Install dependencies (skip native build)
        working-directory: bridge
        run: npm install --ignore-scripts

      - name: Download irsdk-node prebuilt binary
        working-directory: bridge
        shell: pwsh
        run: |
          $irsdkPath = "node_modules/irsdk-node"
          if (Test-Path $irsdkPath) {
            cd $irsdkPath
            npx prebuild-install -r electron -t 28.0.0 --platform win32 --arch x64 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Host "No prebuilt available, irsdk-node will run in stub mode"
            }
          }
        continue-on-error: true

      - name: Build Windows installer
        working-directory: bridge
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: atleta-bridge-installer
          path: bridge/dist/*.exe

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: bridge-v${{ github.run_number }}
          name: Atleta Bridge v1.0.${{ github.run_number }}
          files: bridge/dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
