name: Build Atleta Bridge

on:
  push:
    paths:
      - 'bridge/**'
    branches:
      - main
      - dev
      - 'feature/**'
  pull_request:
    paths:
      - 'bridge/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version from package.json
        working-directory: bridge
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          Write-Host "Building version $($pkg.version)"

      - name: Prepare icon (resize to 512x512 for ICO conversion)
        working-directory: bridge
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $src = [System.Drawing.Image]::FromFile("$PWD\build\icon.png")
          $dst = New-Object System.Drawing.Bitmap(512, 512)
          $g = [System.Drawing.Graphics]::FromImage($dst)
          $g.InterpolationMode = [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic
          $g.DrawImage($src, 0, 0, 512, 512)
          $g.Dispose()
          $dst.Save("$PWD\build\icon.png", [System.Drawing.Imaging.ImageFormat]::Png)
          $dst.Dispose()
          $src.Dispose()
          Write-Host "Icon resized to 512x512"

      - name: Install dependencies
        working-directory: bridge
        run: npm install

      - name: Build and publish Windows installer
        working-directory: bridge
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Add release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./bridge/package.json').version")
          # Get the previous tag
          PREV_TAG=$(gh release list --limit 2 --json tagName -q '.[1].tagName' 2>/dev/null || echo "")
          # Generate notes from commits since last release
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" -- bridge/ | head -20)
          else
            NOTES=$(git log --pretty=format:"- %s" -10 -- bridge/)
          fi
          # Update the release with notes
          if [ -n "$NOTES" ]; then
            gh release edit "v${VERSION}" --notes "$NOTES" || true
          fi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: atleta-bridge-installer
          path: bridge/dist/*.exe
