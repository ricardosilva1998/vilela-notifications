<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Atleta Bridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0c0d14; color: #e8e6f0; padding: 20px; user-select: none; scrollbar-width: none; -ms-overflow-style: none; }
    ::-webkit-scrollbar { display: none; }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #5c5b6e; margin-bottom: 20px; }
    .status-card {
      background: #141520; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
      padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.connected { background: #3ecf8e; box-shadow: 0 0 6px rgba(62,207,142,0.5); }
    .status-dot.disconnected { background: #f04438; }
    .status-dot.waiting { background: #f79009; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .status-text { font-size: 13px; font-weight: 600; }
    .status-detail { font-size: 11px; color: #5c5b6e; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .tab { padding: 8px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #5c5b6e; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
    .tab.active { color: #9146ff; font-weight: 700; border-bottom-color: #9146ff; }
    .tab:hover:not(.active) { color: #8b8a9e; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Overlay card grid */
    .overlay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
    .overlay-card {
      background: #141520; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
      padding: 10px 12px; display: flex; align-items: center; justify-content: space-between;
      transition: border-color 0.2s;
    }
    .overlay-card:hover { border-color: rgba(145,70,255,0.3); }
    .overlay-info { display: flex; align-items: center; gap: 8px; }
    .overlay-icon { font-size: 16px; }
    .overlay-name { font-size: 11px; font-weight: 600; }
    .overlay-actions { display: flex; align-items: center; gap: 4px; }
    .gear-btn { background: none; border: none; color: #5c5b6e; cursor: pointer; font-size: 12px; padding: 2px 4px; }
    .gear-btn:hover { color: #9146ff; }

    h2 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #5c5b6e; margin-bottom: 10px; }
    .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider { position: absolute; inset: 0; background: #1a1b2e; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
    .toggle .slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 2px; bottom: 2px; background: #fff; border-radius: 50%; transition: 0.3s; }
    .toggle input:checked + .slider { background: #9146ff; border-color: #9146ff; }
    .toggle input:checked + .slider:before { transform: translateX(16px); }
    .footer { margin-top: 16px; text-align: center; font-size: 10px; color: #3a3a4e; }
    .footer a { color: #9146ff; text-decoration: none; }

    /* Updates tab */
    .update-banner {
      background: rgba(62,207,142,0.08); border: 1px solid rgba(62,207,142,0.3); border-radius: 8px;
      padding: 12px 14px; margin-bottom: 12px; display: none;
    }
    .update-banner.visible { display: block; }
    .update-banner-header { display: flex; justify-content: space-between; align-items: center; }
    .update-banner-title { font-size: 12px; font-weight: 700; color: #3ecf8e; }
    .update-banner-sub { font-size: 10px; color: #8b8a9e; margin-top: 2px; }
    .update-btn { padding: 7px 14px; border-radius: 6px; border: none; background: #3ecf8e; color: #0c0d14; font-size: 11px; font-weight: 600; cursor: pointer; }
    .update-btn:hover { opacity: 0.9; }
    .update-progress { height: 3px; border-radius: 2px; background: rgba(255,255,255,0.1); margin-top: 8px; overflow: hidden; display: none; }
    .update-progress-bar { height: 100%; background: #3ecf8e; width: 0%; border-radius: 2px; transition: width 0.3s; }
    .version-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .version-label { font-size: 11px; color: #5c5b6e; }
    .version-label strong { color: #e8e6f0; font-weight: 700; }
    .check-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #8b8a9e; font-size: 10px; cursor: pointer; }
    .check-btn:hover { border-color: rgba(255,255,255,0.2); color: #e8e6f0; }
    .release-card {
      background: #141520; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
      padding: 12px 14px; margin-bottom: 8px;
    }
    .release-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .release-version { font-size: 12px; font-weight: 700; }
    .release-date { font-size: 9px; color: #5c5b6e; }
    .release-notes { font-size: 11px; color: #8b8a9e; line-height: 1.5; }
    .release-notes div { margin-bottom: 3px; }
    .release-notes div:last-child { margin-bottom: 0; }
  </style>
</head>
<body>
  <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 4px;">
    <img src="build/icon.png" style="width: 32px; height: 32px; border-radius: 6px;" onerror="this.style.display='none'">
    <div>
      <h1 style="margin: 0;">Atleta Bridge</h1>
      <p class="subtitle" style="margin: 0;" id="version-text">iRacing Overlay Manager</p>
    </div>
  </div>

  <div class="status-card">
    <div class="status-dot waiting" id="status-dot"></div>
    <div>
      <div class="status-text" id="status-text">Waiting for iRacing...</div>
      <div class="status-detail" id="status-detail">Start iRacing to connect</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="overlays" onclick="switchTab('overlays')">Overlays</div>
    <div class="tab" data-tab="updates" onclick="switchTab('updates')">Updates</div>
  </div>

  <!-- Overlays Tab -->
  <div class="tab-content active" id="tab-overlays">
    <div class="overlay-grid" id="overlay-grid"></div>

    <!-- Overlay Customization -->
    <div id="customize-panel" style="display:none; padding:12px; background:#141520; border:1px solid rgba(255,255,255,0.06); border-radius:8px; margin-bottom:12px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 style="margin:0; font-size:12px;">Customize: <span id="customize-title"></span></h2>
        <button onclick="closeCustomize()" style="background:none; border:none; color:#5c5b6e; cursor:pointer; font-size:14px;">&#10005;</button>
      </div>
      <div id="customize-content"></div>
      <button onclick="saveCustomize()" style="width:100%; margin-top:8px; padding:7px; border-radius:6px; border:none; background:#9146ff; color:#fff; font-size:12px; font-weight:600; cursor:pointer;">Save</button>
    </div>

    <div>
      <button id="lock-btn" onclick="toggleLock()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #141520; color: #e8e6f0; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s;">
        &#128275; Unlocked — Drag & Resize Overlays
      </button>
      <p style="font-size: 10px; color: #3a3a4e; text-align: center; margin-top: 6px;">Lock to make overlays click-through while driving</p>
      <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:#8b8a9e;margin-top:10px;cursor:pointer;">
        <input type="checkbox" id="autohide-check" checked onchange="toggleAutoHide(this.checked)" style="accent-color:#9146ff;">
        Auto-hide overlays when iRacing closes
      </label>
    </div>
  </div>

  <!-- Updates Tab -->
  <div class="tab-content" id="tab-updates">
    <!-- Update available banner -->
    <div class="update-banner" id="update-banner">
      <div class="update-banner-header">
        <div>
          <div class="update-banner-title" id="update-banner-title"></div>
          <div class="update-banner-sub" id="update-banner-sub"></div>
        </div>
        <button class="update-btn" id="update-btn" onclick="handleUpdateAction()">Download</button>
      </div>
      <div class="update-progress" id="update-progress">
        <div class="update-progress-bar" id="update-progress-bar"></div>
      </div>
    </div>

    <!-- Version line -->
    <div class="version-line">
      <div class="version-label">Installed: <strong id="installed-version">--</strong></div>
      <button class="check-btn" onclick="checkForUpdate()">Check for Updates</button>
    </div>

    <!-- Release notes -->
    <h2>Release Notes</h2>
    <div id="release-notes-list"></div>
  </div>

  <div class="footer">
    <a href="https://atletanotifications.com" target="_blank">atletanotifications.com</a>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    let locked = false;
    let appVersion = '--';

    // ─── Tabs ──────────────────────────────────────────────────
    function switchTab(tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabId));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tabId));
      localStorage.setItem('bridge_tab', tabId);
    }

    // Restore last active tab
    const savedTab = localStorage.getItem('bridge_tab');
    if (savedTab) switchTab(savedTab);

    // ─── Overlay Grid ──────────────────────────────────────────
    const overlays = [
      { id: 'standings', icon: '&#127937;', name: 'Standings' },
      { id: 'relative', icon: '&#128202;', name: 'Relative' },
      { id: 'fuel', icon: '&#9981;', name: 'Fuel Calculator' },
      { id: 'wind', icon: '&#127788;&#65039;', name: 'Wind' },
      { id: 'proximity', icon: '&#128663;', name: 'Proximity' },
      { id: 'chat', icon: '&#128172;', name: 'Chat' },
      { id: 'trackmap', icon: '&#127758;', name: 'Track Map' },
      { id: 'voicechat', icon: '&#127908;', name: 'Voice Chat' },
    ];

    const grid = document.getElementById('overlay-grid');
    overlays.forEach(ov => {
      const card = document.createElement('div');
      card.className = 'overlay-card';
      card.innerHTML = `
        <div class="overlay-info">
          <span class="overlay-icon">${ov.icon}</span>
          <span class="overlay-name">${ov.name}</span>
        </div>
        <div class="overlay-actions">
          <button class="gear-btn" onclick="openCustomize('${ov.id}','${ov.name}')" title="Settings">&#9881;</button>
          <label class="toggle">
            <input type="checkbox" id="toggle-${ov.id}" onchange="toggleOverlay('${ov.id}', this.checked)">
            <span class="slider"></span>
          </label>
        </div>
      `;
      grid.appendChild(card);
    });

    function toggleOverlay(id, enabled) {
      ipcRenderer.send('toggle-overlay', id, enabled);
    }

    // ─── Overlay Customization ─────────────────────────────────
    let currentCustomizeId = null;

    const CUSTOMIZE_FIELDS = {
      standings: [
        { key: 'maxPerClass', label: 'Max cars per class (0 = all)', type: 'number', default: '0', min: 0, max: 50 },
        { key: 'autoHide', label: 'Auto-hide when iRacing closes', type: 'checkbox', default: true },
      ],
      relative: [
        { key: 'carsAhead', label: 'Cars ahead', type: 'number', default: '5', min: 1, max: 15 },
        { key: 'carsBehind', label: 'Cars behind', type: 'number', default: '5', min: 1, max: 15 },
        { key: 'autoHide', label: 'Auto-hide when iRacing closes', type: 'checkbox', default: true },
      ],
      fuel: [
        { key: 'showAvg5', label: 'Show Avg 5 Laps', type: 'checkbox', default: true },
        { key: 'showAvg10', label: 'Show Avg 10 Laps', type: 'checkbox', default: true },
        { key: 'showMinMax', label: 'Show Min/Max Usage', type: 'checkbox', default: true },
        { key: 'showToFinish', label: 'Show Fuel to Finish', type: 'checkbox', default: true },
        { key: 'showToAdd', label: 'Show Fuel to Add', type: 'checkbox', default: true },
        { key: 'autoHide', label: 'Auto-hide when iRacing closes', type: 'checkbox', default: true },
      ],
      wind: [
        { key: 'autoHide', label: 'Auto-hide when iRacing closes', type: 'checkbox', default: true },
      ],
      proximity: [
        { key: 'autoHide', label: 'Auto-hide when iRacing closes', type: 'checkbox', default: true },
      ],
      chat: [
        { key: 'autoHide', label: 'Auto-hide when iRacing closes', type: 'checkbox', default: true },
      ],
      trackmap: [
        { key: 'autoHide', label: 'Auto-hide when iRacing closes', type: 'checkbox', default: true },
      ],
      voicechat: [
        { key: 'pushToTalk', label: 'Push-to-Talk Key', type: 'hotkey', default: null },
        { key: 'wakeWordEnabled', label: 'Wake word ("message") always listening', type: 'checkbox', default: false },
        { key: 'language', label: 'Speech Language', type: 'select', default: 'en-US', options: [
          { value: 'en-US', label: 'English (US)' },
          { value: 'en-GB', label: 'English (UK)' },
          { value: 'pt-BR', label: 'Portuguese (BR)' },
          { value: 'pt-PT', label: 'Portuguese (PT)' },
          { value: 'es-ES', label: 'Spanish' },
          { value: 'fr-FR', label: 'French' },
          { value: 'de-DE', label: 'German' },
        ]},
        { key: 'autoHide', label: 'Auto-hide when iRacing closes', type: 'checkbox', default: true },
      ],
    };

    function openCustomize(id, name) {
      currentCustomizeId = id;
      document.getElementById('customize-title').textContent = name;
      const content = document.getElementById('customize-content');
      const fields = CUSTOMIZE_FIELDS[id] || [];

      if (fields.length === 0) {
        content.innerHTML = '<p style="font-size:11px;color:#5c5b6e;">No settings available for this overlay.</p>';
      } else {
        const saved = JSON.parse(localStorage.getItem('overlay_' + id) || '{}');
        content.innerHTML = fields.map(f => {
          const val = saved[f.key] !== undefined ? saved[f.key] : f.default;
          if (f.type === 'number') {
            return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <span style="font-size:11px;color:#8b8a9e;">${f.label}</span>
              <input type="number" id="cust-${f.key}" value="${val}" min="${f.min}" max="${f.max}" style="width:60px;padding:4px;background:#0c0d14;border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#e8e6f0;font-size:12px;text-align:center;">
            </div>`;
          } else if (f.type === 'checkbox') {
            return `<label style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px;color:#8b8a9e;cursor:pointer;">
              <input type="checkbox" id="cust-${f.key}" ${val ? 'checked' : ''} style="accent-color:#9146ff;">
              ${f.label}
            </label>`;
          } else if (f.type === 'hotkey') {
            const keyName = val && val.name ? val.name : 'Not set';
            return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <span style="font-size:11px;color:#8b8a9e;">${f.label}</span>
              <button id="cust-${f.key}" onclick="captureHotkey('${f.key}')" style="padding:4px 10px;background:#0c0d14;border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#e8e6f0;font-size:11px;cursor:pointer;min-width:80px;text-align:center;" data-value='${JSON.stringify(val || null)}'>${keyName}</button>
            </div>`;
          } else if (f.type === 'select') {
            return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <span style="font-size:11px;color:#8b8a9e;">${f.label}</span>
              <select id="cust-${f.key}" style="padding:4px;background:#0c0d14;border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#e8e6f0;font-size:11px;">
                ${f.options.map(o => `<option value="${o.value}" ${val === o.value ? 'selected' : ''}>${o.label}</option>`).join('')}
              </select>
            </div>`;
          }
          return '';
        }).join('');
      }

      document.getElementById('customize-panel').style.display = 'block';
    }

    function closeCustomize() {
      document.getElementById('customize-panel').style.display = 'none';
      currentCustomizeId = null;
    }

    function captureHotkey(key) {
      const btn = document.getElementById('cust-' + key);
      btn.textContent = 'Press any key...';
      btn.style.borderColor = '#9146ff';
      ipcRenderer.send('voice-capture-key');
      ipcRenderer.once('voice-key-captured', (event, keyData) => {
        btn.textContent = keyData.name;
        btn.dataset.value = JSON.stringify(keyData);
        btn.style.borderColor = 'rgba(255,255,255,0.1)';
      });
    }

    function saveCustomize() {
      if (!currentCustomizeId) return;
      const fields = CUSTOMIZE_FIELDS[currentCustomizeId] || [];
      const settings = {};
      fields.forEach(f => {
        const el = document.getElementById('cust-' + f.key);
        if (f.type === 'number') settings[f.key] = el.value;
        else if (f.type === 'checkbox') settings[f.key] = el.checked;
        else if (f.type === 'hotkey') {
          try { settings[f.key] = JSON.parse(el.dataset.value); } catch(e) { settings[f.key] = null; }
        }
        else if (f.type === 'select') settings[f.key] = el.value;
      });
      localStorage.setItem('overlay_' + currentCustomizeId, JSON.stringify(settings));
      ipcRenderer.send('save-overlay-settings', currentCustomizeId, settings);
      if (currentCustomizeId === 'voicechat') {
        const voiceUpdate = {};
        if (settings.pushToTalk !== undefined) voiceUpdate.pushToTalkKey = settings.pushToTalk;
        if (settings.wakeWordEnabled !== undefined) voiceUpdate.wakeWordEnabled = settings.wakeWordEnabled;
        if (settings.language !== undefined) voiceUpdate.language = settings.language;
        ipcRenderer.send('voice-settings-update', voiceUpdate);
      }
      closeCustomize();
    }

    // ─── Lock & Auto-hide ──────────────────────────────────────
    function toggleLock() {
      locked = !locked;
      ipcRenderer.send('toggle-lock', locked);
      updateLockBtn();
    }

    function toggleAutoHide(enabled) {
      ipcRenderer.send('toggle-autohide', enabled);
    }

    function updateLockBtn() {
      const btn = document.getElementById('lock-btn');
      if (locked) {
        btn.innerHTML = '&#128274; Locked — Click-Through Mode';
        btn.style.background = 'rgba(145,70,255,0.15)';
        btn.style.borderColor = 'rgba(145,70,255,0.4)';
      } else {
        btn.innerHTML = '&#128275; Unlocked — Drag & Resize Overlays';
        btn.style.background = '#141520';
        btn.style.borderColor = 'rgba(255,255,255,0.1)';
      }
    }

    // ─── Updates Tab ───────────────────────────────────────────
    const RELEASE_NOTES = [
      {
        version: '1.0.42',
        date: 'Apr 4, 2026',
        notes: [
          'Fix standings sort to use iRacing class position',
          'Fix lap data preserved when driver disconnects',
          'Fix track map GPS collection and completion',
        ],
      },
      {
        version: '1.0.41',
        date: 'Apr 4, 2026',
        notes: [
          'Voice chat overlay with speech recognition',
          'Push-to-talk global hotkey support',
          'Keyboard simulator for iRacing chat',
        ],
      },
      {
        version: '1.0.40',
        date: 'Apr 3, 2026',
        notes: [
          'Track map overlay with GPS path recording',
          'Hide control panel scrollbar',
        ],
      },
      {
        version: '1.0.39',
        date: 'Apr 3, 2026',
        notes: [
          'Standings with class grouping and country flags',
          'Relative position display',
          'Fuel calculator overlay',
        ],
      },
    ];

    function renderReleaseNotes() {
      const list = document.getElementById('release-notes-list');
      list.innerHTML = RELEASE_NOTES.map((r, i) => `
        <div class="release-card" ${i >= 3 ? 'style="opacity:0.5;"' : ''}>
          <div class="release-header">
            <span class="release-version">v${r.version}</span>
            <span class="release-date">${r.date}</span>
          </div>
          <div class="release-notes">
            ${r.notes.map(n => `<div>&bull; ${n}</div>`).join('')}
          </div>
        </div>
      `).join('');
    }
    renderReleaseNotes();

    let updateState = 'idle';

    function handleUpdateAction() {
      if (updateState === 'available') {
        updateState = 'downloading';
        document.getElementById('update-btn').style.display = 'none';
        document.getElementById('update-progress').style.display = 'block';
        document.getElementById('update-banner-title').textContent = 'Downloading update...';
        document.getElementById('update-banner-sub').textContent = '';
        ipcRenderer.send('download-update');
      } else if (updateState === 'ready') {
        ipcRenderer.send('install-update');
      }
    }

    function checkForUpdate() {
      ipcRenderer.send('check-for-update');
      const banner = document.getElementById('update-banner');
      banner.classList.add('visible');
      document.getElementById('update-banner-title').textContent = 'Checking for updates...';
      document.getElementById('update-banner-sub').textContent = '';
      document.getElementById('update-btn').style.display = 'none';
    }

    ipcRenderer.on('update-available', (event, version) => {
      updateState = 'available';
      const banner = document.getElementById('update-banner');
      banner.classList.add('visible');
      document.getElementById('update-banner-title').textContent = 'Update Available: v' + version;
      document.getElementById('update-banner-sub').textContent = 'New features and bug fixes';
      document.getElementById('update-btn').textContent = 'Download';
      document.getElementById('update-btn').style.display = 'inline-block';
      document.getElementById('update-progress').style.display = 'none';
    });

    ipcRenderer.on('update-not-available', () => {
      updateState = 'idle';
      const banner = document.getElementById('update-banner');
      banner.classList.add('visible');
      document.getElementById('update-banner-title').textContent = 'You are on the latest version';
      document.getElementById('update-banner-sub').textContent = '';
      document.getElementById('update-btn').style.display = 'none';
      setTimeout(() => { banner.classList.remove('visible'); }, 3000);
    });

    ipcRenderer.on('update-progress', (event, percent) => {
      document.getElementById('update-progress-bar').style.width = percent + '%';
      document.getElementById('update-banner-title').textContent = 'Downloading update... ' + percent + '%';
    });

    ipcRenderer.on('update-downloaded', () => {
      updateState = 'ready';
      document.getElementById('update-progress').style.display = 'none';
      document.getElementById('update-banner-title').textContent = 'Update ready!';
      document.getElementById('update-banner-sub').textContent = 'Click to install and restart';
      document.getElementById('update-btn').textContent = 'Install & Restart';
      document.getElementById('update-btn').style.display = 'inline-block';
    });

    // ─── IPC Listeners ─────────────────────────────────────────
    ipcRenderer.on('iracing-status', (event, status) => {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      const detail = document.getElementById('status-detail');
      if (status.iracing) {
        dot.className = 'status-dot connected';
        text.textContent = 'Connected to iRacing';
        detail.textContent = status.track || 'Session active';
      } else {
        dot.className = 'status-dot waiting';
        text.textContent = 'Waiting for iRacing...';
        detail.textContent = 'Start iRacing to connect';
      }
    });

    ipcRenderer.on('overlay-closed', (event, id) => {
      const toggle = document.getElementById('toggle-' + id);
      if (toggle) toggle.checked = false;
    });

    ipcRenderer.on('overlay-states', (event, states) => {
      Object.entries(states).forEach(([id, enabled]) => {
        const toggle = document.getElementById('toggle-' + id);
        if (toggle) toggle.checked = enabled;
      });
    });

    ipcRenderer.on('lock-state', (event, isLocked) => {
      locked = isLocked;
      updateLockBtn();
    });

    ipcRenderer.on('autohide-state', (event, enabled) => {
      const check = document.getElementById('autohide-check');
      if (check) check.checked = enabled;
    });

    ipcRenderer.send('get-overlay-states');

    // Show version
    try {
      const { app } = require('@electron/remote') || {};
      appVersion = app?.getVersion?.() || require('../package.json').version;
    } catch(e) {
      try {
        appVersion = require('./package.json').version;
      } catch(e2) {
        appVersion = '--';
      }
    }
    document.getElementById('version-text').textContent = 'v' + appVersion;
    document.getElementById('installed-version').textContent = 'v' + appVersion;
  </script>
</body>
</html>
