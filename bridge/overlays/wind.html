<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wind Direction</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: rgba(0,0,0,0.01); overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; color: #e8e6f0; scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; }
    .overlay-panel { background: rgba(12,13,20,0.88); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; backdrop-filter: blur(12px); overflow: hidden; width: 100%; height: 100vh; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); cursor: move; -webkit-app-region: drag; }
    .overlay-body { padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .compass { position: relative; width: 120px; height: 120px; }
    .compass-svg { width: 120px; height: 120px; }
    .wind-info { display: flex; align-items: baseline; gap: 8px; }
    .wind-dir { font-size: 22px; font-weight: 900; color: #9146ff; font-family: 'Consolas', monospace; letter-spacing: 2px; }
    .wind-speed { font-size: 15px; font-weight: 700; font-family: 'Consolas', monospace; color: #e8e6f0; }
    .wind-unit { font-size: 9px; color: rgba(255,255,255,0.4); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #3ecf8e; }
    .status-dot.disconnected { background: #f04438; }
    .status-dot.waiting { background: #f79009; }
    .status-dot.demo { background: #f79009; }
    .overlay-disconnected { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(12,13,20,0.9); color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 600; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="overlay-root" style="position:relative;width:100%;">
    <div class="overlay-panel">
      <div class="overlay-header">
        <span>WIND</span>
        <span id="connection-status"><span class="status-dot demo"></span></span>
      </div>
      <div class="overlay-body">
        <div class="compass">
          <svg class="compass-svg" viewBox="0 0 120 120">
            <defs>
              <linearGradient id="arrowGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#b47aff"/>
                <stop offset="100%" stop-color="#7c3aed"/>
              </linearGradient>
              <filter id="arrowGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            <!-- Outer ring -->
            <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(145,70,255,0.12)" stroke-width="2"/>

            <!-- Tick marks -->
            <line x1="60" y1="8" x2="60" y2="16" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
            <line x1="60" y1="104" x2="60" y2="112" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
            <line x1="8" y1="60" x2="16" y2="60" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
            <line x1="104" y1="60" x2="112" y2="60" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>

            <!-- Cardinal labels -->
            <text x="60" y="26" text-anchor="middle" font-size="10" font-weight="800" fill="#f04438" font-family="Segoe UI,sans-serif">N</text>
            <text x="60" y="106" text-anchor="middle" font-size="10" font-weight="700" fill="rgba(255,255,255,0.25)" font-family="Segoe UI,sans-serif">S</text>
            <text x="106" y="64" text-anchor="middle" font-size="10" font-weight="700" fill="rgba(255,255,255,0.25)" font-family="Segoe UI,sans-serif">E</text>
            <text x="14" y="64" text-anchor="middle" font-size="10" font-weight="700" fill="rgba(255,255,255,0.25)" font-family="Segoe UI,sans-serif">W</text>

            <!-- Wind arrow: points FROM edge TOWARD center (the car) -->
            <g id="wind-arrow-group" transform="rotate(0, 60, 60)" filter="url(#arrowGlow)">
              <!-- Arrow shaft (gap between tip y=48 and center y=60) -->
              <line x1="60" y1="8" x2="60" y2="30" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round"/>
              <!-- Arrowhead — chevron with spacing from center -->
              <polygon points="60,48 48,28 56,32 60,28 64,32 72,28" fill="url(#arrowGrad)"/>
              <!-- Tail fins -->
              <line x1="56" y1="8" x2="60" y2="14" stroke="url(#arrowGrad)" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="64" y1="8" x2="60" y2="14" stroke="url(#arrowGrad)" stroke-width="1.5" stroke-linecap="round"/>
            </g>

            <!-- Center: green car dot -->
            <circle cx="60" cy="60" r="5" fill="rgba(62,207,142,0.25)"/>
            <circle cx="60" cy="60" r="3" fill="#3ecf8e"/>
          </svg>
        </div>
        <div class="wind-info">
          <span class="wind-dir" id="wind-dir">N</span>
          <span class="wind-speed" id="wind-speed">0.0 <span class="wind-unit">m/s</span></span>
        </div>
      </div>
    </div>
    <div class="overlay-disconnected" id="overlay-disconnected"></div>
  </div>
  <script>
    // Load settings
    let _windSettings = {};
    try {
      const fs = require('fs');
      const path = require('path');
      const os = require('os');
      const settingsFile = path.join(os.homedir(), 'Documents', 'Atleta Bridge', 'settings.json');
      if (fs.existsSync(settingsFile)) {
        const all = JSON.parse(fs.readFileSync(settingsFile, 'utf8'));
        _windSettings = (all.overlayCustom && all.overlayCustom.wind) || {};
      }
    } catch(e) {}
    function getWindSetting(k, d) { return _windSettings[k] !== undefined ? _windSettings[k] : d; }
    const speedUnit = getWindSetting('speedUnit', 'kmh');
    const arrowColor = getWindSetting('arrowColor', '#9146ff');
    const compassNColor = getWindSetting('compassNColor', '#f04438');
    const dotColor = getWindSetting('dotColor', '#3ecf8e');

    // Apply color settings to SVG elements
    try {
      const stops = document.querySelectorAll('#arrowGrad stop');
      if (stops[0]) stops[0].setAttribute('stop-color', arrowColor);
      if (stops[1]) stops[1].setAttribute('stop-color', arrowColor);
      const nLabel = document.querySelector('text[fill="#f04438"]');
      if (nLabel) nLabel.setAttribute('fill', compassNColor);
      document.querySelectorAll('circle[fill="#3ecf8e"]').forEach(c => c.setAttribute('fill', dotColor));
      document.querySelectorAll('circle[fill="rgba(62,207,142,0.25)"]').forEach(c => {
        // Build rgba version with 0.25 opacity
        const hex = dotColor.replace('#', '');
        if (hex.length === 6) {
          const r = parseInt(hex.substr(0,2), 16), g = parseInt(hex.substr(2,2), 16), b = parseInt(hex.substr(4,2), 16);
          c.setAttribute('fill', `rgba(${r},${g},${b},0.25)`);
        } else {
          c.setAttribute('fill', dotColor);
        }
      });
    } catch(e) {}

    const BRIDGE_URL = 'ws://localhost:9100';
    let ws = null;
    let bridgeConnected = false;
    let iracingConnected = false;
    const dataHandlers = {};

    function connectBridge(channels) {
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { setTimeout(() => connectBridge(channels), 3000); return; }
      ws.onopen = () => {
        bridgeConnected = true;
        updateConnectionStatus();
        ws.send(JSON.stringify({ type: 'subscribe', channels }));
      };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'bridge-connected') { bridgeConnected = true; updateConnectionStatus(); } else if (msg.type === 'status') {
            iracingConnected = msg.iracing;
            updateConnectionStatus();
          } else if (msg.type === 'data' && dataHandlers[msg.channel]) {
            dataHandlers[msg.channel](msg.data);
          }
        } catch(e) {}
      };
      ws.onclose = () => {
        bridgeConnected = false;
        iracingConnected = false;
        updateConnectionStatus();
        setTimeout(() => connectBridge(channels), 3000);
      };
      ws.onerror = () => { ws.close(); };
    }

    function onData(ch, fn) { dataHandlers[ch] = fn; }

    function updateConnectionStatus() {
      const el = document.getElementById('connection-status');
      const dis = document.getElementById('overlay-disconnected');
      if (!bridgeConnected) {
        if (el) el.innerHTML = '<span class="status-dot demo"></span>';
        if (dis) dis.style.display = 'none';
      } else if (!iracingConnected) {
        if (el) el.innerHTML = '<span class="status-dot waiting"></span>';
        if (dis) { dis.textContent = 'Waiting for iRacing...'; dis.style.display = 'flex'; }
      } else {
        if (el) el.innerHTML = '<span class="status-dot connected"></span>';
        if (dis) dis.style.display = 'none';
      }
    }

    function angleToCompass(deg) {
      const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
      return dirs[Math.round(((deg % 360) + 360) % 360 / 45) % 8];
    }

    onData('wind', data => {
      if (!data) return;
      const { windDirection, windSpeed, carHeading } = data;
      const arrowGroup = document.getElementById('wind-arrow-group');
      const speedEl = document.getElementById('wind-speed');
      const dirEl = document.getElementById('wind-dir');

      if (windDirection !== undefined && arrowGroup) {
        const windDeg = windDirection * 180 / Math.PI;
        const carDeg = (carHeading || 0) * 180 / Math.PI;
        const relativeAngle = ((windDeg - carDeg) + 360) % 360;
        arrowGroup.setAttribute('transform', `rotate(${relativeAngle}, 60, 60)`);
        if (dirEl) dirEl.textContent = angleToCompass(windDeg);
      }
      if (windSpeed !== undefined && speedEl) {
        let displaySpeed = windSpeed;
        let unit = 'km/h';
        if (speedUnit === 'mph') { displaySpeed = windSpeed * 2.23694; unit = 'mph'; }
        else { displaySpeed = windSpeed * 3.6; unit = 'km/h'; }
        speedEl.innerHTML = displaySpeed.toFixed(1) + ' <span class="wind-unit">' + unit + '</span>';
      }
    });

    connectBridge(['wind']);

    try {
      const { ipcRenderer } = require('electron');
      ipcRenderer.on('lock-state', (event, locked) => {
        document.body.style.pointerEvents = locked ? 'none' : 'auto';
        const header = document.querySelector('.overlay-header');
        if (header) header.style.cursor = locked ? 'default' : 'move';
      });

      // Click-through: transparent areas pass clicks through, visible panel captures them
      let _mouseOverPanel = false;
      document.addEventListener('mousemove', (e) => {
        const panel = document.querySelector('.overlay-panel');
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const over = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
        if (over && !_mouseOverPanel) {
          _mouseOverPanel = true;
          ipcRenderer.send('set-ignore-mouse', false);
        } else if (!over && _mouseOverPanel) {
          _mouseOverPanel = false;
          ipcRenderer.send('set-ignore-mouse', true);
        }
      });
      // Fallback: reset when mouse leaves the window entirely
      document.addEventListener('mouseleave', () => {
        if (_mouseOverPanel) {
          _mouseOverPanel = false;
          ipcRenderer.send('set-ignore-mouse', true);
        }
      });
    } catch(e) {}
  </script>
</body>
</html>
