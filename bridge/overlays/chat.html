<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Streaming Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; color: #e8e6f0; }
    .overlay-panel { background: rgba(12,13,20,0.85); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; backdrop-filter: blur(12px); overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); cursor: move; -webkit-app-region: drag; flex-shrink: 0; }
    .overlay-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; gap: 3px; scrollbar-width: none; -ms-overflow-style: none; }
    .overlay-body::-webkit-scrollbar { display: none; }
    .chat-message { font-size: 12px; line-height: 1.4; word-break: break-word; padding: 2px 0; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .chat-badge { height: 14px; vertical-align: middle; margin-right: 2px; }
    .chat-author { font-weight: 700; margin-right: 4px; }
    .chat-text { color: rgba(255,255,255,0.85); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #3ecf8e; }
    .status-dot.waiting { background: #f79009; }
    .status-dot.demo { background: #f79009; }
    .status-dot.error { background: #f04438; }
    .info-box { margin: auto; text-align: center; padding: 20px 16px; }
    .info-icon { font-size: 28px; margin-bottom: 8px; }
    .info-title { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
    .info-text { font-size: 10px; color: rgba(255,255,255,0.35); line-height: 1.5; }
  </style>
</head>
<body>
  <div class="overlay-panel">
    <div class="overlay-header">
      <span>STREAMING CHAT</span>
      <span id="connection-status"><span class="status-dot demo"></span> No Channel</span>
    </div>
    <div class="overlay-body" id="chat-body">
      <div class="info-box" id="setup-info">
        <div class="info-icon">&#128172;</div>
        <div class="info-title">Set your Twitch channel</div>
        <div class="info-text">Click the &#9881; gear icon on the Chat card in the control panel to enter your Twitch channel name.</div>
      </div>
    </div>
  </div>

  <script>
    const MAX_MESSAGES = 50;
    const BRIDGE_URL = 'ws://localhost:9100';
    let ws = null;
    let bridgeConnected = false;

    function connectBridge() {
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { setTimeout(connectBridge, 3000); return; }
      ws.onopen = () => {
        bridgeConnected = true;
        ws.send(JSON.stringify({ type: 'subscribe', channels: ['chat'] }));
      };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'data' && msg.channel === 'chat') {
            handleChatMessage(msg.data);
          } else if (msg.type === 'chat-status') {
            updateStatus(msg.status, msg.channel);
          }
        } catch(e) {}
      };
      ws.onclose = () => {
        bridgeConnected = false;
        updateStatus('disconnected');
        setTimeout(connectBridge, 3000);
      };
      ws.onerror = () => { ws.close(); };
    }

    function updateStatus(status, channel) {
      const el = document.getElementById('connection-status');
      if (!el) return;
      if (status === 'connected') {
        el.innerHTML = '<span class="status-dot connected"></span> ' + (channel || 'Live');
        // Hide setup info once connected
        const info = document.getElementById('setup-info');
        if (info) info.style.display = 'none';
      } else if (status === 'connecting') {
        el.innerHTML = '<span class="status-dot waiting"></span> Connecting...';
      } else if (status === 'no-channel') {
        el.innerHTML = '<span class="status-dot demo"></span> No Channel';
      } else {
        el.innerHTML = '<span class="status-dot error"></span> Disconnected';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function handleChatMessage(data) {
      const body = document.getElementById('chat-body');
      // Remove setup info on first message
      const info = document.getElementById('setup-info');
      if (info) info.remove();

      const msg = document.createElement('div');
      msg.className = 'chat-message';

      const color = data.color || '#' + Math.floor(Math.random() * 0xFFFFFF).toString(16).padStart(6, '0');
      let badges = '';
      if (data.badges) {
        if (data.badges.broadcaster) badges += '<img class="chat-badge" src="https://static-cdn.jtvnbs.com/chat-badges/broadcaster.png" alt="B">';
        if (data.badges.moderator) badges += '<img class="chat-badge" src="https://static-cdn.jtvnbs.com/chat-badges/mod.png" alt="M">';
        if (data.badges.subscriber) badges += '<img class="chat-badge" src="https://static-cdn.jtvnbs.com/chat-badges/subscriber.png" alt="S">';
        if (data.badges.vip) badges += '<img class="chat-badge" src="https://static-cdn.jtvnbs.com/badges/v1/b817aba4-fad8-49e2-b88a-7cc744571c22/1" alt="V">';
      }

      msg.innerHTML = badges +
        '<span class="chat-author" style="color:' + escapeHtml(color) + ';">' + escapeHtml(data.username) + '</span>' +
        '<span class="chat-text">' + escapeHtml(data.message) + '</span>';

      body.appendChild(msg);

      // Limit messages
      while (body.children.length > MAX_MESSAGES) {
        body.removeChild(body.firstChild);
      }

      // Auto-scroll to bottom
      body.scrollTop = body.scrollHeight;
    }

    connectBridge();

    // Lock state support
    try {
      const { ipcRenderer } = require('electron');
      ipcRenderer.on('lock-state', (event, locked) => {
        document.body.style.pointerEvents = locked ? 'none' : 'auto';
        const header = document.querySelector('.overlay-header');
        if (header) header.style.cursor = locked ? 'default' : 'move';
      });
    } catch(e) {}
  </script>
</body>
</html>
