<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Streaming Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; color: #e8e6f0; }
    .overlay-panel { background: rgba(12,13,20,0.85); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; backdrop-filter: blur(12px); overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); cursor: move; -webkit-app-region: drag; flex-shrink: 0; }
    .overlay-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; gap: 3px; scrollbar-width: none; -ms-overflow-style: none; }
    .overlay-body::-webkit-scrollbar { display: none; }
    .chat-message { font-size: 12px; line-height: 1.4; word-break: break-word; padding: 2px 0; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .chat-badge { display: inline-block; width: 16px; height: 16px; vertical-align: middle; margin-right: 2px; border-radius: 2px; }
    .chat-emote { height: 24px; vertical-align: middle; margin: -2px 1px; }
    .chat-author { font-weight: 700; margin-right: 4px; }
    .chat-text { color: rgba(255,255,255,0.85); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #3ecf8e; }
    .status-dot.waiting { background: #f79009; }
    .status-dot.demo { background: #f79009; }
    .status-dot.error { background: #f04438; }
    .info-box { margin: auto; text-align: center; padding: 20px 16px; }
    .info-icon { font-size: 28px; margin-bottom: 8px; }
    .info-title { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
    .info-text { font-size: 10px; color: rgba(255,255,255,0.35); line-height: 1.5; }
  </style>
</head>
<body>
  <div class="overlay-panel">
    <div class="overlay-header">
      <span>STREAMING CHAT</span>
      <span id="connection-status"><span class="status-dot demo"></span> No Channel</span>
    </div>
    <div class="overlay-body" id="chat-body">
      <div class="info-box" id="setup-info">
        <div class="info-icon">&#128172;</div>
        <div class="info-title">Set your Twitch channel</div>
        <div class="info-text">Click the &#9881; gear icon on the Chat card in the control panel to enter your Twitch channel name.</div>
      </div>
    </div>
  </div>

  <script>
    const MAX_MESSAGES = 50;
    const BRIDGE_URL = 'ws://localhost:9100';
    let ws = null;
    let bridgeConnected = false;

    // Load channel name from persisted settings
    const _fs = require('fs');
    const _path = require('path');
    const _os = require('os');
    let savedChannelName = '';
    try {
      const settingsFile = _path.join(_os.homedir(), 'Documents', 'Atleta Bridge', 'settings.json');
      if (_fs.existsSync(settingsFile)) {
        const all = JSON.parse(_fs.readFileSync(settingsFile, 'utf8'));
        savedChannelName = (all.overlayCustom && all.overlayCustom.chat && all.overlayCustom.chat.twitchChannel) || '';
      }
    } catch(e) {}

    // ─── 7TV Emotes ────────────────────────────────────────────
    const emoteMap = new Map(); // name -> url
    let emotesLoaded = false;
    let currentChannelName = '';

    async function load7TVEmotes(twitchUserId) {
      try {
        // Global emotes
        if (!emotesLoaded) {
          const globalRes = await fetch('https://7tv.io/v3/emote-sets/global');
          const globalData = await globalRes.json();
          if (globalData.emotes) {
            globalData.emotes.forEach(e => {
              emoteMap.set(e.name, 'https://cdn.7tv.app/emote/' + e.id + '/1x.webp');
            });
          }
        }

        // Channel emotes via Twitch user ID
        if (twitchUserId) {
          try {
            const res = await fetch('https://7tv.io/v3/users/twitch/' + twitchUserId);
            if (res.ok) {
              const data = await res.json();
              if (data.emote_set && data.emote_set.emotes) {
                data.emote_set.emotes.forEach(e => {
                  emoteMap.set(e.name, 'https://cdn.7tv.app/emote/' + e.id + '/1x.webp');
                });
              }
            }
          } catch(e) {} // Channel may not have 7TV
        }

        console.log('[7TV] Loaded ' + emoteMap.size + ' emotes');
      } catch(e) {
        console.log('[7TV] Failed to load: ' + e.message);
      }
    }

    async function loadBTTVEmotes(twitchUserId) {
      try {
        // Global emotes
        const globalRes = await fetch('https://api.betterttv.net/3/cached/emotes/global');
        if (globalRes.ok) {
          const globalData = await globalRes.json();
          globalData.forEach(e => {
            emoteMap.set(e.code, 'https://cdn.betterttv.net/emote/' + e.id + '/1x');
          });
        }

        // Channel emotes via Twitch user ID
        if (twitchUserId) {
          try {
            const res = await fetch('https://api.betterttv.net/3/cached/users/twitch/' + twitchUserId);
            if (res.ok) {
              const data = await res.json();
              // Channel emotes
              if (data.channelEmotes) {
                data.channelEmotes.forEach(e => {
                  emoteMap.set(e.code, 'https://cdn.betterttv.net/emote/' + e.id + '/1x');
                });
              }
              // Shared emotes (community-added)
              if (data.sharedEmotes) {
                data.sharedEmotes.forEach(e => {
                  emoteMap.set(e.code, 'https://cdn.betterttv.net/emote/' + e.id + '/1x');
                });
              }
            }
          } catch(e) {} // Channel may not have BTTV
        }

        console.log('[BTTV] Total emotes after BTTV: ' + emoteMap.size);
      } catch(e) {
        console.log('[BTTV] Failed to load: ' + e.message);
      }
    }

    async function loadAllEmotes(twitchUserId) {
      if (emotesLoaded) return;
      await Promise.all([
        load7TVEmotes(twitchUserId),
        loadBTTVEmotes(twitchUserId),
      ]);
      emotesLoaded = true;
      console.log('[Emotes] Total loaded: ' + emoteMap.size);
    }

    function replaceEmotes(text) {
      if (!emotesLoaded || emoteMap.size === 0) return escapeHtml(text);
      // Split by spaces, replace matching words with emote images
      return text.split(' ').map(word => {
        const url = emoteMap.get(word);
        if (url) return '<img class="chat-emote" src="' + url + '" alt="' + escapeHtml(word) + '" title="' + escapeHtml(word) + '">';
        return escapeHtml(word);
      }).join(' ');
    }

    // ─── Badge Rendering (inline SVG — no external CDN needed) ─
    const BADGE_SVGS = {
      broadcaster: '<svg class="chat-badge" viewBox="0 0 16 16"><rect width="16" height="16" rx="2" fill="#e91916"/><path d="M4 4l4 3.5L12 4v8L8 8.5 4 12z" fill="#fff"/></svg>',
      moderator: '<svg class="chat-badge" viewBox="0 0 16 16"><rect width="16" height="16" rx="2" fill="#00ad03"/><path d="M8 2L3 6v4l5 4 5-4V6z" fill="#fff"/></svg>',
      vip: '<svg class="chat-badge" viewBox="0 0 16 16"><rect width="16" height="16" rx="2" fill="#e005b9"/><path d="M8 3l2.5 3.5H14L10.5 10 12 14 8 11 4 14l1.5-4L2 6.5h3.5z" fill="#fff"/></svg>',
      subscriber: '<svg class="chat-badge" viewBox="0 0 16 16"><rect width="16" height="16" rx="2" fill="#9146ff"/><path d="M8 3l1.5 3H13l-2.5 2.5L12 13 8 10.5 4 13l1.5-4.5L3 6h3.5z" fill="#fff"/></svg>',
    };

    function renderBadges(badges) {
      if (!badges) return '';
      let html = '';
      if (badges.broadcaster) html += BADGE_SVGS.broadcaster;
      if (badges.moderator) html += BADGE_SVGS.moderator;
      if (badges.vip) html += BADGE_SVGS.vip;
      if (badges.subscriber) html += BADGE_SVGS.subscriber;
      return html;
    }

    // ─── WebSocket Connection ──────────────────────────────────
    function connectBridge() {
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { setTimeout(connectBridge, 3000); return; }
      ws.onopen = () => {
        bridgeConnected = true;
        ws.send(JSON.stringify({ type: 'subscribe', channels: ['chat'] }));
      };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'data' && msg.channel === 'chat') {
            handleChatMessage(msg.data);
          } else if (msg.type === 'chat-status') {
            updateStatus(msg.status, msg.channel);
          }
        } catch(e) {}
      };
      ws.onclose = () => {
        bridgeConnected = false;
        updateStatus('disconnected');
        setTimeout(connectBridge, 3000);
      };
      ws.onerror = () => { ws.close(); };
    }

    function updateStatus(status, channel) {
      const el = document.getElementById('connection-status');
      if (!el) return;
      if (status === 'connected') {
        el.innerHTML = '<span class="status-dot connected"></span> ' + (channel || 'Live');
        const info = document.getElementById('setup-info');
        if (info) info.style.display = 'none';
        // Load 7TV global emotes on connect (channel emotes load from first message's roomId)
        if (!emotesLoaded) loadAllEmotes(null);
      } else if (status === 'connecting') {
        el.innerHTML = '<span class="status-dot waiting"></span> Connecting...';
      } else if (status === 'no-channel') {
        el.innerHTML = '<span class="status-dot demo"></span> No Channel';
      } else {
        el.innerHTML = '<span class="status-dot error"></span> Disconnected';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    let channelEmotesLoaded = false;

    function handleChatMessage(data) {
      const body = document.getElementById('chat-body');
      const info = document.getElementById('setup-info');
      if (info) info.remove();

      // Load channel emotes (7TV + BTTV) using Twitch room ID from first message
      if (!channelEmotesLoaded && data.roomId) {
        channelEmotesLoaded = true;
        loadAllEmotes(data.roomId);
      }

      const msg = document.createElement('div');
      msg.className = 'chat-message';

      const color = data.color || '#' + Math.floor(Math.random() * 0xFFFFFF).toString(16).padStart(6, '0');
      const badgeHtml = renderBadges(data.badges);
      const messageHtml = replaceEmotes(data.message);

      msg.innerHTML = badgeHtml +
        '<span class="chat-author" style="color:' + escapeHtml(color) + ';">' + escapeHtml(data.username) + '</span>' +
        '<span class="chat-text">' + messageHtml + '</span>';

      body.appendChild(msg);

      while (body.children.length > MAX_MESSAGES) {
        body.removeChild(body.firstChild);
      }

      body.scrollTop = body.scrollHeight;
    }

    // Show saved channel name immediately (before bridge connects)
    if (savedChannelName) {
      updateStatus('connecting', savedChannelName);
    }

    connectBridge();

    // Lock state + overlay-settings IPC support
    try {
      const { ipcRenderer } = require('electron');
      ipcRenderer.on('lock-state', (event, locked) => {
        document.body.style.pointerEvents = locked ? 'none' : 'auto';
        const header = document.querySelector('.overlay-header');
        if (header) header.style.cursor = locked ? 'default' : 'move';
      });
      ipcRenderer.on('overlay-settings', (event, id, settings) => {
        if (id === 'chat' && settings && settings.twitchChannel) {
          updateStatus('connected', settings.twitchChannel);
        }
      });
      ipcRenderer.send('get-overlay-settings', 'chat');

      // Click-through: transparent areas pass clicks through, visible panel captures them
      let _mouseOverPanel = false;
      document.addEventListener('mousemove', (e) => {
        const panel = document.querySelector('.overlay-panel');
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const over = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
        if (over && !_mouseOverPanel) {
          _mouseOverPanel = true;
          ipcRenderer.send('set-ignore-mouse', false);
        } else if (!over && _mouseOverPanel) {
          _mouseOverPanel = false;
          ipcRenderer.send('set-ignore-mouse', true);
        }
      });
      // Fallback: reset when mouse leaves the window entirely
      document.addEventListener('mouseleave', () => {
        if (_mouseOverPanel) {
          _mouseOverPanel = false;
          ipcRenderer.send('set-ignore-mouse', true);
        }
      });
    } catch(e) {}
  </script>
</body>
</html>
