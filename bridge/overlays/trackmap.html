<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: rgba(0,0,0,0.01); overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #e8e6f0; scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; }
    .overlay-panel { background: rgba(12,13,20,0.85); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; backdrop-filter: blur(12px); overflow: hidden; display: flex; flex-direction: column; aspect-ratio: 1; max-width: 100%; max-height: 100%; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); cursor: move; -webkit-app-region: drag; flex-shrink: 0; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #3ecf8e; }
    .status-dot.waiting { background: #f79009; }
    .status-dot.demo { background: #f79009; }
    .map-container { flex: 1; position: relative; }
    canvas { width: 100%; height: 100%; }
    .map-legend { position: absolute; bottom: 4px; right: 8px; font-size: 8px; color: rgba(255,255,255,0.3); }
    .overlay-disconnected { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(12,13,20,0.9); color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 600; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="overlay-panel">
    <div class="overlay-header">
      <span>TRACK MAP</span>
      <span id="connection-status"><span class="status-dot demo"></span> Demo</span>
    </div>
    <div class="map-container">
      <canvas id="track-canvas"></canvas>
      <div class="map-legend" id="map-legend">Waiting for track data...</div>
    </div>
    <div class="overlay-disconnected" id="overlay-disconnected"></div>
  </div>

  <script>
    // Load settings
    let _overlaySettings = {};
    try {
      const fs = require('fs');
      const path = require('path');
      const os = require('os');
      const settingsFile = path.join(os.homedir(), 'Documents', 'Atleta Bridge', 'settings.json');
      if (fs.existsSync(settingsFile)) {
        const all = JSON.parse(fs.readFileSync(settingsFile, 'utf8'));
        _overlaySettings = (all.overlayCustom && all.overlayCustom.trackmap) || {};
      }
    } catch(e) {}
    function getSetting(k, d) { return _overlaySettings[k] !== undefined ? _overlaySettings[k] : d; }

    const trackColor = getSetting('trackColor', 'rgba(255,255,255,0.15)');
    const playerColor = getSetting('playerColor', '#9146ff');
    const focusColor = getSetting('focusColor', '#3ecf8e');

    const BRIDGE_URL = 'ws://localhost:9100';
    let ws = null;
    let bridgeConnected = false;
    let iracingConnected = false;
    const dataHandlers = {};

    function connectBridge(channels) {
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { setTimeout(() => connectBridge(channels), 3000); return; }
      ws.onopen = () => { bridgeConnected = true; updateConnectionStatus(); ws.send(JSON.stringify({ type: 'subscribe', channels })); };
      ws.onmessage = (event) => { try { const msg = JSON.parse(event.data); if (msg.type === 'bridge-connected') { bridgeConnected = true; updateConnectionStatus(); } else if (msg.type === 'status') { iracingConnected = msg.iracing; updateConnectionStatus(); } else if (msg.type === 'data' && dataHandlers[msg.channel]) { dataHandlers[msg.channel](msg.data); } } catch(e) {} };
      ws.onclose = () => { bridgeConnected = false; iracingConnected = false; updateConnectionStatus(); setTimeout(() => connectBridge(channels), 3000); };
      ws.onerror = () => { ws.close(); };
    }
    function onData(ch, fn) { dataHandlers[ch] = fn; }
    function updateConnectionStatus() {
      const el = document.getElementById('connection-status');
      if (!bridgeConnected) { if (el) el.innerHTML = '<span class="status-dot demo"></span> Demo'; }
      else if (!iracingConnected) { if (el) el.innerHTML = '<span class="status-dot waiting"></span> Waiting'; }
      else { if (el) el.innerHTML = '<span class="status-dot connected"></span> Live'; }
    }

    // Canvas setup
    const canvas = document.getElementById('track-canvas');
    const ctx = canvas.getContext('2d');
    let trackPoints = [];
    let targetCars = [];
    let displayCars = [];
    let windDir = 0;
    let windSpeed = 0;

    function resizeCanvas() {
      const container = canvas.parentElement;
      const size = Math.min(container.clientWidth, container.clientHeight);
      canvas.width = size;
      canvas.height = size;
    }
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 100);

    // Placeholder circle when no track data
    function generateCirclePath() {
      const points = [];
      for (let i = 0; i <= 100; i++) {
        const angle = (i / 100) * Math.PI * 2 - Math.PI / 2;
        points.push({ x: 0.5 + 0.4 * Math.cos(angle), y: 0.5 + 0.4 * Math.sin(angle), pct: i / 100 });
      }
      return points;
    }

    // Normalize raw path to 0-1 square, preserving track aspect ratio
    function normalizeTrackPath(rawPath) {
      if (!rawPath || rawPath.length < 10) return generateCirclePath();

      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      rawPath.forEach(p => {
        if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
      });
      const xRange = maxX - minX || 1;
      const yRange = maxY - minY || 1;
      const pad = 0.06;

      const aspect = xRange / yRange;
      let sx = 1, sy = 1;
      if (aspect > 1) sy = 1 / aspect; else sx = aspect;

      const u = 1 - 2 * pad;
      return rawPath.map(p => ({
        x: pad + u * sx * (p.x - minX) / xRange + u * (1 - sx) / 2,
        y: pad + u * sy * (1 - (p.y - minY) / yRange) + u * (1 - sy) / 2,
        pct: p.pct,
      }));
    }

    function getTrackPosition(pct) {
      if (!trackPoints.length) return { x: 0.5, y: 0.5 };
      let bestIdx = 0;
      let minDist = Math.abs(pct - trackPoints[0].pct);
      for (let i = 1; i < trackPoints.length; i++) {
        const d = Math.abs(pct - trackPoints[i].pct);
        if (d < minDist) { minDist = d; bestIdx = i; }
      }
      const p1 = trackPoints[bestIdx];
      let p2, t;
      if (pct >= p1.pct && bestIdx < trackPoints.length - 1) {
        p2 = trackPoints[bestIdx + 1];
        const range = p2.pct - p1.pct;
        t = range > 0 ? (pct - p1.pct) / range : 0;
      } else if (pct < p1.pct && bestIdx > 0) {
        p2 = trackPoints[bestIdx - 1];
        const range = p1.pct - p2.pct;
        t = range > 0 ? (p1.pct - pct) / range : 0;
        const tmp = p1;
        return { x: p2.x + (tmp.x - p2.x) * (1 - t), y: p2.y + (tmp.y - p2.y) * (1 - t) };
      } else {
        return { x: p1.x, y: p1.y };
      }
      return { x: p1.x + (p2.x - p1.x) * t, y: p1.y + (p2.y - p1.y) * t };
    }

    function updateDisplayCars() {
      const lerpSpeed = 0.15;
      const targetMap = new Map();
      targetCars.forEach(c => targetMap.set(c.carIdx, c));
      const activeIdxs = new Set();
      displayCars = displayCars.filter(dc => targetMap.has(dc.carIdx));
      displayCars.forEach(dc => {
        const target = targetMap.get(dc.carIdx);
        if (!target) return;
        activeIdxs.add(dc.carIdx);
        let diff = target.pct - dc.pct;
        if (diff > 0.5) diff -= 1;
        if (diff < -0.5) diff += 1;
        dc.pct += diff * lerpSpeed;
        if (dc.pct < 0) dc.pct += 1;
        if (dc.pct >= 1) dc.pct -= 1;
        dc.carNumber = target.carNumber;
        dc.carClassColor = target.carClassColor;
        dc.isPlayer = target.isPlayer;
        dc.inPit = target.inPit;
      });
      targetCars.forEach(c => {
        if (!activeIdxs.has(c.carIdx)) displayCars.push({ ...c });
      });
    }

    function draw() {
      if (!ctx) return;
      const s = canvas.width;
      if (s === 0) return;
      ctx.clearRect(0, 0, s, s);
      if (!trackPoints.length) return;

      // Draw track outline — coords are 0-1, multiply by s
      ctx.beginPath();
      ctx.strokeStyle = trackColor;
      ctx.lineWidth = 3;
      trackPoints.forEach((p, i) => {
        const x = p.x * s, y = p.y * s;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.stroke();

      // Draw wind chevron arrow at edge of square
      if (windSpeed > 0) {
        const cx = s / 2, cy = s / 2;
        const edgeDist = s * 0.47;
        const sinW = Math.sin(windDir), cosW = Math.cos(windDir);
        const arrowX = cx + sinW * (edgeDist - 18);
        const arrowY = cy - cosW * (edgeDist - 18);

        ctx.save();
        ctx.translate(arrowX, arrowY);
        ctx.rotate(windDir);

        const grad = ctx.createLinearGradient(0, -18, 0, 18);
        grad.addColorStop(0, '#b47aff');
        grad.addColorStop(1, '#7c3aed');

        // Shaft
        ctx.strokeStyle = grad;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.lineTo(0, 4);
        ctx.stroke();

        // Chevron arrowhead
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(0, 16);
        ctx.lineTo(-9, -2);
        ctx.lineTo(-3, 2);
        ctx.lineTo(0, -2);
        ctx.lineTo(3, 2);
        ctx.lineTo(9, -2);
        ctx.closePath();
        ctx.fill();

        // Tail fins
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(-4, -18);
        ctx.lineTo(0, -12);
        ctx.moveTo(4, -18);
        ctx.lineTo(0, -12);
        ctx.stroke();

        // Glow
        ctx.shadowColor = '#9146ff';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.moveTo(0, -16);
        ctx.lineTo(0, 6);
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.restore();
      }

      // Draw cars
      updateDisplayCars();
      displayCars.forEach(car => {
        const pos = getTrackPosition(car.pct);
        const x = pos.x * s, y = pos.y * s;
        const isFocused = car.isSpectated && !car.isPlayer;
        const radius = car.isPlayer ? 6 : (isFocused ? 7 : 4);
        const color = car.isPlayer ? playerColor : (isFocused ? focusColor : (car.carClassColor || '#fff'));

        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = car.inPit ? 'rgba(128,128,128,0.5)' : color;
        ctx.fill();

        if (car.isPlayer || isFocused) {
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '8px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText(car.carNumber, x, y - radius - 3);
      });
    }

    function animate() { draw(); requestAnimationFrame(animate); }
    requestAnimationFrame(animate);

    onData('trackmap', (data) => {
      if (data.trackPath && data.trackPath.length > 0) {
        trackPoints = normalizeTrackPath(data.trackPath);
        const status = data.trackPathReady ? (trackPoints.length + ' pts') : ('Mapping... ' + trackPoints.length + ' pts');
        document.getElementById('map-legend').textContent = status;
      } else if (trackPoints.length === 0) {
        trackPoints = generateCirclePath();
        document.getElementById('map-legend').textContent = 'Mapping track...';
      }
      targetCars = data.cars || [];
    });

    onData('wind', data => {
      if (!data) return;
      windDir = data.windDirection || 0;
      windSpeed = data.windSpeed || 0;
    });

    // Demo data
    trackPoints = generateCirclePath();
    targetCars = [
      { carIdx: 0, pct: 0.1, carNumber: '1', isPlayer: false, carClassColor: '#ff4444' },
      { carIdx: 1, pct: 0.25, carNumber: '44', isPlayer: false, carClassColor: '#00aa00' },
      { carIdx: 2, pct: 0.4, carNumber: '99', isPlayer: true, carClassColor: '#9146ff' },
      { carIdx: 3, pct: 0.6, carNumber: '55', isPlayer: false, carClassColor: '#0077cc' },
      { carIdx: 4, pct: 0.8, carNumber: '4', isPlayer: false, carClassColor: '#f7c948' },
    ];
    displayCars = targetCars.map(c => ({ ...c }));

    connectBridge(['trackmap', 'wind']);

    // Lock state + click-through support
    try {
      const { ipcRenderer } = require('electron');
      ipcRenderer.on('lock-state', (event, locked) => {
        document.body.style.pointerEvents = locked ? 'none' : 'auto';
        const header = document.querySelector('.overlay-header');
        if (header) header.style.cursor = locked ? 'default' : 'move';
      });

      let _mouseOverPanel = false;
      document.addEventListener('mousemove', (e) => {
        const panel = document.querySelector('.overlay-panel');
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const over = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
        if (over && !_mouseOverPanel) {
          _mouseOverPanel = true;
          ipcRenderer.send('set-ignore-mouse', false);
        } else if (!over && _mouseOverPanel) {
          _mouseOverPanel = false;
          ipcRenderer.send('set-ignore-mouse', true);
        }
      });
      // Fallback: reset when mouse leaves the window entirely
      document.addEventListener('mouseleave', () => {
        if (_mouseOverPanel) {
          _mouseOverPanel = false;
          ipcRenderer.send('set-ignore-mouse', true);
        }
      });
    } catch(e) {}
  </script>
</body>
</html>
