<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lap Compare</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; color: #e8e6f0; }
    .overlay-panel { background: rgba(12,13,20,0.88); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; backdrop-filter: blur(12px); overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #3ecf8e; }
    .status-dot.waiting { background: #f79009; }
    .status-dot.demo { background: #f79009; }

    .toggle-group { display: flex; gap: 2px; }
    .toggle-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.45); font-size: 8px; font-weight: 700; padding: 2px 8px; cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase; border-radius: 3px; transition: all 0.15s; }
    .toggle-btn:hover { background: rgba(255,255,255,0.1); }
    .toggle-btn.active { background: rgba(145,70,255,0.3); border-color: #9146ff; color: #c9a8ff; }

    .chart-body { flex: 1; position: relative; min-height: 0; }
    .chart-body canvas { display: block; width: 100%; height: 100%; }

    .no-data { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 11px; color: rgba(255,255,255,0.3); font-style: italic; text-align: center; pointer-events: none; }

    .driver-labels { display: flex; justify-content: space-between; padding: 2px 10px 4px; font-size: 8px; font-weight: 600; letter-spacing: 0.5px; flex-shrink: 0; }
    .driver-label-focus { color: #3ecf8e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 45%; }
    .driver-label-compare { color: #f04438; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 45%; text-align: right; }

    .tab-bar { display: flex; gap: 2px; padding: 3px 10px; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .tab-btn { background: transparent; border: none; color: rgba(255,255,255,0.35); font-size: 8px; font-weight: 700; padding: 3px 10px; cursor: pointer; letter-spacing: 0.8px; text-transform: uppercase; border-radius: 3px; transition: all 0.15s; }
    .tab-btn:hover { color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.05); }
    .tab-btn.active { color: #c9a8ff; background: rgba(145,70,255,0.2); }

    .laps-view { flex: 1; overflow-y: auto; padding: 4px 6px; min-height: 0; }
    .laps-table { width: 100%; border-collapse: collapse; font-family: 'Consolas', 'Courier New', monospace; font-size: 10px; }
    .laps-table thead th { color: rgba(255,255,255,0.4); font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; padding: 3px 6px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .laps-table thead th:first-child { text-align: left; }
    .laps-table tbody td { padding: 4px 6px; text-align: center; color: rgba(255,255,255,0.75); border-bottom: 1px solid rgba(255,255,255,0.04); }
    .laps-table tbody td:first-child { text-align: left; }
    .laps-table tbody tr:nth-child(odd) { background: rgba(255,255,255,0.02); }
    .laps-table tbody tr:last-child td { border-bottom: none; }
    .laps-no-data { text-align: center; color: rgba(255,255,255,0.3); font-size: 11px; font-style: italic; padding: 20px 0; }
  </style>
</head>
<body>
  <div class="overlay-panel">
    <div class="overlay-header">
      <div class="header-left">
        <span id="connection-status"><span class="status-dot demo"></span></span>
        <span>LAP COMPARE</span>
      </div>
      <div class="toggle-group">
        <div class="toggle-btn active" id="btn-ahead" onclick="setMode('ahead')">AHEAD</div>
        <div class="toggle-btn" id="btn-behind" onclick="setMode('behind')">BEHIND</div>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab-btn active" id="tab-chart" onclick="setView('chart')">Chart</div>
      <div class="tab-btn" id="tab-gap" onclick="setView('gap')">Gap</div>
      <div class="tab-btn" id="tab-battle" onclick="setView('battle')">Battle</div>
      <div class="tab-btn" id="tab-laps" onclick="setView('laps')">Laps</div>
    </div>
    <div class="chart-body" id="chart-view">
      <canvas id="gap-canvas"></canvas>
      <div class="no-data" id="no-data">No lap data yet</div>
    </div>
    <div class="chart-body" id="gap-view" style="display:none">
      <canvas id="gap-per-lap-canvas"></canvas>
      <div class="no-data" id="gap-no-data">No lap data yet</div>
    </div>
    <div class="chart-body" id="battle-view" style="display:none">
      <canvas id="battle-canvas"></canvas>
      <div class="no-data" id="battle-no-data">Need 3+ laps to predict</div>
    </div>
    <div class="laps-view" id="laps-view" style="display:none">
      <table class="laps-table">
        <thead>
          <tr>
            <th>Lap</th>
            <th id="laps-focus-name">Focus</th>
            <th id="laps-compare-name">Compare</th>
            <th>Delta</th>
          </tr>
        </thead>
        <tbody id="laps-tbody"></tbody>
      </table>
      <div class="laps-no-data" id="laps-no-data">No lap data yet</div>
    </div>
    <div class="driver-labels">
      <div class="driver-label-focus" id="label-focus"></div>
      <div class="driver-label-compare" id="label-compare"></div>
    </div>
  </div>

  <script>
    const _fs = require('fs');
    const _logPath = require('path').join(require('os').homedir(), 'atleta-bridge.log');
    function log(msg) {
      const line = '[' + new Date().toISOString() + '] ' + msg + '\n';
      console.log(msg);
      try { _fs.appendFileSync(_logPath, line); } catch(e) {}
    }

    const BRIDGE_URL = 'ws://localhost:9100';
    let ws = null;
    let bridgeConnected = false;
    let iracingConnected = false;
    const dataHandlers = {};

    function connectBridge(channels) {
      log('[LapCompare] Connecting to ' + BRIDGE_URL);
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { log('[LapCompare] WS error: ' + e.message); setTimeout(() => connectBridge(channels), 3000); return; }
      ws.onopen = () => { log('[LapCompare] Connected'); bridgeConnected = true; updateStatus(); ws.send(JSON.stringify({ type: 'subscribe', channels })); };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'bridge-connected') { log('[LapCompare] Bridge confirmed'); bridgeConnected = true; updateStatus(); }
          else if (msg.type === 'status') { log('[LapCompare] iRacing: ' + msg.iracing); iracingConnected = msg.iracing; updateStatus(); }
          else if (msg.type === 'data' && dataHandlers[msg.channel]) { dataHandlers[msg.channel](msg.data); }
        } catch(e) {}
      };
      ws.onclose = () => { log('[LapCompare] Disconnected'); bridgeConnected = false; iracingConnected = false; updateStatus(); setTimeout(() => connectBridge(channels), 3000); };
      ws.onerror = () => { log('[LapCompare] WS error'); ws.close(); };
    }
    function onData(ch, fn) { dataHandlers[ch] = fn; }
    function updateStatus() {
      const el = document.getElementById('connection-status');
      if (!bridgeConnected) { if (el) el.innerHTML = '<span class="status-dot demo"></span>'; }
      else if (!iracingConnected) { if (el) el.innerHTML = '<span class="status-dot waiting"></span>'; }
      else { if (el) el.innerHTML = '<span class="status-dot connected"></span>'; }
    }

    // ─── State ───
    const driverLapHistory = {}; // carIdx -> { laps: [lapTime1, ...], lastLapCount: 0 }
    let compareMode = 'ahead';
    let viewMode = 'chart';
    let lastFocusIdx = null;
    let lastCompareIdx = null;
    let lastFocusName = '';
    let lastCompareName = '';
    let currentLiveGap = null; // real-time gap from estTime (positive = focus behind, negative = focus ahead)
    let drawScheduled = false;

    function setMode(mode) {
      compareMode = mode;
      document.getElementById('btn-ahead').classList.toggle('active', mode === 'ahead');
      document.getElementById('btn-behind').classList.toggle('active', mode === 'behind');
      scheduleDraw();
    }

    function setView(mode) {
      viewMode = mode;
      document.getElementById('chart-view').style.display = mode === 'chart' ? '' : 'none';
      document.getElementById('gap-view').style.display = mode === 'gap' ? '' : 'none';
      document.getElementById('battle-view').style.display = mode === 'battle' ? '' : 'none';
      document.getElementById('laps-view').style.display = mode === 'laps' ? '' : 'none';
      document.getElementById('tab-chart').classList.toggle('active', mode === 'chart');
      document.getElementById('tab-gap').classList.toggle('active', mode === 'gap');
      document.getElementById('tab-battle').classList.toggle('active', mode === 'battle');
      document.getElementById('tab-laps').classList.toggle('active', mode === 'laps');
      scheduleDraw();
    }

    function formatLapTime(t) {
      if (t == null || t <= 0) return '--';
      const mins = Math.floor(t / 60);
      const secs = t - mins * 60;
      if (mins > 0) return mins + ':' + secs.toFixed(3).padStart(6, '0');
      return secs.toFixed(3);
    }

    function drawGapPerLapChart() {
      const canvas = document.getElementById('gap-per-lap-canvas');
      const noDataEl = document.getElementById('gap-no-data');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const W = canvas.parentElement.clientWidth || 340;
      const H = canvas.parentElement.clientHeight || 180;
      canvas.width = W; canvas.height = H;

      const focusLaps = (driverLapHistory[lastFocusIdx] || {}).laps || [];
      const compareLaps = (driverLapHistory[lastCompareIdx] || {}).laps || [];
      const minLen = Math.min(focusLaps.length, compareLaps.length);

      if (minLen < 1) {
        ctx.clearRect(0, 0, W, H);
        noDataEl.style.display = '';
        return;
      }
      noDataEl.style.display = 'none';

      // Per-lap gap delta: negative = focus faster, positive = focus slower
      const deltas = [];
      for (let i = 0; i < minLen; i++) {
        deltas.push(focusLaps[i] - compareLaps[i]);
      }

      const padLeft = 32, padRight = 12, padTop = 12, padBottom = 20;
      const chartW = W - padLeft - padRight;
      const chartH = H - padTop - padBottom;
      if (chartW <= 0 || chartH <= 0) return;

      let minVal = Math.min(0, ...deltas);
      let maxVal = Math.max(0, ...deltas);
      const range = maxVal - minVal;
      const yPad = range > 0 ? range * 0.2 : 0.5;
      minVal -= yPad; maxVal += yPad;

      function yPos(v) { return padTop + (1 - (v - minVal) / (maxVal - minVal)) * chartH; }
      const barW = Math.max(4, (chartW / deltas.length) - 2);
      const zeroY = yPos(0);

      ctx.clearRect(0, 0, W, H);

      // Grid — max 4 lines, wider spacing
      ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
      ctx.font = '7px Segoe UI'; ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      const niceSteps = [0.2, 0.5, 1, 2, 5, 10, 20];
      let gridStep = 1;
      for (const s of niceSteps) { if ((maxVal - minVal) / s <= 4) { gridStep = s; break; } }
      for (let v = Math.ceil(minVal / gridStep) * gridStep; v <= maxVal; v += gridStep) {
        const y = yPos(v);
        ctx.beginPath(); ctx.moveTo(padLeft, y); ctx.lineTo(W - padRight, y); ctx.stroke();
        const label = Math.abs(v) < 0.01 ? '0' : (v > 0 ? '+' : '') + (gridStep < 1 ? v.toFixed(1) : Math.round(v));
        ctx.fillText(label, padLeft - 3, y);
      }

      // Zero line
      ctx.save(); ctx.setLineDash([4, 3]); ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(padLeft, zeroY); ctx.lineTo(W - padRight, zeroY); ctx.stroke(); ctx.restore();

      // Bars
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      deltas.forEach((d, i) => {
        const x = padLeft + (i / deltas.length) * chartW + 1;
        const barTop = d >= 0 ? yPos(d) : zeroY;
        const barHeight = Math.abs(yPos(d) - zeroY);
        ctx.fillStyle = d <= 0 ? 'rgba(62,207,142,0.7)' : 'rgba(240,68,56,0.7)';
        ctx.fillRect(x, barTop, barW, Math.max(1, barHeight));
        // X labels
        ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '8px Segoe UI';
        if (deltas.length <= 15 || i % Math.ceil(deltas.length / 10) === 0) {
          ctx.fillText('L' + (i + 1), x + barW / 2, H - padBottom + 4);
        }
      });

      // Current gap value
      const lastDelta = deltas[deltas.length - 1];
      ctx.font = 'bold 10px Segoe UI';
      ctx.fillStyle = lastDelta <= 0 ? '#3ecf8e' : '#f04438';
      ctx.textAlign = 'right'; ctx.textBaseline = 'top';
      ctx.fillText((lastDelta >= 0 ? '+' : '') + lastDelta.toFixed(3) + 's', W - padRight, padTop);
    }

    function drawBattleChart() {
      const canvas = document.getElementById('battle-canvas');
      const noDataEl = document.getElementById('battle-no-data');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const W = canvas.parentElement.clientWidth || 340;
      const H = canvas.parentElement.clientHeight || 180;
      canvas.width = W; canvas.height = H;

      const focusLaps = (driverLapHistory[lastFocusIdx] || {}).laps || [];
      const compareLaps = (driverLapHistory[lastCompareIdx] || {}).laps || [];
      const minLen = Math.min(focusLaps.length, compareLaps.length);

      if (minLen < 3) {
        ctx.clearRect(0, 0, W, H);
        noDataEl.style.display = '';
        noDataEl.textContent = 'Need 3+ laps to predict';
        return;
      }
      noDataEl.style.display = 'none';

      // Calculate cumulative gaps (negative = focus faster, positive = focus slower)
      const cumulativeGaps = [];
      let cumGap = 0;
      for (let i = 0; i < minLen; i++) {
        cumGap += focusLaps[i] - compareLaps[i];
        cumulativeGaps.push(cumGap);
      }

      // Pace delta: average of last 3 laps (negative = focus faster per lap)
      const recentCount = Math.min(3, minLen);
      let paceDelta = 0;
      for (let i = minLen - recentCount; i < minLen; i++) {
        paceDelta += focusLaps[i] - compareLaps[i];
      }
      paceDelta /= recentCount;

      // Current gap (from standings data — use gapToLeader difference or cumulative)
      const currentGap = cumulativeGaps[cumulativeGaps.length - 1];

      // Project future laps
      const projectedLaps = 15; // project 15 laps ahead
      const allGaps = [...cumulativeGaps];
      for (let i = 0; i < projectedLaps; i++) {
        allGaps.push(allGaps[allGaps.length - 1] + paceDelta);
      }

      // Find crossing point (where gap changes sign = overtake)
      let overtakeLap = -1;
      if (paceDelta !== 0) {
        // Laps until gap reaches 0 from current position
        const lapsToClose = -currentGap / paceDelta;
        if (lapsToClose > 0 && lapsToClose < 50) {
          overtakeLap = minLen + Math.ceil(lapsToClose);
        }
      }

      // Chart
      const padLeft = 38, padRight = 12, padTop = 20, padBottom = 20;
      const chartW = W - padLeft - padRight;
      const chartH = H - padTop - padBottom;
      if (chartW <= 0 || chartH <= 0) return;

      let minVal = Math.min(0, ...allGaps);
      let maxVal = Math.max(0, ...allGaps);
      const range = maxVal - minVal;
      const yPad = range > 0 ? range * 0.15 : 1;
      minVal -= yPad; maxVal += yPad;

      function xPos(i) { return padLeft + (i / (allGaps.length - 1 || 1)) * chartW; }
      function yPos(v) { return padTop + (1 - (v - minVal) / (maxVal - minVal)) * chartH; }

      ctx.clearRect(0, 0, W, H);

      // Grid
      ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
      ctx.font = '8px Segoe UI'; ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      const niceSteps = [0.1, 0.2, 0.5, 1, 2, 5, 10, 20];
      let gridStep = 1;
      for (const s of niceSteps) { if ((maxVal - minVal) / s <= 6) { gridStep = s; break; } }
      for (let v = Math.ceil(minVal / gridStep) * gridStep; v <= maxVal; v += gridStep) {
        const y = yPos(v);
        ctx.beginPath(); ctx.moveTo(padLeft, y); ctx.lineTo(W - padRight, y); ctx.stroke();
        ctx.fillText((v >= 0 ? '+' : '') + v.toFixed(gridStep < 1 ? 1 : 0) + 's', padLeft - 4, y);
      }

      // Zero line
      const zeroY = yPos(0);
      ctx.save(); ctx.setLineDash([4, 3]); ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(padLeft, zeroY); ctx.lineTo(W - padRight, zeroY); ctx.stroke(); ctx.restore();

      // Divider between real and projected data
      const dividerX = xPos(minLen - 1);
      ctx.save(); ctx.setLineDash([2, 4]); ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(dividerX, padTop); ctx.lineTo(dividerX, H - padBottom); ctx.stroke(); ctx.restore();
      ctx.font = '7px Segoe UI'; ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.textAlign = 'center';
      ctx.fillText('now', dividerX, padTop - 4);

      // Draw actual gap line (solid)
      ctx.beginPath(); ctx.strokeStyle = '#e8e6f0'; ctx.lineWidth = 2;
      for (let i = 0; i < minLen; i++) {
        const x = xPos(i), y = yPos(cumulativeGaps[i]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Draw projected line (dashed)
      ctx.save(); ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.strokeStyle = paceDelta < 0 ? '#3ecf8e' : '#f04438'; ctx.lineWidth = 2;
      ctx.moveTo(xPos(minLen - 1), yPos(cumulativeGaps[minLen - 1]));
      for (let i = minLen; i < allGaps.length; i++) {
        ctx.lineTo(xPos(i), yPos(allGaps[i]));
      }
      ctx.stroke(); ctx.restore();

      // Overtake marker
      if (overtakeLap > 0) {
        const ox = xPos(overtakeLap - 1);
        ctx.fillStyle = '#f7c948';
        ctx.beginPath(); ctx.arc(ox, zeroY, 5, 0, Math.PI * 2); ctx.fill();
        ctx.font = 'bold 9px Segoe UI'; ctx.fillStyle = '#f7c948'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.fillText('L' + overtakeLap, ox, zeroY - 8);
      }

      // X labels
      ctx.font = '8px Segoe UI'; ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      const maxXLabels = Math.floor(chartW / 25);
      const xStep = Math.max(1, Math.ceil(allGaps.length / maxXLabels));
      for (let i = 0; i < allGaps.length; i += xStep) {
        ctx.fillText('L' + (i + 1), xPos(i), H - padBottom + 4);
      }

      // Info text top-right
      ctx.font = 'bold 9px Segoe UI'; ctx.textAlign = 'right'; ctx.textBaseline = 'top';
      ctx.fillStyle = paceDelta < 0 ? '#3ecf8e' : '#f04438';
      const paceStr = (paceDelta >= 0 ? '+' : '') + paceDelta.toFixed(3) + 's/lap';
      ctx.fillText(paceStr, W - padRight, padTop);
      ctx.font = '8px Segoe UI'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
      if (overtakeLap > 0) {
        ctx.fillText('Overtake ~L' + overtakeLap, W - padRight, padTop + 12);
      } else if (paceDelta < 0) {
        ctx.fillText('Pulling away', W - padRight, padTop + 12);
      } else {
        ctx.fillText('Losing ground', W - padRight, padTop + 12);
      }
    }

    function updateLapsTable() {
      const tbody = document.getElementById('laps-tbody');
      const noDataEl = document.getElementById('laps-no-data');
      const focusNameEl = document.getElementById('laps-focus-name');
      const compareNameEl = document.getElementById('laps-compare-name');

      // Update column headers with driver last names
      const fNameParts = lastFocusName.replace(/\s*P\d+$/, '').trim().split(/\s+/);
      const cNameParts = lastCompareName.replace(/\s*P\d+$/, '').trim().split(/\s+/);
      focusNameEl.textContent = fNameParts.length > 1 ? fNameParts[fNameParts.length - 1] : (fNameParts[0] || 'Focus');
      compareNameEl.textContent = cNameParts.length > 1 ? cNameParts[cNameParts.length - 1] : (cNameParts[0] || 'Compare');

      if (lastCompareIdx === null) {
        tbody.innerHTML = '';
        noDataEl.textContent = compareMode === 'ahead' ? 'Leading the class' : 'Last in class';
        noDataEl.style.display = '';
        return;
      }

      const focusLaps = (driverLapHistory[lastFocusIdx] || {}).laps || [];
      const compareLaps = (driverLapHistory[lastCompareIdx] || {}).laps || [];
      const maxLap = Math.max(focusLaps.length, compareLaps.length);

      if (maxLap < 1) {
        tbody.innerHTML = '';
        noDataEl.textContent = 'Waiting for lap data...';
        noDataEl.style.display = '';
        return;
      }

      noDataEl.style.display = 'none';
      const startLap = Math.max(0, maxLap - 3);
      let html = '';

      for (let i = startLap; i < maxLap; i++) {
        const fLap = focusLaps[i];
        const cLap = compareLaps[i];
        const delta = (fLap > 0 && cLap > 0) ? (fLap - cLap) : null;
        const deltaStr = delta !== null ? (delta >= 0 ? '+' : '') + delta.toFixed(3) : '--';
        const deltaColor = delta !== null ? (delta < 0 ? '#3ecf8e' : '#f04438') : '';

        html += '<tr>';
        html += '<td style="color:rgba(255,255,255,0.4)">L' + (i + 1) + '</td>';
        html += '<td>' + formatLapTime(fLap) + '</td>';
        html += '<td>' + formatLapTime(cLap) + '</td>';
        html += '<td style="color:' + deltaColor + '">' + deltaStr + '</td>';
        html += '</tr>';
      }
      tbody.innerHTML = html;
    }

    function shortName(name) {
      if (!name) return '';
      const parts = name.trim().split(/\s+/);
      if (parts.length <= 1) return name;
      return parts[0][0] + '. ' + parts.slice(1).join(' ');
    }

    onData('standings', data => {
      if (!data || !data.length) return;

      // Track lap completions for all drivers
      data.forEach(d => {
        if (!driverLapHistory[d.carIdx]) driverLapHistory[d.carIdx] = { laps: [], lastLapCount: 0 };
        const hist = driverLapHistory[d.carIdx];
        if (d.lapsCompleted > hist.lastLapCount && d.lastLap > 0 && d.lastLap < 600) {
          hist.laps.push(d.lastLap);
          hist.lastLapCount = d.lapsCompleted;
        }
      });

      // Find focus driver and comparison target
      const focused = data.find(d => d.isSpectated) || data.find(d => d.isPlayer);
      if (!focused) return;

      const classmates = data.filter(d => d.carClass === focused.carClass)
        .sort((a, b) => a.classPosition - b.classPosition);
      const focusIdx = classmates.findIndex(d => d.carIdx === focused.carIdx);
      const isClassLeader = focusIdx === 0;
      const isClassLast = focusIdx === classmates.length - 1;
      const btnAhead = document.getElementById('btn-ahead');
      const btnBehind = document.getElementById('btn-behind');

      // Auto-switch to behind if leader, disable ahead
      if (isClassLeader) {
        btnAhead.classList.add('disabled');
        btnAhead.style.opacity = '0.3';
        btnAhead.style.pointerEvents = 'none';
        if (compareMode === 'ahead') setMode('behind');
      } else {
        btnAhead.classList.remove('disabled');
        btnAhead.style.opacity = '';
        btnAhead.style.pointerEvents = '';
      }

      // Auto-switch to ahead if last, disable behind
      if (isClassLast) {
        btnBehind.classList.add('disabled');
        btnBehind.style.opacity = '0.3';
        btnBehind.style.pointerEvents = 'none';
        if (compareMode === 'behind') setMode('ahead');
      } else {
        btnBehind.classList.remove('disabled');
        btnBehind.style.opacity = '';
        btnBehind.style.pointerEvents = '';
      }

      const compareIdx = compareMode === 'ahead' ? focusIdx - 1 : focusIdx + 1;

      if (compareIdx < 0 || compareIdx >= classmates.length) {
        lastFocusIdx = focused.carIdx;
        lastCompareIdx = null;
        lastFocusName = shortName(focused.driverName);
        lastCompareName = '';
        currentLiveGap = null;
        scheduleDraw();
        return;
      }

      const compareDriver = classmates[compareIdx];
      lastFocusIdx = focused.carIdx;
      lastCompareIdx = compareDriver.carIdx;
      lastFocusName = shortName(focused.driverName) + ' P' + focused.classPosition;
      lastCompareName = shortName(compareDriver.driverName) + ' P' + compareDriver.classPosition;

      // Compute current live gap from estTime
      if (focused.estTime > 0 && compareDriver.estTime > 0) {
        currentLiveGap = focused.estTime - compareDriver.estTime;
      }

      scheduleDraw();
    });

    function scheduleDraw() {
      if (drawScheduled) return;
      drawScheduled = true;
      requestAnimationFrame(() => {
        drawScheduled = false;
        // Update driver name labels on every draw regardless of view
        document.getElementById('label-focus').textContent = lastFocusName;
        document.getElementById('label-compare').textContent = lastCompareName;
        if (viewMode === 'chart') drawGapChart();
        else if (viewMode === 'gap') drawGapPerLapChart();
        else if (viewMode === 'battle') drawBattleChart();
        else updateLapsTable();
      });
    }

    function drawGapChart() {
      const canvas = document.getElementById('gap-canvas');
      const container = canvas.parentElement;
      const noDataEl = document.getElementById('no-data');
      // Resize canvas to fill container
      const rect = container.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      const W = rect.width;
      const H = rect.height;

      // No comparison target
      if (lastCompareIdx === null) {
        noDataEl.textContent = compareMode === 'ahead' ? 'Leading the class' : 'Last in class';
        noDataEl.style.display = '';
        ctx.clearRect(0, 0, W, H);
        return;
      }

      const focusLaps = (driverLapHistory[lastFocusIdx] || {}).laps || [];
      const compareLaps = (driverLapHistory[lastCompareIdx] || {}).laps || [];
      const minLen = Math.min(focusLaps.length, compareLaps.length);

      if (minLen < 1) {
        noDataEl.textContent = 'Waiting for lap data...';
        noDataEl.style.display = '';
        ctx.clearRect(0, 0, W, H);
        return;
      }

      noDataEl.style.display = 'none';

      // Build cumulative gap: negative = focus is faster (gaining), positive = focus is slower (losing)
      const gaps = [];
      let cumulativeGap = 0;
      for (let i = 0; i < minLen; i++) {
        cumulativeGap += focusLaps[i] - compareLaps[i];
        gaps.push(cumulativeGap);
      }

      // Chart layout
      const padLeft = 38;
      const padRight = 12;
      const padTop = 12;
      const padBottom = 20;
      const chartW = W - padLeft - padRight;
      const chartH = H - padTop - padBottom;

      if (chartW <= 0 || chartH <= 0) return;

      // Auto-scale Y axis
      let minGap = Math.min(0, ...gaps);
      let maxGap = Math.max(0, ...gaps);
      const range = maxGap - minGap;
      const yPad = range > 0 ? range * 0.15 : 0.5;
      minGap -= yPad;
      maxGap += yPad;

      function xPos(lapIdx) { return padLeft + (lapIdx / (gaps.length - 1 || 1)) * chartW; }
      function yPos(val) { return padTop + (1 - (val - minGap) / (maxGap - minGap)) * chartH; }

      ctx.clearRect(0, 0, W, H);

      // Grid lines (horizontal)
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      const niceSteps = [0.1, 0.2, 0.5, 1, 2, 5, 10, 20, 30, 60];
      let gridStep = 1;
      for (const s of niceSteps) {
        if ((maxGap - minGap) / s <= 6) { gridStep = s; break; }
      }
      const gridStart = Math.ceil(minGap / gridStep) * gridStep;
      ctx.font = '8px Segoe UI';
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      for (let v = gridStart; v <= maxGap; v += gridStep) {
        const y = yPos(v);
        ctx.beginPath();
        ctx.moveTo(padLeft, y);
        ctx.lineTo(W - padRight, y);
        ctx.stroke();
        const label = Math.abs(v) < 0.01 ? '0' : (v >= 0 ? '+' : '') + v.toFixed(gridStep < 1 ? 1 : 0) + 's';
        ctx.fillText(label, padLeft - 4, y);
      }

      // X axis labels (lap numbers)
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      const maxXLabels = Math.floor(chartW / 30);
      const xStep = Math.max(1, Math.ceil(gaps.length / maxXLabels));
      for (let i = 0; i < gaps.length; i += xStep) {
        const x = xPos(i);
        ctx.fillText('L' + (i + 1), x, H - padBottom + 4);
      }
      // Always show last lap label if not already shown
      if ((gaps.length - 1) % xStep !== 0) {
        ctx.fillText('L' + gaps.length, xPos(gaps.length - 1), H - padBottom + 4);
      }

      // Zero line (dashed)
      const zeroY = yPos(0);
      ctx.save();
      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(padLeft, zeroY);
      ctx.lineTo(W - padRight, zeroY);
      ctx.stroke();
      ctx.restore();

      // Area fill: green below zero (faster/gaining), red above zero (slower/losing)
      if (gaps.length === 1) {
        const x = xPos(0);
        const y = yPos(gaps[0]);
        ctx.fillStyle = gaps[0] <= 0 ? 'rgba(62,207,142,0.7)' : 'rgba(240,68,56,0.7)';
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // Fill faster (below zero) area in green
        ctx.beginPath();
        ctx.moveTo(xPos(0), zeroY);
        for (let i = 0; i < gaps.length; i++) {
          ctx.lineTo(xPos(i), yPos(Math.min(0, gaps[i])));
        }
        ctx.lineTo(xPos(gaps.length - 1), zeroY);
        ctx.closePath();
        const greenGrad = ctx.createLinearGradient(0, zeroY, 0, H - padBottom);
        greenGrad.addColorStop(0, 'rgba(62,207,142,0.05)');
        greenGrad.addColorStop(1, 'rgba(62,207,142,0.35)');
        ctx.fillStyle = greenGrad;
        ctx.fill();

        // Fill slower (above zero) area in red
        ctx.beginPath();
        ctx.moveTo(xPos(0), zeroY);
        for (let i = 0; i < gaps.length; i++) {
          ctx.lineTo(xPos(i), yPos(Math.max(0, gaps[i])));
        }
        ctx.lineTo(xPos(gaps.length - 1), zeroY);
        ctx.closePath();
        const redGrad = ctx.createLinearGradient(0, zeroY, 0, padTop);
        redGrad.addColorStop(0, 'rgba(240,68,56,0.05)');
        redGrad.addColorStop(1, 'rgba(240,68,56,0.35)');
        ctx.fillStyle = redGrad;
        ctx.fill();

        // Gap line
        ctx.beginPath();
        ctx.moveTo(xPos(0), yPos(gaps[0]));
        for (let i = 1; i < gaps.length; i++) {
          ctx.lineTo(xPos(i), yPos(gaps[i]));
        }
        ctx.strokeStyle = 'rgba(255,255,255,0.85)';
        ctx.lineWidth = 1.5;
        ctx.lineJoin = 'round';
        ctx.stroke();

        // Data point dots
        for (let i = 0; i < gaps.length; i++) {
          const x = xPos(i);
          const y = yPos(gaps[i]);
          ctx.fillStyle = gaps[i] >= 0 ? '#f04438' : '#3ecf8e';
          ctx.beginPath();
          ctx.arc(x, y, 2.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Current gap value label (top right) — use live gap from estTime
      // Convention: negative = focus faster (green), positive = focus slower (red)
      if (currentLiveGap !== null) {
        // currentLiveGap = focused.estTime - compare.estTime (positive = focus behind)
        const gapText = (currentLiveGap >= 0 ? '+' : '') + currentLiveGap.toFixed(2) + 's';
        ctx.font = 'bold 12px Segoe UI';
        ctx.fillStyle = currentLiveGap <= 0 ? '#3ecf8e' : '#f04438';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.fillText(gapText, W - padRight, padTop);
      } else {
        const lastGap = gaps[gaps.length - 1];
        const gapText = (lastGap >= 0 ? '+' : '') + lastGap.toFixed(2) + 's';
        ctx.font = 'bold 12px Segoe UI';
        ctx.fillStyle = lastGap <= 0 ? '#3ecf8e' : '#f04438';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.fillText(gapText, W - padRight, padTop);
      }
    }

    // Redraw on resize
    window.addEventListener('resize', scheduleDraw);

    // Restore state from sessionStorage (survives reload)
    try {
      const saved = sessionStorage.getItem('_lapCompareState');
      if (saved) {
        const s = JSON.parse(saved);
        if (s.driverLapHistory) Object.assign(driverLapHistory, s.driverLapHistory);
        if (s.compareMode) { compareMode = s.compareMode; setMode(s.compareMode); }
        if (s.viewMode) { viewMode = s.viewMode; setView(s.viewMode); }
        if (s.lastFocusIdx !== undefined) lastFocusIdx = s.lastFocusIdx;
        if (s.lastCompareIdx !== undefined) lastCompareIdx = s.lastCompareIdx;
        sessionStorage.removeItem('_lapCompareState');
        scheduleDraw();
      }
    } catch(e) {}

    // Global state functions for backup/restore across updates
    window.__getState = () => ({
      driverLapHistory, compareMode, viewMode,
      lastFocusIdx, lastCompareIdx,
    });
    window.__restoreState = (s) => {
      if (s.driverLapHistory) Object.assign(driverLapHistory, s.driverLapHistory);
      if (s.compareMode) { compareMode = s.compareMode; setMode(s.compareMode); }
      if (s.viewMode) { viewMode = s.viewMode; setView(s.viewMode); }
      if (s.lastFocusIdx !== undefined) lastFocusIdx = s.lastFocusIdx;
      if (s.lastCompareIdx !== undefined) lastCompareIdx = s.lastCompareIdx;
      scheduleDraw();
    };

    connectBridge(['standings']);

    // IPC support
    try {
      const { ipcRenderer } = require('electron');
      // Save state before reload
      ipcRenderer.on('will-reload', () => {
        try {
          sessionStorage.setItem('_lapCompareState', JSON.stringify({
            driverLapHistory, compareMode, viewMode,
            lastFocusIdx, lastCompareIdx,
          }));
        } catch(e) {}
      });
      ipcRenderer.on('lock-state', (event, locked) => {
        document.body.style.pointerEvents = locked ? 'none' : 'auto';
      });
      // Drag + click-through handled by overlay-utils.js
    } catch(e) {}
  </script>
<script src="overlay-utils.js"></script>
</body>
</html>
