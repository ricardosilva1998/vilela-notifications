<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Stats</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; color: #e8e6f0; }
    .overlay-panel { background: rgba(12,13,20,0.88); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; backdrop-filter: blur(12px); overflow: hidden; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); }
    .header-left { display: flex; align-items: center; gap: 6px; }
    .header-right { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #3ecf8e; }
    .status-dot.waiting { background: #f79009; }
    .status-dot.demo { background: #f79009; }
    .event-badge { font-size: 8px; font-weight: 600; padding: 1px 5px; border-radius: 3px; background: rgba(145,70,255,0.2); color: #b18cff; letter-spacing: 0.5px; text-transform: uppercase; }
    .track-name { font-size: 8px; font-weight: 500; color: rgba(255,255,255,0.35); letter-spacing: 0.5px; text-transform: none; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .stats-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .stats-table th {
      font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      color: rgba(255,255,255,0.3); padding: 5px 6px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .stats-table th:first-child { text-align: left; width: 90px; }
    .stats-table td {
      font-size: 11px; font-family: 'JetBrains Mono', 'Consolas', monospace; font-weight: 500;
      color: rgba(255,255,255,0.8); padding: 4px 6px; text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .stats-table td:first-child {
      text-align: left; font-family: 'Segoe UI', -apple-system, sans-serif;
      font-weight: 700; font-size: 10px; color: #e8e6f0;
    }
    .stats-table tr:last-child td { border-bottom: none; }

    .class-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .no-data { padding: 14px; text-align: center; font-size: 10px; color: rgba(255,255,255,0.25); letter-spacing: 0.5px; }
    .recording-bar { display: none; padding: 4px 10px; background: rgba(62,207,142,0.08); border-bottom: 1px solid rgba(62,207,142,0.15); font-size: 8px; color: rgba(255,255,255,0.5); letter-spacing: 0.5px; }
    .recording-bar .rec-dot { display: inline-block; width: 5px; height: 5px; background: #f04438; border-radius: 50%; margin-right: 4px; animation: rec-blink 1s ease-in-out infinite; }
    @keyframes rec-blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .recording-bar .rec-type { color: #f7c948; font-weight: 700; }
  </style>
</head>
<body>
  <div class="overlay-panel">
    <div class="overlay-header">
      <div class="header-left">
        <span>LIVE STATS</span>
        <span class="track-name" id="track-name"></span>
      </div>
      <div class="header-right">
        <span class="event-badge" id="event-badge" style="display:none;"></span>
        <span id="connection-status"><span class="status-dot demo"></span></span>
      </div>
    </div>
    <div class="recording-bar" id="recording-bar">
      <span class="rec-dot"></span>REC <span id="rec-info"></span>
    </div>
    <div id="stats-body">
      <div class="no-data">Waiting for session data...</div>
    </div>
  </div>

  <script>
    const BRIDGE_URL = 'ws://localhost:9100';
    let ws = null;
    let bridgeConnected = false;
    let iracingConnected = false;
    const dataHandlers = {};

    function connectBridge(channels) {
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { setTimeout(() => connectBridge(channels), 3000); return; }
      ws.onopen = () => { bridgeConnected = true; updateStatus(); ws.send(JSON.stringify({ type: 'subscribe', channels })); };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'bridge-connected') { bridgeConnected = true; updateStatus(); }
          else if (msg.type === 'status') { iracingConnected = msg.iracing; updateStatus(); }
          else if (msg.type === 'data' && dataHandlers[msg.channel]) { dataHandlers[msg.channel](msg.data); }
        } catch(e) {}
      };
      ws.onclose = () => { bridgeConnected = false; iracingConnected = false; updateStatus(); setTimeout(() => connectBridge(channels), 3000); };
      ws.onerror = () => { ws.close(); };
    }
    function onData(ch, fn) { dataHandlers[ch] = fn; }
    function updateStatus() {
      const el = document.getElementById('connection-status');
      if (!bridgeConnected) { if (el) el.innerHTML = '<span class="status-dot demo"></span>'; }
      else if (!iracingConnected) { if (el) el.innerHTML = '<span class="status-dot waiting"></span>'; }
      else { if (el) el.innerHTML = '<span class="status-dot connected"></span>'; }
    }

    // ─── Formatters ────────────────────────────────────────
    function formatLapTime(t) {
      if (!t || t <= 0) return '--';
      const m = Math.floor(t / 60);
      const s = (t % 60).toFixed(1);
      return m > 0 ? m + ':' + s.padStart(4, '0') : s;
    }

    function formatSOF(v) {
      if (!v || v <= 0) return '--';
      return v >= 1000 ? (v / 1000).toFixed(1) + 'k' : String(Math.round(v));
    }

    // ─── State ─────────────────────────────────────────────
    let _standings = [];
    let _session = {};

    // Get class color from standings data (actual iRacing colors)
    function getClassColor(drivers) {
      const d = drivers.find(d => d.carClassColor && d.carClassColor !== '#fff' && d.carClassColor !== '#ffffff');
      return d ? d.carClassColor : 'rgba(255,255,255,0.4)';
    }

    function renderStats() {
      const body = document.getElementById('stats-body');
      if (!_standings || !_standings.length) {
        body.innerHTML = '<div class="no-data">Waiting for session data...</div>';
        return;
      }

      // Group drivers by class
      const classes = {};
      _standings.forEach(d => {
        const cls = d.carClass || 'Unknown';
        if (!classes[cls]) classes[cls] = [];
        classes[cls].push(d);
      });

      // Sort by fastest class (best lap) — GTP on top, then LMP2, then GT3, etc.
      const classNames = Object.keys(classes).sort((a, b) => {
        const bestA = Math.min(...classes[a].map(d => d.bestLap).filter(t => t > 0), Infinity);
        const bestB = Math.min(...classes[b].map(d => d.bestLap).filter(t => t > 0), Infinity);
        return bestA - bestB;
      });
      if (!classNames.length) {
        body.innerHTML = '<div class="no-data">No class data yet</div>';
        return;
      }

      const pitDeltas = (_session && _session.pitDeltas) || {};
      const sofByClass = (_session && _session.sofByClass) || {};

      // Calculate estimated laps per class (same formula as race duration)
      const timeRemain = _session.sessionTimeRemain || 0;
      // Find overall leader pace (fastest class leader's last lap)
      let overallLeaderPace = 0;
      classNames.forEach(cls => {
        const leader = classes[cls].find(d => d.classPosition === 1);
        if (leader && leader.lastLap > 0 && (overallLeaderPace === 0 || leader.lastLap < overallLeaderPace)) {
          overallLeaderPace = leader.lastLap;
        }
      });

      let html = '<table class="stats-table"><thead><tr>';
      html += '<th>Class</th><th>Avg Lap</th><th>Best Lap</th><th>Est. Laps</th><th>Pit Time</th><th>SOF</th><th>OT</th><th>#</th>';
      html += '</tr></thead><tbody>';

      classNames.forEach(cls => {
        const drivers = classes[cls];
        const color = getClassColor(drivers);

        // Avg Lap: average of all valid lastLap values
        const validLast = drivers.map(d => d.lastLap).filter(t => t && t > 0);
        const avgLap = validLast.length > 0 ? validLast.reduce((a, b) => a + b, 0) / validLast.length : 0;

        // Best Lap: minimum valid bestLap
        const validBest = drivers.map(d => d.bestLap).filter(t => t && t > 0);
        const bestLap = validBest.length > 0 ? Math.min(...validBest) : 0;

        // Pit Time: from session pitDeltas
        let pitTime = '--';
        if (pitDeltas[cls] && pitDeltas[cls].avgDelta > 0) {
          pitTime = pitDeltas[cls].avgDelta.toFixed(1) + 's';
        }

        // SOF: from session sofByClass (keys are raw iRacing class names)
        let sof = '--';
        if (sofByClass[cls] && sofByClass[cls] > 0) {
          sof = formatSOF(sofByClass[cls]);
        } else {
          // Try partial match (class names may differ slightly)
          for (const [key, val] of Object.entries(sofByClass)) {
            if (key.includes(cls) || cls.includes(key)) {
              if (val > 0) { sof = formatSOF(val); break; }
            }
          }
        }

        const count = drivers.length;

        // Estimated laps for this class
        let estLaps = '--';
        const leader = drivers.find(d => d.classPosition === 1);
        const classPace = leader && leader.lastLap > 0 ? leader.lastLap : 0;
        if (classPace > 0 && timeRemain > 0 && overallLeaderPace > 0) {
          const totalTime = timeRemain + overallLeaderPace;
          const pitDelta = (pitDeltas[cls] && pitDeltas[cls].avgDelta > 0) ? pitDeltas[cls].avgDelta : 0;
          // Rough remaining stops estimate (1 stop per 30 min of race)
          const estStops = Math.max(0, Math.floor(totalTime / 1800) - 1);
          const effectiveTime = totalTime - (estStops * pitDelta);
          estLaps = (effectiveTime / classPace).toFixed(2);
        }

        // Shorten class name for display if too long
        const displayName = cls.length > 10 ? cls.replace(/\s*20\d{2}$/, '') : cls;

        html += '<tr>';
        html += `<td><span class="class-dot" style="background:${color};"></span>${displayName}</td>`;
        html += `<td>${formatLapTime(avgLap)}</td>`;
        html += `<td>${formatLapTime(bestLap)}</td>`;
        html += `<td style="color:#f7c948;">${estLaps}</td>`;
        html += `<td>${pitTime}</td>`;
        html += `<td>${sof}</td>`;
        const ot = (_session.overtakesByClass && _session.overtakesByClass[cls]) || 0;
        html += `<td style="color:#b18cff;">${ot}</td>`;
        html += `<td>${count}</td>`;
        html += '</tr>';
      });

      html += '</tbody></table>';
      body.innerHTML = html;
    }

    // ─── Data handlers ─────────────────────────────────────
    onData('standings', data => {
      if (!data || !data.length) return;
      _standings = data;
      renderStats();
    });

    onData('session', data => {
      if (!data) return;
      _session = data;

      // Update track name
      const trackEl = document.getElementById('track-name');
      if (trackEl && data.trackName) {
        trackEl.textContent = '\u00b7 ' + data.trackName;
      }

      // Update event type badge
      const badgeEl = document.getElementById('event-badge');
      if (badgeEl && data.eventType) {
        badgeEl.textContent = data.eventType;
        badgeEl.style.display = 'inline-block';
      }

      // Update recording info bar
      const recBar = document.getElementById('recording-bar');
      const recInfo = document.getElementById('rec-info');
      if (recBar && recInfo && data.eventType && data.eventType.toLowerCase().includes('race')) {
        const totalMin = (data.sessionTime + data.sessionTimeRemain) / 60;
        const classes = [...new Set(_standings.map(d => d.carClass).filter(Boolean))];
        const hasMulti = classes.length >= 2;
        // Detect series/race type for display
        let raceTypeLabel = '';
        if (totalMin >= 300) raceTypeLabel = 'Global Endurance';
        else if (totalMin >= 120) raceTypeLabel = 'IMSA Endurance';
        else if (hasMulti && totalMin >= 40) raceTypeLabel = 'IMSA Open';
        else if (!hasMulti && totalMin >= 35) raceTypeLabel = 'VRS Open';
        else if (hasMulti && totalMin >= 30) raceTypeLabel = 'IMSA Sprint';
        else if (!hasMulti && totalMin >= 22) raceTypeLabel = 'VRS Sprint';
        else if (totalMin >= 15) raceTypeLabel = 'Regionals';
        else raceTypeLabel = 'Race';
        const drivers = _standings.length;
        const timeLeft = data.sessionTimeRemain > 0 ? Math.round(data.sessionTimeRemain / 60) + 'min left' : '';
        recInfo.innerHTML = '<span class="rec-type">' + raceTypeLabel + '</span> · ' + drivers + ' drivers' + (timeLeft ? ' · ' + timeLeft : '');
        recBar.style.display = 'block';
      } else if (recBar) {
        recBar.style.display = 'none';
      }

      renderStats();
    });

    connectBridge(['standings', 'session']);

    // ─── Drag support ──────────────────────────────────────
    try {
      const { ipcRenderer } = require('electron');
      ipcRenderer.on('lock-state', (event, locked) => {
        document.body.style.pointerEvents = locked ? 'none' : 'auto';
      });
      let _dragging = false, _dragStartX = 0, _dragStartY = 0;
      const dragHeader = document.querySelector('.overlay-header');
      if (dragHeader) {
        dragHeader.style.cursor = 'move';
        dragHeader.addEventListener('mousedown', (e) => {
          if (e.button !== 0) return;
          _dragging = true;
          _dragStartX = e.screenX;
          _dragStartY = e.screenY;
          e.preventDefault();
        });
      }
      document.addEventListener('mousemove', (e) => {
        if (!_dragging) return;
        const dx = e.screenX - _dragStartX;
        const dy = e.screenY - _dragStartY;
        _dragStartX = e.screenX;
        _dragStartY = e.screenY;
        ipcRenderer.send('drag-overlay', dx, dy);
      });
      document.addEventListener('mouseup', () => { _dragging = false; });
      document.addEventListener('mouseleave', () => { _dragging = false; });

      // Click-through: transparent areas pass clicks through, visible panel captures them
      let _mouseOverPanel = false;
      document.addEventListener('mousemove', (e) => {
        if (_dragging) return;
        const panel = document.querySelector('.overlay-panel');
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const over = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
        if (over && !_mouseOverPanel) {
          _mouseOverPanel = true;
          ipcRenderer.send('set-ignore-mouse', false);
        } else if (!over && _mouseOverPanel) {
          _mouseOverPanel = false;
          ipcRenderer.send('set-ignore-mouse', true);
        }
      });
      document.addEventListener('mouseleave', () => {
        if (_dragging) return;
        if (_mouseOverPanel) {
          _mouseOverPanel = false;
          ipcRenderer.send('set-ignore-mouse', true);
        }
      });
    } catch(e) {}
  </script>
</body>
</html>
