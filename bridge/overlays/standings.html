<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Standings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow-y: auto; max-height: calc(100vh - 40px); font-family: 'Segoe UI', -apple-system, sans-serif; color: #e8e6f0; font-size: 11px; -ms-overflow-style: none; scrollbar-width: none; }
    body::-webkit-scrollbar { display: none; }
    ::-webkit-scrollbar { display: none; }
    .overlay-panel { background: rgba(12,13,20,0.88); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; backdrop-filter: blur(12px); overflow: hidden; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); }
    .overlay-body { padding: 4px 0; }
    .overlay-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .overlay-table th { padding: 3px 6px; text-align: left; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.3); border-bottom: 1px solid rgba(255,255,255,0.06); white-space: nowrap; }
    .overlay-table td { padding: 3px 6px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; white-space: nowrap; }
    .overlay-table tr.player-row { background: rgba(145,70,255,0.15); }
    .overlay-table tr.player-row td { color: #fff; font-weight: 600; }
    .overlay-table tr.spectated-row { background: rgba(62,207,142,0.2); }
    .overlay-table tr.spectated-row td { color: #fff; font-weight: 600; }
    .overlay-table tr.disconnected { opacity: 0.35; }
    .overlay-table tr.pos-up { animation: posUp 1.2s ease-out; }
    .overlay-table tr.pos-down { animation: posDown 1.2s ease-out; }
    @keyframes posUp { 0% { background: rgba(62,207,142,0.3); } 30% { background: rgba(62,207,142,0.15); } 100% { background: transparent; } }
    @keyframes posDown { 0% { background: rgba(240,68,56,0.3); } 30% { background: rgba(240,68,56,0.15); } 100% { background: transparent; } }
    .pit-indicator { background: #f79009; color: #000; font-weight: 700; font-size: 8px; padding: 1px 5px; border-radius: 8px; margin-left: 6px; vertical-align: middle; }
    .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; }
    .driver-name { white-space: nowrap; display: block; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #3ecf8e; }
    .status-dot.disconnected { background: #f04438; }
    .status-dot.waiting { background: #f79009; }
    .status-dot.demo { background: #f79009; }
    .overlay-disconnected { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(12,13,20,0.9); color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 600; border-radius: 8px; }
    .class-badge { display: inline-block; padding: 1px 4px; border-radius: 3px; font-size: 8px; font-weight: 700; letter-spacing: 0.5px; line-height: 1.4; }
    .license { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; }
    .irating { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.6); }
    .flag { font-size: 12px; line-height: 1; }
    .flag-img { width: 16px; height: 12px; vertical-align: middle; border-radius: 1px; }
    .brand-logo { width: 22px; height: 22px; display: inline-block; background-image: url('logos/car-icons-sprite.png'); background-size: 1024px 1024px; background-repeat: no-repeat; opacity: 0.85; vertical-align: middle; }
  </style>
</head>
<body>
  <div id="overlay-root" style="position:relative;width:100%;">
    <div class="overlay-panel">
      <div class="overlay-header">
        <span>STANDINGS</span>
        <span id="connection-status"><span class="status-dot demo"></span> Demo Mode</span>
      </div>
      <div id="session-header" style="display:none; padding: 4px 8px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 9px; color: rgba(255,255,255,0.5); font-family: 'JetBrains Mono', monospace; display: flex; gap: 8px; flex-wrap: wrap;"></div>
      <div class="overlay-body">
        <table class="overlay-table">
          <thead id="standings-head"></thead>
          <tbody id="standings-body"></tbody>
        </table>
      </div>
    </div>
    <div class="overlay-disconnected" id="overlay-disconnected"></div>
  </div>
  <script>
    // Load settings from persisted file
    let _overlaySettings = {};
    try {
      const fs = require('fs');
      const path = require('path');
      const os = require('os');
      const settingsFile = path.join(os.homedir(), 'Documents', 'Atleta Bridge', 'settings.json');
      if (fs.existsSync(settingsFile)) {
        const all = JSON.parse(fs.readFileSync(settingsFile, 'utf8'));
        _overlaySettings = (all.overlayCustom && all.overlayCustom.standings) || {};
      }
    } catch(e) {}
    function getSetting(k, d) { return _overlaySettings[k] !== undefined ? _overlaySettings[k] : d; }

    // Configurable columns
    const ALL_COLUMNS = [
      { id: 'pos',     label: 'P',       width: 'auto' },
      { id: 'number',  label: '#',       width: 'auto' },
      { id: 'logo',    label: 'Logo',    width: 'auto' },
      { id: 'name',    label: 'Name',    width: 'auto' },
      { id: 'license', label: 'Lic',     width: 'auto' },
      { id: 'irating', label: 'iR',      width: 'auto' },
      { id: 'best',    label: 'Best',    width: 'auto' },
      { id: 'last',    label: 'Last',    width: 'auto' },
      { id: 'gap',     label: 'Gap',     width: 'auto' },
      { id: 'flag',    label: 'Flag',    width: 'auto' },
      { id: 'posGain', label: '+/-',    width: 'auto' },
    ];
    const DEFAULT_COLUMNS = ['pos', 'number', 'logo', 'name', 'license', 'irating', 'best', 'last', 'gap', 'flag'];
    // Helper: getSetting may return native object (from settings.json) or string
    function parseSetting(val) { return typeof val === 'string' ? JSON.parse(val) : val; }

    // Migrate old column key names to new ones
    const KEY_MIGRATION = { position: 'pos', carNumber: 'number', driverName: 'name', bestLap: 'best', lastLap: 'last' };
    function migrateKey(k) { return KEY_MIGRATION[k] || k; }
    function migrateKeys(arr) { return arr.map(migrateKey); }
    function migrateEnabled(obj) {
      const out = {};
      Object.entries(obj).forEach(([k, v]) => { out[migrateKey(k)] = v; });
      return out;
    }

    let enabledColumns;
    try {
      const allColumns = migrateKeys(parseSetting(getSetting('columns', DEFAULT_COLUMNS)));
      let colEnabled = {};
      try { colEnabled = migrateEnabled(parseSetting(getSetting('columnsEnabled', {}))); } catch(e) {}
      enabledColumns = Object.keys(colEnabled).length > 0
        ? allColumns.filter(k => colEnabled[k])
        : allColumns;
    } catch(e) { enabledColumns = DEFAULT_COLUMNS; }

    // Fixed row height and font size from settings
    const rowHeight = parseInt(getSetting('rowHeight', '24')) || 24;
    const fontSize = parseInt(getSetting('fontSize', '11')) || 11;
    const fsSmall = Math.round(fontSize * 0.82);
    const fsTiny = Math.round(fontSize * 0.73);
    const fsMed = Math.round(fontSize * 0.91);
    document.body.style.fontSize = fontSize + 'px';
    const _dynStyle = document.createElement('style');
    _dynStyle.textContent = `
  :root { --base-font: ${fontSize}px; --fs-small: ${fsSmall}px; --fs-tiny: ${fsTiny}px; --fs-med: ${fsMed}px; }
  .overlay-table { font-size: ${fontSize}px; }
  .overlay-table th { font-size: ${fsSmall}px !important; }
  .overlay-table td { height: ${rowHeight}px; min-height: ${rowHeight}px; }
  .overlay-header { font-size: ${fsMed}px !important; }
  #session-header { font-size: ${fsSmall}px !important; }
  .pit-indicator { font-size: ${fsTiny}px !important; }
`;
    document.head.appendChild(_dynStyle);

    // Migrate old header keys to new ones
    const HEADER_KEY_MIGRATION = { timeRemaining: 'timeRemain' };
    function migrateHeaderKey(k) { return HEADER_KEY_MIGRATION[k] || k; }
    function migrateHeaderKeys(arr) { return arr.map(migrateHeaderKey); }
    function migrateHeaderEnabled(obj) {
      const out = {};
      Object.entries(obj).forEach(([k, v]) => { out[migrateHeaderKey(k)] = v; });
      return out;
    }

    // Session header items — filter by enabled state
    const DEFAULT_HEADER_ITEMS = ['eventType', 'trackName', 'timeRemain', 'sof', 'airTemp', 'trackTemp', 'incidents'];
    let headerItems;
    try {
      const allHeaderItems = migrateHeaderKeys(parseSetting(getSetting('headerItems', DEFAULT_HEADER_ITEMS)));
      let headerEnabled = {};
      try { headerEnabled = migrateHeaderEnabled(parseSetting(getSetting('headerEnabled', {}))); } catch(e) {}
      headerItems = Object.keys(headerEnabled).length > 0
        ? allHeaderItems.filter(k => headerEnabled[k])
        : allHeaderItems;
    } catch(e) { headerItems = DEFAULT_HEADER_ITEMS; }

    // Class header items — configurable per-item toggles
    let classHeaderEnabled;
    try {
      classHeaderEnabled = parseSetting(getSetting('classHeaderEnabled', {}));
    } catch(e) { classHeaderEnabled = {}; }
    function isClassHeaderOn(key) {
      return classHeaderEnabled[key] !== undefined ? classHeaderEnabled[key] : true; // default all on
    }

    // Per-class max
    const maxMyClass = parseInt(getSetting('maxMyClass', '0')) || 0;
    const maxOtherClasses = parseInt(getSetting('maxOtherClasses', '0')) || 0;

    // SOF display: 'header' (show in session header) or 'classHeader' (show in class header rows)
    const sofDisplay = getSetting('sofDisplay', 'header');

    // SOF by class — populated from session data
    let _sofByClass = {};

    // Estimated iRating gain/loss from position-based Elo calculation
    const showIRatingGain = parseSetting(getSetting('showIRatingGain', true));

    function buildTableHead() {
      const labels = { pos: 'P', flag: '', number: '#', logo: '', name: 'Driver', license: 'Lic', irating: 'iR', best: 'Best', last: 'Last', gap: 'Gap', tire: 'T', pits: 'Pit', pitLap: 'P Lap', pitTime: 'Pit T', gapLdr: 'Ldr', posGain: '+/-' };
      return '<tr>' + enabledColumns.map(c => `<th>${labels[c] || ''}</th>`).join('') + '</tr>';
    }

    const _fs = require('fs');
    const _logPath = require('path').join(require('os').homedir(), 'atleta-bridge.log');
    function log(msg) {
      const line = '[' + new Date().toISOString() + '] ' + msg + '\n';
      console.log(msg);
      try { _fs.appendFileSync(_logPath, line); } catch(e) {}
    }

    const BRIDGE_URL = 'ws://localhost:9100';
    let ws = null;
    let bridgeConnected = false;
    let iracingConnected = false;
    const dataHandlers = {};

    function formatLapTime(seconds) {
      if (!seconds || seconds <= 0) return '--';
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return mins > 0 ? mins + ':' + secs.toFixed(3).padStart(6, '0') : secs.toFixed(3);
    }

    // Map FlairName (country name from iRacing) to ISO 2-letter code for SVG flags
    const COUNTRY_TO_ISO = {
      'Afghanistan':'af','Albania':'al','Algeria':'dz','Andorra':'ad','Angola':'ao','Argentina':'ar',
      'Armenia':'am','Australia':'au','Austria':'at','Azerbaijan':'az','Bahamas':'bs','Bahrain':'bh',
      'Bangladesh':'bd','Barbados':'bb','Belarus':'by','Belgium':'be','Belize':'bz','Benin':'bj',
      'Bermuda':'bm','Bolivia':'bo','Bosnia and Herzegovina':'ba','Botswana':'bw','Brazil':'br',
      'Brunei':'bn','Bulgaria':'bg','Cambodia':'kh','Cameroon':'cm','Canada':'ca','Chile':'cl',
      'China':'cn','Colombia':'co','Costa Rica':'cr','Croatia':'hr','Cuba':'cu','Cyprus':'cy',
      'Czech Republic':'cz','Czechia':'cz','Denmark':'dk','Dominican Republic':'do','Ecuador':'ec',
      'Egypt':'eg','El Salvador':'sv','Estonia':'ee','Ethiopia':'et','Fiji':'fj','Finland':'fi',
      'France':'fr','Georgia':'ge','Germany':'de','Ghana':'gh','Greece':'gr','Guatemala':'gt',
      'Guernsey':'gg','Honduras':'hn','Hong Kong':'hk','Hungary':'hu','Iceland':'is','India':'in',
      'Indonesia':'id','Iran':'ir','Iraq':'iq','Ireland':'ie','Israel':'il','Italy':'it',
      'Jamaica':'jm','Japan':'jp','Jersey':'je','Jordan':'jo','Kazakhstan':'kz','Kenya':'ke',
      'Kuwait':'kw','Latvia':'lv','Lebanon':'lb','Libya':'ly','Lithuania':'lt','Luxembourg':'lu',
      'Macao':'mo','Macau':'mo','Malaysia':'my','Malta':'mt','Mauritius':'mu','Mexico':'mx',
      'Moldova':'md','Monaco':'mc','Mongolia':'mn','Montenegro':'me','Morocco':'ma','Mozambique':'mz',
      'Myanmar':'mm','Namibia':'na','Nepal':'np','Netherlands':'nl','New Zealand':'nz','Nicaragua':'ni',
      'Nigeria':'ng','North Macedonia':'mk','Norway':'no','Oman':'om','Pakistan':'pk','Panama':'pa',
      'Paraguay':'py','Peru':'pe','Philippines':'ph','Poland':'pl','Portugal':'pt','Puerto Rico':'pr',
      'Qatar':'qa','Romania':'ro','Russia':'ru','Saudi Arabia':'sa','Scotland':'gb-sct','Senegal':'sn',
      'Serbia':'rs','Singapore':'sg','Slovakia':'sk','Slovenia':'si','South Africa':'za',
      'South Korea':'kr','Spain':'es','Sri Lanka':'lk','Sweden':'se','Switzerland':'ch',
      'Taiwan':'tw','Thailand':'th','Trinidad and Tobago':'tt','Tunisia':'tn','Turkey':'tr',
      'Ukraine':'ua','United Arab Emirates':'ae','United Kingdom':'gb','United States':'us',
      'Uruguay':'uy','Uzbekistan':'uz','Venezuela':'ve','Vietnam':'vn','Wales':'gb-wls',
      'Zimbabwe':'zw',
    };

    function countryToFlag(country) {
      if (!country || country === 'None') return '';
      const iso = COUNTRY_TO_ISO[country];
      if (iso) return `<img class="flag-img" src="flags/${iso}.svg" onerror="this.style.display='none'" alt="${country}">`;
      // Unknown country (like "GLO") — show iRacing logo from sprite
      return `<span style="display:inline-block;width:16px;height:12px;background-image:url('logos/car-icons-sprite.png');background-size:${1024*(16/128)}px ${1024*(16/128)}px;background-position:0 0;vertical-align:middle;border-radius:1px;opacity:0.7;"></span>`;
    }

    function getManufacturer(carMake) {
      if (!carMake) return '';
      const lower = carMake.toLowerCase();
      if (lower.includes('corvette')) return 'chevrolet';
      if (lower.includes('mx-5') || lower.includes('mx5') || lower.includes('miata')) return 'mazda';
      const first = lower.split(' ')[0];
      const map = { amr: 'aston martin', 'aston': 'aston martin', 'vw': 'volkswagen' };
      return (map[first] || first);
    }

    const BRAND_SPRITE = {
      // Row 0: iRacing, Audi, BMW, Mercedes, Ford, Chevrolet, Ferrari, Lamborghini
      'audi':       { x: 128, y: 0 },
      'bmw':        { x: 256, y: 0 },
      'mercedes':   { x: 384, y: 0 },
      'ford':       { x: 512, y: 0 },
      'chevrolet':  { x: 640, y: 0 },
      'ferrari':    { x: 768, y: 0 },
      'lamborghini':{ x: 896, y: 0 },
      // Row 1: McLaren, Porsche, Dallara, Aston Martin, VW, Honda, Corvette, Toyota
      'mclaren':    { x: 0, y: 128 },
      'porsche':    { x: 128, y: 128 },
      'dallara':    { x: 256, y: 128 },
      'aston martin':{ x: 384, y: 128 },
      'volkswagen': { x: 512, y: 128 },
      'honda':      { x: 640, y: 128 },
      'toyota':     { x: 896, y: 128 },
      // Row 2: Pontiac, Mazda, LucasOil, Renault, Subaru, Holden, Lotus, Cadillac
      'pontiac':    { x: 0, y: 256 },
      'mazda':      { x: 128, y: 256 },
      'renault':    { x: 384, y: 256 },
      'subaru':     { x: 512, y: 256 },
      'holden':     { x: 640, y: 256 },
      'lotus':      { x: 768, y: 256 },
      'cadillac':   { x: 896, y: 256 },
      // Row 3: Kia, Lexus, Nissan, Riley, ?, RUF, CTMP, Radical
      'kia':        { x: 0, y: 384 },
      'lexus':      { x: 128, y: 384 },
      'nissan':     { x: 256, y: 384 },
      'riley':      { x: 384, y: 384 },
      'ruf':        { x: 640, y: 384 },
      'radical':    { x: 896, y: 384 },
      // Row 4: ?, Hyundai, Ligier, Acura, Buick
      'hyundai':    { x: 128, y: 512 },
      'ligier':     { x: 256, y: 512 },
      'acura':      { x: 384, y: 512 },
      'buick':      { x: 512, y: 512 },
    };

    function getBrandLogoStyle(carMake) {
      const mfr = getManufacturer(carMake);
      const pos = BRAND_SPRITE[mfr];
      if (!pos) return '';
      // Scale: 18px display / 128px sprite cell
      const scale = 22 / 128;
      const bgX = -(pos.x * scale);
      const bgY = -(pos.y * scale);
      const bgSize = 1024 * scale;
      return `background-position: ${bgX}px ${bgY}px; background-size: ${bgSize}px ${bgSize}px;`;
    }


    function licenseColor(lic) {
      if (!lic) return '#888';
      const letter = lic.charAt(0).toUpperCase();
      return { A: '#0077cc', B: '#00aa00', C: '#ccaa00', D: '#cc6600', R: '#cc0000' }[letter] || '#888';
    }

    function formatIR(ir) {
      if (!ir || ir <= 0) return '--';
      return ir >= 1000 ? (ir / 1000).toFixed(1) + 'k' : String(ir);
    }

    // Demo data
    const demoStandings = [
      { position: 1, classPosition: 1, carNumber: '1',  driverName: 'M. Verstappen', carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'A 4.99', country: 'NL', iRating: 7200, bestLap: 92.456, lastLap: 92.891, inPit: false, isPlayer: false, positionGain: 2 },
      { position: 2, classPosition: 2, carNumber: '44', driverName: 'L. Hamilton',   carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'A 3.50', country: 'GB', iRating: 6850, bestLap: 92.690, lastLap: 92.990, inPit: false, isPlayer: false, positionGain: -1 },
      { position: 3, classPosition: 3, carNumber: '16', driverName: 'C. Leclerc',    carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'A 2.10', country: 'MC', iRating: 6450, bestLap: 93.012, lastLap: 93.456, inPit: false, isPlayer: false, positionGain: 0 },
      { position: 4, classPosition: 4, carNumber: '99', driverName: 'You',           carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'B 3.21', country: 'PT', iRating: 3210, bestLap: 93.456, lastLap: 93.789, inPit: false, isPlayer: true,  positionGain: 3 },
      { position: 5, classPosition: 5, carNumber: '55', driverName: 'C. Sainz',      carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'B 1.80', country: 'ES', iRating: 5900, bestLap: 93.890, lastLap: 94.012, inPit: false, isPlayer: false, positionGain: -2 },
      { position: 6, classPosition: 6, carNumber: '4',  driverName: 'L. Norris',     carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'C 4.00', country: 'GB', iRating: 5600, bestLap: 94.123, lastLap: 94.567, inPit: true,  isPlayer: false, positionGain: 1 },
      { position: 7, classPosition: 7, carNumber: '81', driverName: 'O. Piastri',    carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'C 2.90', country: 'AU', iRating: 5300, bestLap: 94.678, lastLap: 95.001, inPit: false, isPlayer: false, positionGain: -3 },
      { position: 8, classPosition: 8, carNumber: '63', driverName: 'G. Russell',    carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'D 1.50', country: 'GB', iRating: 5100, bestLap: 95.012, lastLap: 95.234, inPit: false, isPlayer: false, positionGain: 0 },
    ];

    function tireLabel(compound) {
      if (compound === undefined || compound < 0) return '--';
      const labels = ['D', 'W', 'I', 'D2', 'W2'];
      const colors = ['#3ecf8e', '#38bdf8', '#f7c948', '#3ecf8e', '#38bdf8'];
      const idx = Math.min(compound, labels.length - 1);
      return '<span style="color:' + colors[idx] + ';font-weight:700;font-size:' + fsSmall + 'px">' + labels[idx] + '</span>';
    }

    function buildDriverRow(d, rank, classLeaderBest) {
      const pos = rank; // Use our sorted rank, not iRacing's classPosition
      const bestFormatted = formatLapTime(d.bestLap);
      const lastFormatted = formatLapTime(d.lastLap);

      let gap = 'Leader';
      if (rank === 1) {
        gap = 'Leader';
      } else if (d.gapToLeader > 0) {
        gap = '+' + d.gapToLeader.toFixed(1) + 's';
      } else if (classLeaderBest && d.bestLap > 0) {
        gap = '+' + (d.bestLap - classLeaderBest).toFixed(3);
      } else {
        gap = '--';
      }

      const flag = countryToFlag(d.country);
      const licColor = licenseColor(d.safetyRating || d.license);
      const irStr = formatIR(d.iRating);
      const classColor = d.carClassColor || '#fff';
      const carBrand = d.carMake || '';
      const pitMark = d.inPit ? ' <span class="pit-indicator">PIT</span>' : '';
      // OUT badge disabled — lapsCompleted unreliable for distant cars as spectator
      const stoppedMark = '';
      const disconnCls = d.disconnected ? ' disconnected' : '';

      const numCell = `<span style="background:${classColor};color:#000;padding:1px 5px;border-radius:3px;font-size:${fsSmall}px;font-weight:800;font-family:'JetBrains Mono',monospace;">${d.carNumber || ''}</span>`;

      const logoStyle = getBrandLogoStyle(carBrand);
      const logoImg = logoStyle ? `<span class="brand-logo" style="${logoStyle}"></span>` : '';
      const badgeCell = `<div class="driver-name">${d.driverName || ''}${pitMark}${stoppedMark}</div>`;

      const licCell = d.safetyRating || d.license
        ? `<span style="background:${licColor};color:#fff;padding:1px 5px;border-radius:4px;font-size:${fsSmall}px;font-weight:600;font-family:'JetBrains Mono',monospace;">${d.safetyRating || d.license}</span>`
        : `<span style="background:rgba(255,255,255,0.1);color:#fff;padding:1px 5px;border-radius:4px;font-size:${fsSmall}px;font-weight:600;font-family:'JetBrains Mono',monospace;">--</span>`;

      const irChange = d.estIRatingChange || 0;
      const irChangeStr = showIRatingGain && irChange !== 0 ? `<span style="color:${irChange > 0 ? '#3ecf8e' : '#f04438'};font-size:${fsTiny}px;margin-left:3px;">${irChange > 0 ? '+' : ''}${irChange}</span>` : '';
      const irCell = `<span style="background:rgba(255,255,255,0.1);color:#fff;padding:1px 5px;border-radius:4px;font-size:${fsSmall}px;font-weight:600;font-family:'JetBrains Mono',monospace;">${irStr}${irChangeStr}</span>`;

      const rowClass = d.isSpectated && !d.isPlayer ? 'spectated-row' : (d.isPlayer ? 'player-row' : '');
      const cells = {
        pos: `<td class="mono" style="font-weight:700;color:rgba(255,255,255,0.7)">${pos}</td>`,
        flag: `<td class="flag">${flag}</td>`,
        number: `<td>${numCell}</td>`,
        logo: `<td>${logoImg}</td>`,
        name: `<td>${badgeCell}</td>`,
        license: `<td>${licCell}</td>`,
        irating: `<td>${irCell}</td>`,
        best: `<td class="mono" style="font-size:${fsMed}px">${bestFormatted}</td>`,
        last: `<td class="mono" style="font-size:${fsMed}px;color:rgba(255,255,255,0.55)">${lastFormatted}</td>`,
        gap: `<td class="mono" style="font-size:${fsMed}px;color:rgba(255,255,255,0.45)">${gap}</td>`,
        tire: '<td>' + tireLabel(d.tireCompound) + '</td>',
        pits: '<td class="mono" style="font-size:' + fsSmall + 'px;color:' + (d.pitStops > 0 ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.25)') + '">' + (d.pitStops || 0) + '</td>',
        pitLap: '<td class="mono" style="font-size:' + fsSmall + 'px;color:' + (d.pitLap > 0 ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.25)') + '">' + (d.pitLap > 0 ? 'L' + d.pitLap : '--') + '</td>',
        pitTime: '<td class="mono" style="font-size:' + fsSmall + 'px;color:' + (d.inPit && d.pitTimeLive > 0 ? '#3ecf8e' : (d.lastPitDelta > 0 ? '#f7c948' : 'rgba(255,255,255,0.25)')) + '">' + (d.inPit && d.pitTimeLive > 0 ? d.pitTimeLive.toFixed(1) + 's' : (d.lastPitDelta > 0 ? d.lastPitDelta.toFixed(1) + 's' : '--')) + '</td>',
        gapLdr: '<td class="mono" style="font-size:' + fsMed + 'px;color:rgba(255,255,255,0.45)">' + (d.gapToLeader > 0 ? '+' + d.gapToLeader.toFixed(1) + 's' : (d.classPosition === 1 ? 'Leader' : '--')) + '</td>',
        posGain: '<td class="mono" style="font-size:' + fsMed + 'px;font-weight:700;color:' + (d.positionGain > 0 ? '#3ecf8e' : (d.positionGain < 0 ? '#f04438' : 'rgba(255,255,255,0.25)')) + '">' + (d.positionGain > 0 ? '\u25B2' + d.positionGain : (d.positionGain < 0 ? '\u25BC' + Math.abs(d.positionGain) : '--')) + '</td>',
      };
      return `<tr class="${rowClass}${disconnCls}" data-caridx="${d.carIdx}" onclick="selectDriver(${d.carIdx})" style="cursor:pointer">
        ${enabledColumns.map(c => cells[c] || '').join('')}
      </tr>`;
    }

    function buildStandingsHTML(data) {
      // Find the player's class to exempt it from the max limit
      const playerDriver = data.find(d => d.isPlayer);
      const playerClass = playerDriver ? playerDriver.carClass : '';

      // Group by class
      const classes = {};
      data.forEach(d => {
        const cls = d.carClass || 'Overall';
        if (!classes[cls]) classes[cls] = { color: d.carClassColor || '#fff', drivers: [] };
        classes[cls].drivers.push(d);
      });

      // Sort each class by iRacing class position (fallback to best lap, then iRating)
      Object.values(classes).forEach(cls => {
        cls.drivers.sort((a, b) => {
          if (a.disconnected && !b.disconnected) return 1;
          if (!a.disconnected && b.disconnected) return -1;
          // Use iRacing's class position when available
          if (a.classPosition > 0 && b.classPosition > 0) return a.classPosition - b.classPosition;
          if (a.classPosition > 0) return -1;
          if (b.classPosition > 0) return 1;
          // Fallback: sort by best lap time
          const aTime = (a.bestLap > 0 ? a.bestLap : (a.lastLap > 0 ? a.lastLap : Infinity));
          const bTime = (b.bestLap > 0 ? b.bestLap : (b.lastLap > 0 ? b.lastLap : Infinity));
          if (aTime === Infinity && bTime === Infinity) return (b.iRating || 0) - (a.iRating || 0);
          return aTime - bTime;
        });
      });

      // Sort class names: known order first (GTP > LMP2 > GT3), then alphabetical
      const classOrder = ['GTP', 'LMDh', 'DPi', 'LMP2', 'LMP3', 'GT3', 'GTE', 'GT4', 'TCR', 'MX5'];
      const classNames = Object.keys(classes).sort((a, b) => {
        const ai = classOrder.findIndex(c => a.toUpperCase().includes(c));
        const bi = classOrder.findIndex(c => b.toUpperCase().includes(c));
        if (ai >= 0 && bi >= 0) return ai - bi;
        if (ai >= 0) return -1;
        if (bi >= 0) return 1;
        return a.localeCompare(b);
      });

      // Apply per-class limits
      classNames.forEach(cls => {
        if (cls === playerClass && maxMyClass > 0) {
          classes[cls].drivers = classes[cls].drivers.slice(0, maxMyClass);
        } else if (cls !== playerClass && maxOtherClasses > 0) {
          classes[cls].drivers = classes[cls].drivers.slice(0, maxOtherClasses);
        }
      });

      // If only one class, no headers needed
      if (classNames.length <= 1) {
        const drivers = classNames.length === 1 ? classes[classNames[0]].drivers : data;
        const leaderBest = drivers.find(d => d.bestLap > 0)?.bestLap || null;
        return drivers.map((d, i) => buildDriverRow(d, i + 1, leaderBest)).join('');
      }

      // Multiple classes — add a class header row before each group
      const roundSOF = (v) => Math.round(v / 100) * 100; // ≤50 rounds down, >50 rounds up
      const formatSOFShort = (v) => { const r = roundSOF(v); return r >= 1000 ? (r/1000).toFixed(1) + 'k' : String(r); };
      let html = '';
      classNames.forEach(cls => {
        const group = classes[cls];
        const color = group.color;
        const leaderBest = group.drivers.find(d => d.bestLap > 0)?.bestLap || null;

        // Class header row — respect classHeaderEnabled toggles
        const classSof = _sofByClass[cls] || 0;
        const classNamePart = isClassHeaderOn('className') ? `<span style="color:${color};">${cls}</span>` : '';
        const carCountPart = isClassHeaderOn('carCount') ? `<span style="color:rgba(255,255,255,0.3);font-weight:400;margin-left:6px;">${group.drivers.length} cars</span>` : '';
        const classSofPart = isClassHeaderOn('classSof') && classSof > 0 ? `<span style="color:rgba(255,255,255,0.4);font-weight:400;margin-left:4px;">&middot; SOF ${formatSOFShort(classSof)}</span>` : (sofDisplay === 'classHeader' && classSof > 0 ? `<span style="color:rgba(255,255,255,0.4);font-weight:400;margin-left:4px;">&middot; SOF ${formatSOFShort(classSof)}</span>` : '');
        html += `<tr><td colspan="${enabledColumns.length}" style="padding:6px 8px 3px;font-size:${fsMed}px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid ${color};">
          ${classNamePart}${classSofPart}${carCountPart}
        </td></tr>`;

        group.drivers.forEach((d, i) => {
          html += buildDriverRow(d, i + 1, leaderBest);
        });
      });

      return html;
    }

    function renderDemoStandings() {
      document.getElementById('standings-body').innerHTML = buildStandingsHTML(demoStandings);
    }

    document.getElementById('standings-head').innerHTML = buildTableHead();
    renderDemoStandings();

    function connectBridge(channels) {
      log('[Standings] Connecting to ' + BRIDGE_URL);
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { log('[Standings] WS error: ' + e.message); setTimeout(() => connectBridge(channels), 3000); return; }
      ws.onopen = () => {
        log('[Standings] Connected');
        bridgeConnected = true;
        updateConnectionStatus();
        ws.send(JSON.stringify({ type: 'subscribe', channels }));
      };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'bridge-connected') { log('[Standings] Bridge confirmed'); bridgeConnected = true; updateConnectionStatus(); }
          else if (msg.type === 'status') { log('[Standings] iRacing: ' + msg.iracing); iracingConnected = msg.iracing; updateConnectionStatus(); if (dataHandlers.status) dataHandlers.status(msg); }
          else if (msg.type === 'data' && dataHandlers[msg.channel]) { dataHandlers[msg.channel](msg.data); }
        } catch(e) {}
      };
      ws.onclose = () => { log('[Standings] Disconnected'); bridgeConnected = false; iracingConnected = false; updateConnectionStatus(); setTimeout(() => connectBridge(channels), 3000); };
      ws.onerror = () => { log('[Standings] WS error'); ws.close(); };
    }

    function onData(ch, fn) { dataHandlers[ch] = fn; }

    function updateConnectionStatus() {
      const el = document.getElementById('connection-status');
      const dis = document.getElementById('overlay-disconnected');
      if (!bridgeConnected) {
        if (el) el.innerHTML = '<span class="status-dot demo"></span> Demo Mode';
        if (dis) dis.style.display = 'none';
      } else if (!iracingConnected) {
        if (el) el.innerHTML = '<span class="status-dot waiting"></span> Waiting';
        if (dis) { dis.textContent = 'Waiting for iRacing...'; dis.style.display = 'flex'; }
        document.getElementById('standings-body').innerHTML = '';
      } else {
        if (el) el.innerHTML = '<span class="status-dot connected"></span> Live';
        if (dis) dis.style.display = 'none';
        document.getElementById('standings-body').innerHTML = '';
      }
    }

    let demoCleared = false;

    function selectDriver(carIdx) {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'select-driver', carIdx }));
      }
    }

    // Track previous positions for animation
    const prevPositions = new Map();
    onData('standings', data => {
      try {
      if (!data || !data.length) return;
      if (!demoCleared) { demoCleared = true; }

      // Detect position changes
      const posChanges = new Map();
      data.forEach(d => {
        if (d.classPosition > 0 && prevPositions.has(d.carIdx)) {
          const prev = prevPositions.get(d.carIdx);
          if (d.classPosition < prev) posChanges.set(d.carIdx, 'pos-up');
          else if (d.classPosition > prev) posChanges.set(d.carIdx, 'pos-down');
        }
        if (d.classPosition > 0) prevPositions.set(d.carIdx, d.classPosition);
      });

      // FLIP animation: record old row positions before rebuild
      const tbody = document.getElementById('standings-body');
      const oldRowPositions = new Map();
      tbody.querySelectorAll('tr[data-caridx]').forEach(tr => {
        oldRowPositions.set(parseInt(tr.dataset.caridx), tr.getBoundingClientRect().top);
      });

      tbody.innerHTML = buildStandingsHTML(data);

      // FLIP: animate rows from old to new position + color flash
      tbody.querySelectorAll('tr[data-caridx]').forEach(tr => {
        const idx = parseInt(tr.dataset.caridx);

        // Slide animation (FLIP)
        if (oldRowPositions.has(idx)) {
          const oldTop = oldRowPositions.get(idx);
          const newTop = tr.getBoundingClientRect().top;
          const delta = oldTop - newTop;
          if (Math.abs(delta) > 2) {
            tr.style.transform = `translateY(${delta}px)`;
            tr.style.transition = 'none';
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                tr.style.transition = 'transform 0.5s ease-out';
                tr.style.transform = 'translateY(0)';
              });
            });
          }
        }

        // Color flash
        if (posChanges.has(idx)) tr.classList.add(posChanges.get(idx));
      });
      // Auto-resize height only (width stays fixed to prevent endless growth)
      setTimeout(() => {
        const panel = document.querySelector('.overlay-panel');
        if (panel) {
          try {
            const { ipcRenderer } = require('electron');
            const neededH = Math.min(panel.scrollHeight + 4, screen.height - 100);
            ipcRenderer.send('resize-overlay-height', 'standings', neededH);
          } catch(e) {}
        }
      }, 150);
      } catch(err) { console.error('[Standings] Error:', err); }
    });

    onData('session', data => {
      if (!data) return;
      // Store sofByClass for use in class headers
      _sofByClass = data.sofByClass || {};

      const el = document.getElementById('session-header');
      if (!el || headerItems.length === 0) { if (el) el.style.display = 'none'; return; }

      const formatTime = (s) => {
        if (!s || s <= 0 || s > 86400) return '--:--';
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = Math.floor(s % 60);
        return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`;
      };
      const roundSOF2 = (v) => Math.round(v / 100) * 100;
      const formatSOF = (v) => { const r = roundSOF2(v); return r >= 1000 ? (r/1000).toFixed(1) + 'k' : String(r); };

      const items = {
        eventType: data.eventType || '',
        trackName: data.trackName || '',
        lapsRemain: data.sessionLapsRemain > 0 && data.sessionLapsRemain < 32767 ? data.sessionLapsRemain + ' laps' : '',
        timeRemain: 'Rem ' + formatTime(data.sessionTimeRemain),
        timeOfDay: 'ToD ' + formatTime(data.timeOfDay),
        irlTime: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
        sof: sofDisplay === 'header' ? (() => {
          if (data.sofByClass && Object.keys(data.sofByClass).length > 1) {
            return 'SOF: ' + Object.entries(data.sofByClass).map(([cls, v]) => cls + ' ' + formatSOF(v)).join(' | ');
          }
          return data.sof ? 'SOF ' + formatSOF(data.sof) : '';
        })() : '',
        incidents: data.incidentCount !== undefined ? 'Inc ' + data.incidentCount + 'x' : '',
        iRatingGain: data.playerIRChange ? (data.playerIRChange >= 0 ? '+' : '') + data.playerIRChange + ' iR' : '',
        stintLaps: data.stintLaps > 0 ? 'Stint ' + data.stintLaps + 'L' : '',
        stintTime: data.stintTime > 0 ? 'Stint ' + formatTime(data.stintTime) : '',
        fuelLevel: data.fuelLevel > 0 ? data.fuelLevel.toFixed(1) + 'L' : '',
        waterTemp: data.waterTemp > 0 ? data.waterTemp.toFixed(0) + '°C H₂O' : '',
        oilTemp: data.oilTemp > 0 ? data.oilTemp.toFixed(0) + '°C oil' : '',
        airTemp: data.airTemp ? data.airTemp.toFixed(1) + '°C air' : '',
        trackTemp: data.trackTemp ? data.trackTemp.toFixed(1) + '°C track' : '',
        humidity: data.humidity ? Math.round(data.humidity) + '% hum' : '',
        fogLevel: data.fogLevel > 0 ? Math.round(data.fogLevel * 100) + '% fog' : '',
        precipitation: data.precipitation > 0 ? Math.round(data.precipitation * 100) + '% rain' : '',
        trackWetness: data.trackWetness > 0 ? 'Wet ' + data.trackWetness : '',
        weatherWet: data.weatherWet ? 'WET' : '',
        skies: data.skies || '',
      };

      const parts = headerItems.map(k => items[k]).filter(Boolean);
      el.innerHTML = parts.map(t => `<span>${t}</span>`).join('<span style="opacity:0.3">|</span>');
      el.style.display = parts.length > 0 ? 'flex' : 'none';
    });

    connectBridge(['standings', 'session']);

    try {
      const { ipcRenderer } = require('electron');
      ipcRenderer.on('lock-state', (event, locked) => {
        document.body.style.pointerEvents = locked ? 'none' : 'auto';
        const header = document.querySelector('.overlay-header');
        if (header) header.style.cursor = locked ? 'default' : 'move';
      });

      // Custom window dragging via IPC (bypasses transparent window limitations)
      let _dragging = false;
      let _dragStartX = 0, _dragStartY = 0;
      const dragHeader = document.querySelector('.overlay-header');
      if (dragHeader) {
        dragHeader.style.cursor = 'move';
        dragHeader.addEventListener('mousedown', (e) => {
          if (e.button !== 0) return;
          _dragging = true;
          _dragStartX = e.screenX;
          _dragStartY = e.screenY;
          e.preventDefault();
        });
      }
      document.addEventListener('mousemove', (e) => {
        if (!_dragging) return;
        const dx = e.screenX - _dragStartX;
        const dy = e.screenY - _dragStartY;
        _dragStartX = e.screenX;
        _dragStartY = e.screenY;
        ipcRenderer.send('drag-overlay', dx, dy);
      });
      document.addEventListener('mouseup', () => { _dragging = false; });

      // Click-through: transparent areas pass clicks through, visible panel captures them
      let _mouseOverPanel = false;
      document.addEventListener('mousemove', (e) => {
        if (_dragging) return; // don't change ignore-mouse while dragging
        const panel = document.querySelector('.overlay-panel');
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const over = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
        if (over && !_mouseOverPanel) {
          _mouseOverPanel = true;
          ipcRenderer.send('set-ignore-mouse', false);
        } else if (!over && _mouseOverPanel) {
          _mouseOverPanel = false;
          ipcRenderer.send('set-ignore-mouse', true);
        }
      });
      // Fallback: reset when mouse leaves the window entirely
      document.addEventListener('mouseleave', () => {
        if (_dragging) return;
        if (_mouseOverPanel) {
          _mouseOverPanel = false;
          ipcRenderer.send('set-ignore-mouse', true);
        }
      });
    } catch(e) {}
  </script>
<script src="overlay-utils.js"></script>
</body>
</html>
