<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Standings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow-y: auto; max-height: calc(100vh - 40px); font-family: 'Segoe UI', -apple-system, sans-serif; color: #e8e6f0; font-size: 11px; -ms-overflow-style: none; scrollbar-width: none; }
    body::-webkit-scrollbar { display: none; }
    ::-webkit-scrollbar { display: none; }
    .overlay-panel { background: rgba(12,13,20,0.88); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; backdrop-filter: blur(12px); overflow: hidden; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); cursor: move; -webkit-app-region: drag; }
    .overlay-body { padding: 4px 0; }
    .overlay-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .overlay-table th { padding: 3px 6px; text-align: left; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.3); border-bottom: 1px solid rgba(255,255,255,0.06); white-space: nowrap; }
    .overlay-table td { padding: 3px 6px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; white-space: nowrap; }
    .overlay-table tr.player-row { background: rgba(145,70,255,0.15); }
    .overlay-table tr.player-row td { color: #fff; font-weight: 600; }
    .overlay-table tr.disconnected { opacity: 0.35; }
    .pit-indicator { color: #f79009; font-weight: 700; font-size: 9px; }
    .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; }
    .driver-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 96px; display: block; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #3ecf8e; }
    .status-dot.disconnected { background: #f04438; }
    .status-dot.waiting { background: #f79009; }
    .status-dot.demo { background: #f79009; }
    .overlay-disconnected { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(12,13,20,0.9); color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 600; border-radius: 8px; }
    .class-badge { display: inline-block; padding: 1px 4px; border-radius: 3px; font-size: 8px; font-weight: 700; letter-spacing: 0.5px; line-height: 1.4; }
    .license { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; }
    .irating { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.6); }
    .flag { font-size: 12px; line-height: 1; }
  </style>
</head>
<body>
  <div id="overlay-root" style="position:relative;width:100%;">
    <div class="overlay-panel" style="width:100%;">
      <div class="overlay-header">
        <span>STANDINGS</span>
        <span id="connection-status"><span class="status-dot demo"></span> Demo Mode</span>
      </div>
      <div class="overlay-body">
        <table class="overlay-table">
          <thead>
            <tr>
              <th style="width:22px">P</th>
              <th style="width:20px"></th>
              <th style="width:30px">#</th>
              <th>Driver</th>
              <th style="width:46px">Lic</th>
              <th style="width:38px">iR</th>
              <th style="width:58px">Best</th>
              <th style="width:58px">Last</th>
              <th style="width:54px">Gap</th>
            </tr>
          </thead>
          <tbody id="standings-body"></tbody>
        </table>
      </div>
    </div>
    <div class="overlay-disconnected" id="overlay-disconnected"></div>
  </div>
  <script>
    // Load settings from persisted file
    let _overlaySettings = {};
    try {
      const fs = require('fs');
      const path = require('path');
      const os = require('os');
      const settingsFile = path.join(os.homedir(), 'Documents', 'Atleta Bridge', 'settings.json');
      if (fs.existsSync(settingsFile)) {
        const all = JSON.parse(fs.readFileSync(settingsFile, 'utf8'));
        _overlaySettings = (all.overlayCustom && all.overlayCustom.standings) || {};
      }
    } catch(e) {}
    function getSetting(k, d) { return _overlaySettings[k] !== undefined ? _overlaySettings[k] : d; }

    const BRIDGE_URL = 'ws://localhost:9100';
    let ws = null;
    let bridgeConnected = false;
    let iracingConnected = false;
    const dataHandlers = {};

    function formatLapTime(seconds) {
      if (!seconds || seconds <= 0) return '--';
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return mins > 0 ? mins + ':' + secs.toFixed(3).padStart(6, '0') : secs.toFixed(3);
    }

    function countryFlag(code) {
      if (!code || code.length !== 2) return '';
      return String.fromCodePoint(...[...code.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
    }

    function clubToFlag(club) {
      if (!club) return '';
      const map = {
        'Iberia': '🇪🇸', 'DE-AT-CH': '🇩🇪', 'UK and I': '🇬🇧', 'Benelux': '🇳🇱',
        'France': '🇫🇷', 'Italy': '🇮🇹', 'Brazil': '🇧🇷', 'Australia/NZ': '🇦🇺',
        'Central-Eastern Europe': '🇵🇱', 'Scandinavia': '🇸🇪', 'Finland': '🇫🇮',
        'International': '🌐', 'Hispanic America': '🇲🇽', 'Portugal': '🇵🇹',
        'Canada': '🇨🇦', 'Japan': '🇯🇵', 'South Korea': '🇰🇷', 'China': '🇨🇳',
        'India': '🇮🇳', 'Middle East': '🇦🇪', 'Greece': '🇬🇷', 'Turkey': '🇹🇷',
        'Israel': '🇮🇱', 'South Africa': '🇿🇦', 'Russia': '🇷🇺',
      };
      if (map[club]) return map[club];
      for (const [key, flag] of Object.entries(map)) {
        if (club.includes(key) || key.includes(club)) return flag;
      }
      return '🏁';
    }

    function licenseColor(lic) {
      if (!lic) return '#888';
      const letter = lic.charAt(0).toUpperCase();
      return { A: '#0077cc', B: '#00aa00', C: '#ccaa00', D: '#cc6600', R: '#cc0000' }[letter] || '#888';
    }

    function formatIR(ir) {
      if (!ir || ir <= 0) return '--';
      return ir >= 1000 ? (ir / 1000).toFixed(1) + 'k' : String(ir);
    }

    // Demo data
    const demoStandings = [
      { position: 1, classPosition: 1, carNumber: '1',  driverName: 'M. Verstappen', carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'A 4.99', country: 'NL', iRating: 7200, bestLap: 92.456, lastLap: 92.891, inPit: false, isPlayer: false },
      { position: 2, classPosition: 2, carNumber: '44', driverName: 'L. Hamilton',   carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'A 3.50', country: 'GB', iRating: 6850, bestLap: 92.690, lastLap: 92.990, inPit: false, isPlayer: false },
      { position: 3, classPosition: 3, carNumber: '16', driverName: 'C. Leclerc',    carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'A 2.10', country: 'MC', iRating: 6450, bestLap: 93.012, lastLap: 93.456, inPit: false, isPlayer: false },
      { position: 4, classPosition: 4, carNumber: '99', driverName: 'You',           carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'B 3.21', country: 'PT', iRating: 3210, bestLap: 93.456, lastLap: 93.789, inPit: false, isPlayer: true  },
      { position: 5, classPosition: 5, carNumber: '55', driverName: 'C. Sainz',      carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'B 1.80', country: 'ES', iRating: 5900, bestLap: 93.890, lastLap: 94.012, inPit: false, isPlayer: false },
      { position: 6, classPosition: 6, carNumber: '4',  driverName: 'L. Norris',     carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'C 4.00', country: 'GB', iRating: 5600, bestLap: 94.123, lastLap: 94.567, inPit: true,  isPlayer: false },
      { position: 7, classPosition: 7, carNumber: '81', driverName: 'O. Piastri',    carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'C 2.90', country: 'AU', iRating: 5300, bestLap: 94.678, lastLap: 95.001, inPit: false, isPlayer: false },
      { position: 8, classPosition: 8, carNumber: '63', driverName: 'G. Russell',    carMake: 'Dallara IR18', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'D 1.50', country: 'GB', iRating: 5100, bestLap: 95.012, lastLap: 95.234, inPit: false, isPlayer: false },
    ];

    function buildDriverRow(d, rank, classLeaderBest) {
      const pos = rank; // Use our sorted rank, not iRacing's classPosition
      const bestFormatted = formatLapTime(d.bestLap);
      const lastFormatted = formatLapTime(d.lastLap);

      let gap = 'Leader';
      if (rank > 1 && classLeaderBest && d.bestLap > 0) {
        gap = '+' + (d.bestLap - classLeaderBest).toFixed(3);
      } else if (!d.bestLap || d.bestLap <= 0) {
        gap = '--';
      }

      const flag = (d.country && d.country !== 'None' && d.country !== 'none') ? clubToFlag(d.country) : '';
      const licColor = licenseColor(d.safetyRating || d.license);
      const irStr = formatIR(d.iRating);
      const classColor = d.carClassColor || '#fff';
      const classLabel = d.carClass || '';
      const carBrand = d.carMake || '';
      const pitMark = d.inPit ? ' <span class="pit-indicator">PIT</span>' : '';
      const disconnCls = d.disconnected ? ' disconnected' : '';

      const numCell = `<span style="background:${classColor};color:#000;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:800;font-family:'JetBrains Mono',monospace;">${d.carNumber || ''}</span>`;

      let badgeLine = '';
      if (carBrand) badgeLine += `<span style="font-size:8px;color:rgba(255,255,255,0.45);">${carBrand}</span>`;
      const badgeCell = badgeLine
        ? `<div class="driver-name">${d.driverName || ''}${pitMark}</div><div style="margin-top:1px;">${badgeLine}</div>`
        : `<div class="driver-name">${d.driverName || ''}${pitMark}</div>`;

      const licCell = d.safetyRating || d.license
        ? `<span style="background:${licColor};color:#fff;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:600;font-family:'JetBrains Mono',monospace;">${d.safetyRating || d.license}</span>`
        : `<span style="background:rgba(255,255,255,0.1);color:#fff;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:600;font-family:'JetBrains Mono',monospace;">--</span>`;

      const irCell = `<span style="background:rgba(255,255,255,0.1);color:#fff;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:600;font-family:'JetBrains Mono',monospace;">${irStr}</span>`;

      return `<tr class="${d.isPlayer ? 'player-row' : ''}${disconnCls}">
        <td class="mono" style="font-weight:700;color:rgba(255,255,255,0.7)">${pos}</td>
        <td class="flag">${flag}</td>
        <td>${numCell}</td>
        <td>${badgeCell}</td>
        <td>${licCell}</td>
        <td>${irCell}</td>
        <td class="mono" style="font-size:10px">${bestFormatted}</td>
        <td class="mono" style="font-size:10px;color:rgba(255,255,255,0.55)">${lastFormatted}</td>
        <td class="mono" style="font-size:10px;color:rgba(255,255,255,0.45)">${gap}</td>
      </tr>`;
    }

    function buildStandingsHTML(data) {
      // Show ALL drivers — sorted by best lap within each class
      const maxPerClass = parseInt(getSetting('maxPerClass', '0')) || 0;

      // Group by class
      const classes = {};
      data.forEach(d => {
        const cls = d.carClass || 'Overall';
        if (!classes[cls]) classes[cls] = { color: d.carClassColor || '#fff', drivers: [] };
        classes[cls].drivers.push(d);
      });

      // Sort each class by iRacing class position (fallback to best lap, then iRating)
      Object.values(classes).forEach(cls => {
        cls.drivers.sort((a, b) => {
          if (a.disconnected && !b.disconnected) return 1;
          if (!a.disconnected && b.disconnected) return -1;
          // Use iRacing's class position when available
          if (a.classPosition > 0 && b.classPosition > 0) return a.classPosition - b.classPosition;
          if (a.classPosition > 0) return -1;
          if (b.classPosition > 0) return 1;
          // Fallback: sort by best lap time
          const aTime = (a.bestLap > 0 ? a.bestLap : (a.lastLap > 0 ? a.lastLap : Infinity));
          const bTime = (b.bestLap > 0 ? b.bestLap : (b.lastLap > 0 ? b.lastLap : Infinity));
          if (aTime === Infinity && bTime === Infinity) return (b.iRating || 0) - (a.iRating || 0);
          return aTime - bTime;
        });
        // Apply max per class limit
        if (maxPerClass > 0) cls.drivers = cls.drivers.slice(0, maxPerClass);
      });

      // Sort class names: known order first (GTP > LMP2 > GT3), then alphabetical
      const classOrder = ['GTP', 'LMDh', 'DPi', 'LMP2', 'LMP3', 'GT3', 'GTE', 'GT4', 'TCR', 'MX5'];
      const classNames = Object.keys(classes).sort((a, b) => {
        const ai = classOrder.findIndex(c => a.toUpperCase().includes(c));
        const bi = classOrder.findIndex(c => b.toUpperCase().includes(c));
        if (ai >= 0 && bi >= 0) return ai - bi;
        if (ai >= 0) return -1;
        if (bi >= 0) return 1;
        return a.localeCompare(b);
      });

      // If only one class, no headers needed
      if (classNames.length <= 1) {
        const drivers = classNames.length === 1 ? classes[classNames[0]].drivers : data;
        const leaderBest = drivers.find(d => d.bestLap > 0)?.bestLap || null;
        return drivers.map((d, i) => buildDriverRow(d, i + 1, leaderBest)).join('');
      }

      // Multiple classes — add a class header row before each group
      let html = '';
      classNames.forEach(cls => {
        const group = classes[cls];
        const color = group.color;
        const leaderBest = group.drivers.find(d => d.bestLap > 0)?.bestLap || null;

        // Class header row
        html += `<tr><td colspan="9" style="padding:6px 8px 3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid ${color};">
          <span style="color:${color};">${cls}</span>
          <span style="color:rgba(255,255,255,0.3);font-weight:400;margin-left:6px;">${group.drivers.length} cars</span>
        </td></tr>`;

        group.drivers.forEach((d, i) => {
          html += buildDriverRow(d, i + 1, leaderBest);
        });
      });

      return html;
    }

    function renderDemoStandings() {
      document.getElementById('standings-body').innerHTML = buildStandingsHTML(demoStandings);
    }

    renderDemoStandings();

    function connectBridge(channels) {
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { setTimeout(() => connectBridge(channels), 3000); return; }
      ws.onopen = () => {
        bridgeConnected = true;
        updateConnectionStatus();
        ws.send(JSON.stringify({ type: 'subscribe', channels }));
      };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'bridge-connected') { bridgeConnected = true; updateConnectionStatus(); }
          else if (msg.type === 'status') { iracingConnected = msg.iracing; updateConnectionStatus(); if (dataHandlers.status) dataHandlers.status(msg); }
          else if (msg.type === 'data' && dataHandlers[msg.channel]) { dataHandlers[msg.channel](msg.data); }
        } catch(e) {}
      };
      ws.onclose = () => { bridgeConnected = false; iracingConnected = false; updateConnectionStatus(); setTimeout(() => connectBridge(channels), 3000); };
      ws.onerror = () => { ws.close(); };
    }

    function onData(ch, fn) { dataHandlers[ch] = fn; }

    function updateConnectionStatus() {
      const el = document.getElementById('connection-status');
      const dis = document.getElementById('overlay-disconnected');
      if (!bridgeConnected) {
        if (el) el.innerHTML = '<span class="status-dot demo"></span> Demo Mode';
        if (dis) dis.style.display = 'none';
      } else if (!iracingConnected) {
        if (el) el.innerHTML = '<span class="status-dot waiting"></span> Waiting';
        if (dis) { dis.textContent = 'Waiting for iRacing...'; dis.style.display = 'flex'; }
        document.getElementById('standings-body').innerHTML = '';
      } else {
        if (el) el.innerHTML = '<span class="status-dot connected"></span> Live';
        if (dis) dis.style.display = 'none';
        document.getElementById('standings-body').innerHTML = '';
      }
    }

    let demoCleared = false;

    onData('standings', data => {
      if (!data || !data.length) return;
      if (!demoCleared) { demoCleared = true; }
      document.getElementById('standings-body').innerHTML = buildStandingsHTML(data);
    });

    connectBridge(['standings']);

    try {
      const { ipcRenderer } = require('electron');
      ipcRenderer.on('lock-state', (event, locked) => {
        document.body.style.pointerEvents = locked ? 'none' : 'auto';
        const header = document.querySelector('.overlay-header');
        if (header) header.style.cursor = locked ? 'default' : 'move';
      });
    } catch(e) {}
  </script>
</body>
</html>
