<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Standings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; color: #e8e6f0; }
    .overlay-panel { background: rgba(12,13,20,0.85); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; backdrop-filter: blur(12px); overflow: hidden; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); cursor: move; -webkit-app-region: drag; }
    .overlay-body { padding: 4px 0; }
    .overlay-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .overlay-table th { padding: 4px 8px; text-align: left; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.35); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .overlay-table td { padding: 4px 8px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
    .overlay-table tr.player-row { background: rgba(145,70,255,0.15); }
    .overlay-table tr.player-row td { color: #fff; font-weight: 600; }
    .pit-indicator { color: #f79009; font-weight: 700; font-size: 10px; }
    .mono { font-family: 'Consolas', 'Courier New', monospace; }
    .driver-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
    .driver-sub { font-size: 9px; color: rgba(255,255,255,0.35); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #3ecf8e; }
    .status-dot.disconnected { background: #f04438; }
    .status-dot.waiting { background: #f79009; }
    .status-dot.demo { background: #f79009; }
    .overlay-disconnected { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(12,13,20,0.9); color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 600; border-radius: 8px; }
  </style>
</head>
<body>
  <div id="overlay-root" style="position:relative;width:380px;">
    <div class="overlay-panel" style="width:380px;">
      <div class="overlay-header">
        <span>STANDINGS</span>
        <span id="connection-status"><span class="status-dot demo"></span> Demo Mode</span>
      </div>
      <div class="overlay-body">
        <table class="overlay-table">
          <thead><tr><th>P</th><th>#</th><th>Driver</th><th>Best Lap</th><th>Last Lap</th><th>Gap</th><th>PIT</th></tr></thead>
          <tbody id="standings-body"></tbody>
        </table>
      </div>
    </div>
    <div class="overlay-disconnected" id="overlay-disconnected"></div>
  </div>
  <script>
    const BRIDGE_URL = 'ws://localhost:9100';
    const MAX_ROWS = 15;
    let ws = null;
    let bridgeConnected = false;
    let iracingConnected = false;
    const dataHandlers = {};

    function formatLapTime(seconds) {
      if (!seconds || seconds <= 0) return '--';
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return mins > 0 ? mins + ':' + secs.toFixed(3).padStart(6, '0') : secs.toFixed(3);
    }

    // Demo data (shown until iRacing connects) — bestLap/lastLap as raw seconds
    const demoStandings = [
      { position: 0, classPosition: 0, carNumber: '1',  driverName: 'M. Verstappen', carMake: 'Dallara IR18', iRating: 7200, bestLap: 92.456, lastLap: 92.891, inPit: false, isPlayer: false },
      { position: 0, classPosition: 0, carNumber: '44', driverName: 'L. Hamilton',   carMake: 'Dallara IR18', iRating: 6850, bestLap: 92.690, lastLap: 92.990, inPit: false, isPlayer: false },
      { position: 0, classPosition: 0, carNumber: '16', driverName: 'C. Leclerc',    carMake: 'Dallara IR18', iRating: 6450, bestLap: 93.012, lastLap: 93.456, inPit: false, isPlayer: false },
      { position: 0, classPosition: 0, carNumber: '99', driverName: 'You',           carMake: 'Dallara IR18', iRating: 3210, bestLap: 93.456, lastLap: 93.789, inPit: false, isPlayer: true  },
      { position: 0, classPosition: 0, carNumber: '55', driverName: 'C. Sainz',      carMake: 'Dallara IR18', iRating: 5900, bestLap: 93.890, lastLap: 94.012, inPit: false, isPlayer: false },
      { position: 0, classPosition: 0, carNumber: '4',  driverName: 'L. Norris',     carMake: 'Dallara IR18', iRating: 5600, bestLap: 94.123, lastLap: 94.567, inPit: true,  isPlayer: false },
      { position: 0, classPosition: 0, carNumber: '81', driverName: 'O. Piastri',    carMake: 'Dallara IR18', iRating: 5300, bestLap: 94.678, lastLap: 95.001, inPit: false, isPlayer: false },
      { position: 0, classPosition: 0, carNumber: '63', driverName: 'G. Russell',    carMake: 'Dallara IR18', iRating: 5100, bestLap: 95.012, lastLap: 95.234, inPit: false, isPlayer: false },
    ];

    function sortAndRankStandings(data) {
      // If any car has position > 0, sort by position (race mode)
      const hasPositions = data.some(d => d.position > 0);
      if (hasPositions) {
        return [...data].sort((a, b) => {
          const pa = a.classPosition > 0 ? a.classPosition : (a.position > 0 ? a.position : 9999);
          const pb = b.classPosition > 0 ? b.classPosition : (b.position > 0 ? b.position : 9999);
          return pa - pb;
        });
      }
      // Practice mode: sort by best lap (fastest first, no-lap cars at end)
      return [...data].sort((a, b) => {
        if (!a.bestLap || a.bestLap <= 0) return 1;
        if (!b.bestLap || b.bestLap <= 0) return -1;
        return a.bestLap - b.bestLap;
      });
    }

    function buildStandingsRows(data, limit) {
      const sorted = sortAndRankStandings(data);
      const leaderBest = sorted[0] && sorted[0].bestLap > 0 ? sorted[0].bestLap : null;

      const playerIdx = sorted.findIndex(d => d.isPlayer);
      let startIdx = 0;
      if (sorted.length > limit && playerIdx >= 0) {
        startIdx = Math.max(0, Math.min(playerIdx - Math.floor(limit / 2), sorted.length - limit));
      }
      const visible = sorted.slice(startIdx, startIdx + limit);

      return visible.map((d, i) => {
        const rank = startIdx + i + 1;
        const pos = d.classPosition > 0 ? d.classPosition : (d.position > 0 ? d.position : rank);
        const bestFormatted = formatLapTime(d.bestLap);
        const lastFormatted = formatLapTime(d.lastLap);

        let gap = 'Leader';
        if (!d.isPlayer && leaderBest && d.bestLap > 0 && rank > 1) {
          const diff = d.bestLap - leaderBest;
          gap = '+' + diff.toFixed(3);
        } else if (rank === 1 || (d.bestLap > 0 && leaderBest && d.bestLap === leaderBest)) {
          gap = 'Leader';
        } else if (!d.bestLap || d.bestLap <= 0) {
          gap = '--';
        }

        const sub = [d.carMake, d.iRating ? d.iRating + ' iR' : ''].filter(Boolean).join(' · ');

        return `<tr class="${d.isPlayer ? 'player-row' : ''}">
          <td class="mono" style="font-weight:700">${pos}</td>
          <td style="font-weight:600">${d.carNumber || ''}</td>
          <td>
            <div class="driver-name">${d.driverName || ''}</div>
            ${sub ? `<div class="driver-sub">${sub}</div>` : ''}
          </td>
          <td class="mono" style="font-size:11px">${bestFormatted}</td>
          <td class="mono" style="font-size:11px">${lastFormatted}</td>
          <td class="mono" style="font-size:11px;color:rgba(255,255,255,0.5)">${gap}</td>
          <td>${d.inPit ? '<span class="pit-indicator">PIT</span>' : ''}</td>
        </tr>`;
      }).join('');
    }

    function renderDemoStandings() {
      const tbody = document.getElementById('standings-body');
      tbody.innerHTML = buildStandingsRows(demoStandings, MAX_ROWS);
    }

    renderDemoStandings();

    function connectBridge(channels) {
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { setTimeout(() => connectBridge(channels), 3000); return; }
      ws.onopen = () => {
        bridgeConnected = true;
        updateConnectionStatus();
        ws.send(JSON.stringify({ type: 'subscribe', channels }));
      };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'bridge-connected') { bridgeConnected = true; updateConnectionStatus(); } else if (msg.type === 'status') {
            iracingConnected = msg.iracing;
            updateConnectionStatus();
            if (dataHandlers.status) dataHandlers.status(msg);
          } else if (msg.type === 'data' && dataHandlers[msg.channel]) {
            dataHandlers[msg.channel](msg.data);
          }
        } catch(e) {}
      };
      ws.onclose = () => {
        bridgeConnected = false;
        iracingConnected = false;
        updateConnectionStatus();
        setTimeout(() => connectBridge(channels), 3000);
      };
      ws.onerror = () => { ws.close(); };
    }

    function onData(ch, fn) { dataHandlers[ch] = fn; }

    function updateConnectionStatus() {
      const el = document.getElementById('connection-status');
      const dis = document.getElementById('overlay-disconnected');
      if (!bridgeConnected) {
        if (el) el.innerHTML = '<span class="status-dot demo"></span> Demo Mode';
        if (dis) dis.style.display = 'none';
      } else if (!iracingConnected) {
        if (el) el.innerHTML = '<span class="status-dot waiting"></span> Waiting';
        if (dis) { dis.textContent = 'Waiting for iRacing...'; dis.style.display = 'flex'; }
        document.getElementById('standings-body').innerHTML = '';
      } else {
        if (el) el.innerHTML = '<span class="status-dot connected"></span> Live';
        if (dis) dis.style.display = 'none';
        document.getElementById('standings-body').innerHTML = '';
      }
    }

    let demoCleared = false;

    onData('standings', data => {
      const tbody = document.getElementById('standings-body');
      if (!data || !data.length) return;

      if (!demoCleared) {
        demoCleared = true;
        tbody.innerHTML = '';
      }

      tbody.innerHTML = buildStandingsRows(data, MAX_ROWS);
    });

    connectBridge(['standings']);

    // Lock state support
    try {
      const { ipcRenderer } = require('electron');
      ipcRenderer.on('lock-state', (event, locked) => {
        document.body.style.pointerEvents = locked ? 'none' : 'auto';
        const header = document.querySelector('.overlay-header');
        if (header) header.style.cursor = locked ? 'default' : 'move';
      });
    } catch(e) {}
  </script>
</body>
</html>
