<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stint Laps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; color: #e8e6f0; }
    .overlay-panel { background: rgba(12,13,20,0.88); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; backdrop-filter: blur(12px); overflow: hidden; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #3ecf8e; }
    .status-dot.waiting { background: #f79009; }
    .status-dot.demo { background: #f79009; }
    .driver-selector { padding: 4px 10px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .driver-selector select { width: 100%; background: rgba(255,255,255,0.06); color: #e8e6f0; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 3px 6px; font-size: 10px; font-family: 'JetBrains Mono', 'Consolas', monospace; outline: none; cursor: pointer; }
    .driver-selector select:hover { border-color: rgba(255,255,255,0.2); }
    .driver-selector select option { background: #1a1b26; color: #e8e6f0; }
    .stint-body { padding: 10px 14px; }
    .stint-summary { display: flex; gap: 14px; align-items: center; margin-bottom: 8px; }
    .stint-big { text-align: center; }
    .stint-big-value { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', 'Consolas', monospace; color: #fff; line-height: 1; }
    .stint-big-label { font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .stint-stats { display: flex; gap: 12px; flex: 1; }
    .stint-stat { }
    .stint-stat-label { font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.35); }
    .stint-stat-value { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; color: rgba(255,255,255,0.85); }
    .stint-stat-value.fastest { color: #9146ff; }
    .divider-v { width: 1px; height: 36px; background: rgba(255,255,255,0.08); flex-shrink: 0; }
    .lap-list { overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent; }
    .lap-list::-webkit-scrollbar { width: 3px; }
    .lap-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    .lap-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 4px; font-size: 11px; font-family: 'JetBrains Mono', monospace; border-radius: 4px; }
    .lap-row:nth-child(odd) { background: rgba(255,255,255,0.02); }
    .lap-row.fastest { background: rgba(145,70,255,0.12); }
    .lap-num { color: rgba(255,255,255,0.4); font-size: 10px; width: 30px; }
    .lap-session { font-size: 9px; font-weight: 700; width: 16px; text-align: center; border-radius: 3px; padding: 0 2px; }
    .lap-session.practice { color: #8b8a9e; background: rgba(139,138,158,0.15); }
    .lap-session.qualify { color: #f7c948; background: rgba(247,201,72,0.15); }
    .lap-session.race { color: #3ecf8e; background: rgba(62,207,142,0.15); }
    .lap-time { color: rgba(255,255,255,0.85); font-weight: 600; flex: 1; }
    .lap-time.fastest { color: #9146ff; font-weight: 700; }
    .lap-delta { font-size: 10px; width: 60px; text-align: right; }
    .lap-delta.faster { color: #3ecf8e; }
    .lap-delta.slower { color: #f04438; }
    .lap-tabs { display: flex; gap: 2px; padding: 4px 14px 0; }
    .lap-tab { padding: 3px 8px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.04); border-radius: 4px 4px 0 0; cursor: pointer; transition: all 0.15s; }
    .lap-tab.active { color: #e8e6f0; background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <div class="overlay-panel">
    <div class="overlay-header">
      <span>SESSION LAPS</span>
      <span id="connection-status"><span class="status-dot demo"></span></span>
    </div>
    <div class="driver-selector">
      <select id="driver-select">
        <option value="">-- waiting for data --</option>
      </select>
    </div>
    <div class="lap-tabs">
      <div class="lap-tab active" data-filter="all" onclick="setFilter('all')">All</div>
      <div class="lap-tab" data-filter="practice" onclick="setFilter('practice')">P</div>
      <div class="lap-tab" data-filter="qualify" onclick="setFilter('qualify')">Q</div>
      <div class="lap-tab" data-filter="race" onclick="setFilter('race')">R</div>
    </div>
    <div class="stint-body">
      <div class="stint-summary">
        <div class="stint-big">
          <div class="stint-big-value" id="stint-laps">0</div>
          <div class="stint-big-label">Laps</div>
        </div>
        <div class="divider-v"></div>
        <div class="stint-stats">
          <div class="stint-stat">
            <div class="stint-stat-label">Best</div>
            <div class="stint-stat-value fastest" id="stint-best">--</div>
          </div>
          <div class="stint-stat">
            <div class="stint-stat-label">Last</div>
            <div class="stint-stat-value" id="stint-last">--</div>
          </div>
          <div class="stint-stat">
            <div class="stint-stat-label">Avg</div>
            <div class="stint-stat-value" id="stint-avg">--</div>
          </div>
        </div>
      </div>
      <div class="lap-list" id="lap-list"></div>
    </div>
  </div>

  <script>
    const _fs = require('fs');
    const _logPath = require('path').join(require('os').homedir(), 'atleta-bridge.log');
    function log(msg) {
      const line = '[' + new Date().toISOString() + '] ' + msg + '\n';
      console.log(msg);
      try { _fs.appendFileSync(_logPath, line); } catch(e) {}
    }

    const BRIDGE_URL = 'ws://localhost:9100';
    let ws = null;
    let bridgeConnected = false;
    let iracingConnected = false;
    const dataHandlers = {};

    function connectBridge(channels) {
      log('[StintLaps] Connecting to ' + BRIDGE_URL);
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { log('[StintLaps] WS error: ' + e.message); setTimeout(() => connectBridge(channels), 3000); return; }
      ws.onopen = () => { log('[StintLaps] Connected'); bridgeConnected = true; updateStatus(); ws.send(JSON.stringify({ type: 'subscribe', channels })); };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'bridge-connected') { log('[StintLaps] Bridge confirmed'); bridgeConnected = true; updateStatus(); }
          else if (msg.type === 'status') { log('[StintLaps] iRacing: ' + msg.iracing); iracingConnected = msg.iracing; updateStatus(); }
          else if (msg.type === 'data' && dataHandlers[msg.channel]) { dataHandlers[msg.channel](msg.data); }
        } catch(e) {}
      };
      ws.onclose = () => { log('[StintLaps] Disconnected'); bridgeConnected = false; iracingConnected = false; updateStatus(); setTimeout(() => connectBridge(channels), 3000); };
      ws.onerror = () => { log('[StintLaps] WS error'); ws.close(); };
    }
    function onData(ch, fn) { dataHandlers[ch] = fn; }
    function updateStatus() {
      const el = document.getElementById('connection-status');
      if (!bridgeConnected) { if (el) el.innerHTML = '<span class="status-dot demo"></span>'; }
      else if (!iracingConnected) { if (el) el.innerHTML = '<span class="status-dot waiting"></span>'; }
      else { if (el) el.innerHTML = '<span class="status-dot connected"></span>'; }
    }

    function formatLapTime(t) {
      if (!t || t <= 0) return '--';
      const m = Math.floor(t / 60);
      const s = (t % 60).toFixed(3);
      return m > 0 ? m + ':' + s.padStart(6, '0') : s;
    }

    // All-driver lap tracking
    // Map: carIdx -> { name, number, class, lastLap (previous value), laps: [{ time, session }] }
    let allDrivers = new Map();
    let selectedCarIdx = -1;   // currently selected driver in dropdown
    let manualSelect = false;  // true if user manually picked a driver (don't auto-follow)
    let currentSessionType = '';
    let currentSessionNum = -1;

    function sessionTag(type) {
      if (!type) return { label: '?', cls: 'practice' };
      const t = type.toLowerCase();
      if (t.includes('race')) return { label: 'R', cls: 'race' };
      if (t.includes('qual') || t.includes('lone')) return { label: 'Q', cls: 'qualify' };
      return { label: 'P', cls: 'practice' };
    }

    let activeFilter = 'all';

    function setFilter(filter) {
      activeFilter = filter;
      document.querySelectorAll('.lap-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('.lap-tab[data-filter="' + filter + '"]').classList.add('active');
      renderLaps();
    }

    function getSelectedLaps() {
      const driver = allDrivers.get(selectedCarIdx);
      if (!driver) return [];
      if (activeFilter === 'all') return driver.laps;
      return driver.laps.filter(l => sessionTag(l.session).cls === activeFilter);
    }

    function renderLaps() {
      const filtered = getSelectedLaps();
      document.getElementById('stint-laps').textContent = filtered.length || 0;

      if (filtered.length === 0) {
        document.getElementById('stint-best').textContent = '--';
        document.getElementById('stint-last').textContent = '--';
        document.getElementById('stint-avg').textContent = '--';
        document.getElementById('lap-list').innerHTML = '';
        autoResize();
        return;
      }

      const times = filtered.map(l => l.time);
      const best = Math.min(...times);
      const last = times[times.length - 1];
      const avg = times.reduce((a, b) => a + b, 0) / times.length;

      document.getElementById('stint-best').textContent = formatLapTime(best);
      document.getElementById('stint-last').textContent = formatLapTime(last);
      document.getElementById('stint-avg').textContent = formatLapTime(avg);

      // Render lap list (newest on top)
      const listEl = document.getElementById('lap-list');
      let html = '';
      for (let i = filtered.length - 1; i >= 0; i--) {
        const lap = filtered[i];
        const isBest = lap.time === best;
        const delta = lap.time - best;
        const deltaStr = delta === 0 ? '' : (delta > 0 ? '+' + delta.toFixed(3) : delta.toFixed(3));
        const deltaClass = delta === 0 ? '' : (delta > 0 ? 'slower' : 'faster');
        const tag = sessionTag(lap.session);
        html += `<div class="lap-row ${isBest ? 'fastest' : ''}">
            <span class="lap-num">L${i + 1}</span>
            <span class="lap-session ${tag.cls}">${tag.label}</span>
            <span class="lap-time ${isBest ? 'fastest' : ''}">${formatLapTime(lap.time)}</span>
            <span class="lap-delta ${deltaClass}">${deltaStr}</span>
          </div>`;
      }
      listEl.innerHTML = html;
      autoResize();
    }

    function autoResize() {
      try {
        const { ipcRenderer } = require('electron');
        const panel = document.querySelector('.overlay-panel');
        if (panel) {
          const contentHeight = panel.scrollHeight;
          const minHeight = 200;
          const maxHeight = 600;
          const newHeight = Math.min(maxHeight, Math.max(minHeight, contentHeight + 4));
          ipcRenderer.send('auto-resize-height', newHeight);
        }
      } catch(e) {}
    }

    // Build/update the driver dropdown from allDrivers map
    function updateDriverDropdown(spectatedIdx) {
      const sel = document.getElementById('driver-select');
      const prevValue = sel.value;

      // Sort drivers: spectated first, then player, then by car number
      const sorted = [...allDrivers.entries()].sort((a, b) => {
        if (a[1]._isSpectated && !b[1]._isSpectated) return -1;
        if (!a[1]._isSpectated && b[1]._isSpectated) return 1;
        if (a[1]._isPlayer && !b[1]._isPlayer) return -1;
        if (!a[1]._isPlayer && b[1]._isPlayer) return 1;
        return (parseInt(a[1].number) || 999) - (parseInt(b[1].number) || 999);
      });

      // Only rebuild if driver list changed
      const optionKeys = sorted.map(([idx]) => String(idx)).join(',');
      if (sel.dataset.keys === optionKeys) {
        // Just update selection if needed
        if (!manualSelect && spectatedIdx >= 0 && String(sel.value) !== String(spectatedIdx)) {
          sel.value = String(spectatedIdx);
          selectedCarIdx = spectatedIdx;
          renderLaps();
        }
        return;
      }
      sel.dataset.keys = optionKeys;

      sel.innerHTML = '';
      for (const [idx, driver] of sorted) {
        const opt = document.createElement('option');
        opt.value = idx;
        const lapCount = driver.laps.length;
        const prefix = driver._isSpectated ? '\u25B6 ' : (driver._isPlayer ? '\u2605 ' : '');
        opt.textContent = prefix + '#' + driver.number + ' ' + driver.name + (lapCount ? ' (' + lapCount + ')' : '');
        sel.appendChild(opt);
      }

      // Restore selection
      if (manualSelect && allDrivers.has(selectedCarIdx)) {
        sel.value = String(selectedCarIdx);
      } else if (spectatedIdx >= 0) {
        sel.value = String(spectatedIdx);
        selectedCarIdx = spectatedIdx;
      } else if (prevValue && allDrivers.has(Number(prevValue))) {
        sel.value = prevValue;
      }
    }

    // Handle manual driver selection
    document.getElementById('driver-select').addEventListener('change', function() {
      const idx = Number(this.value);
      if (isNaN(idx) || !allDrivers.has(idx)) return;
      selectedCarIdx = idx;
      manualSelect = true;
      renderLaps();
    });

    onData('standings', data => {
      if (!data || !data.length) return;

      const spectated = data.find(d => d.isSpectated) || data.find(d => d.isPlayer);
      const spectatedIdx = spectated ? spectated.carIdx : -1;

      // Auto-follow: if spectated driver changed and user hasn't manually selected
      if (!manualSelect && spectatedIdx >= 0 && spectatedIdx !== selectedCarIdx) {
        selectedCarIdx = spectatedIdx;
      }

      // Process every driver: detect lastLap changes
      for (const d of data) {
        const idx = d.carIdx;
        const currentLastLap = d.lastLap || 0;

        if (!allDrivers.has(idx)) {
          // New driver — initialize
          allDrivers.set(idx, {
            name: d.driverName || ('Car ' + d.carNumber),
            number: d.carNumber || '?',
            class: d.carClass || '',
            lastLap: currentLastLap,
            laps: [],
            _isPlayer: !!d.isPlayer,
            _isSpectated: !!d.isSpectated,
          });
        } else {
          const entry = allDrivers.get(idx);
          // Update metadata
          entry._isPlayer = !!d.isPlayer;
          entry._isSpectated = !!d.isSpectated;
          if (d.driverName) entry.name = d.driverName;

          // Detect new lap: lastLap changed and both old and new are valid
          if (currentLastLap > 0 && currentLastLap !== entry.lastLap && entry.lastLap > 0) {
            entry.laps.push({ time: currentLastLap, session: currentSessionType });
          }
          if (currentLastLap > 0) entry.lastLap = currentLastLap;
        }
      }

      updateDriverDropdown(spectatedIdx);

      // Re-render if the selected driver got a new lap (or on any update for freshness)
      renderLaps();
    });

    onData('session', data => {
      if (!data) return;
      currentSessionType = data.eventType || '';
      const sn = data.sessionNum ?? -1;
      if (sn !== currentSessionNum && currentSessionNum >= 0) {
        // Session changed — clear all laps if going backwards or new session
        // Keep laps across qualify->race, clear on practice->qualify
        const prevTag = sessionTag(currentSessionType);
        // Actually, just let laps accumulate across all sessions (P/Q/R tags distinguish them)
        // Only clear if session number went DOWN (rejoin/restart)
        if (sn < currentSessionNum) {
          for (const driver of allDrivers.values()) {
            driver.laps = [];
            driver.lastLap = -1;
          }
          log('[StintLaps] Session number decreased (' + currentSessionNum + ' -> ' + sn + '), cleared all laps');
        }
      }
      currentSessionNum = sn;
      renderLaps();
    });

    // Restore state from sessionStorage (survives reload)
    try {
      const saved = sessionStorage.getItem('_stintState');
      if (saved) {
        const s = JSON.parse(saved);
        if (s.allDrivers) {
          allDrivers = new Map(s.allDrivers);
        }
        if (s.selectedCarIdx !== undefined) selectedCarIdx = s.selectedCarIdx;
        if (s.manualSelect !== undefined) manualSelect = s.manualSelect;
        if (s.currentSessionType) currentSessionType = s.currentSessionType;
        if (s.currentSessionNum !== undefined) currentSessionNum = s.currentSessionNum;
        if (s.activeFilter) { activeFilter = s.activeFilter; setFilter(s.activeFilter); }
        renderLaps();
        sessionStorage.removeItem('_stintState');
      }
    } catch(e) {}

    function serializeState() {
      return {
        allDrivers: [...allDrivers.entries()],
        selectedCarIdx, manualSelect,
        currentSessionType, currentSessionNum, activeFilter,
      };
    }

    // Global state functions for backup/restore across updates
    window.__getState = () => serializeState();
    window.__restoreState = (s) => {
      if (s.allDrivers) allDrivers = new Map(s.allDrivers);
      if (s.selectedCarIdx !== undefined) selectedCarIdx = s.selectedCarIdx;
      if (s.manualSelect !== undefined) manualSelect = s.manualSelect;
      if (s.currentSessionType) currentSessionType = s.currentSessionType;
      if (s.currentSessionNum !== undefined) currentSessionNum = s.currentSessionNum;
      if (s.activeFilter) { activeFilter = s.activeFilter; setFilter(s.activeFilter); }
      renderLaps();
    };

    connectBridge(['standings', 'session']);

    // Drag support
    try {
      const { ipcRenderer } = require('electron');
      // Save state before reload
      ipcRenderer.on('will-reload', () => {
        try {
          sessionStorage.setItem('_stintState', JSON.stringify(serializeState()));
        } catch(e) {}
      });
      ipcRenderer.on('lock-state', () => {});
      let _dragging = false, _dragStartX = 0, _dragStartY = 0;
      const dragHeader = document.querySelector('.overlay-header');
      if (dragHeader) {
        dragHeader.style.cursor = 'move';
        dragHeader.addEventListener('mousedown', (e) => {
          if (e.button !== 0) return;
          _dragging = true;
          _dragStartX = e.screenX;
          _dragStartY = e.screenY;
          e.preventDefault();
        });
      }
      document.addEventListener('mousemove', (e) => {
        if (!_dragging) return;
        ipcRenderer.send('drag-overlay', e.screenX - _dragStartX, e.screenY - _dragStartY);
        _dragStartX = e.screenX;
        _dragStartY = e.screenY;
      });
      document.addEventListener('mouseup', () => { _dragging = false; });
      document.addEventListener('mouseleave', () => { _dragging = false; });

      // Click-through: transparent areas pass clicks through, visible panel captures them
      let _mouseOverPanel = false;
      document.addEventListener('mousemove', (e) => {
        if (_dragging) return;
        const panel = document.querySelector('.overlay-panel');
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const over = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
        if (over && !_mouseOverPanel) {
          _mouseOverPanel = true;
          ipcRenderer.send('set-ignore-mouse', false);
        } else if (!over && _mouseOverPanel) {
          _mouseOverPanel = false;
          ipcRenderer.send('set-ignore-mouse', true);
        }
      });
      document.addEventListener('mouseleave', () => {
        if (_dragging) return;
        if (_mouseOverPanel) {
          _mouseOverPanel = false;
          ipcRenderer.send('set-ignore-mouse', true);
        }
      });
    } catch(e) {}
  </script>
</body>
</html>
