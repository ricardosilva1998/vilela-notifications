<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Relative</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; color: #e8e6f0; }
    .overlay-panel { background: rgba(12,13,20,0.85); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; backdrop-filter: blur(12px); overflow: hidden; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); cursor: move; -webkit-app-region: drag; }
    .overlay-body { padding: 4px 0; }
    .overlay-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .overlay-table th { padding: 4px 8px; text-align: left; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.35); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .overlay-table td { padding: 5px 8px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .overlay-table tr.player-row { background: rgba(145,70,255,0.2); }
    .overlay-table tr.player-row td { color: #fff; font-weight: 700; }
    .ahead { color: #3ecf8e; }
    .behind { color: #f04438; }
    .mono { font-family: 'Consolas', 'Courier New', monospace; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #3ecf8e; }
    .status-dot.disconnected { background: #f04438; }
    .status-dot.waiting { background: #f79009; }
    .status-dot.demo { background: #f79009; }
    .overlay-disconnected { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(12,13,20,0.9); color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 600; border-radius: 8px; }
  </style>
</head>
<body>
  <div id="overlay-root" style="position:relative;width:260px;">
    <div class="overlay-panel" style="width:260px;">
      <div class="overlay-header">
        <span>RELATIVE</span>
        <span id="connection-status"><span class="status-dot demo"></span> Demo Mode</span>
      </div>
      <div class="overlay-body">
        <table class="overlay-table">
          <thead><tr><th>P</th><th>#</th><th>Driver</th><th>Gap</th></tr></thead>
          <tbody id="relative-body"></tbody>
        </table>
      </div>
    </div>
    <div class="overlay-disconnected" id="overlay-disconnected"></div>
  </div>
  <script>
    const BRIDGE_URL = 'ws://localhost:9100';
    const MAX_AHEAD = 5;
    const MAX_BEHIND = 5;
    let ws = null;
    let bridgeConnected = false;
    let iracingConnected = false;
    const dataHandlers = {};

    // Demo data (shown until iRacing connects) — sorted by distGap
    const demoRelative = {
      playerCarIdx: 4,
      cars: [
        { carIdx: 2, carNumber: '16', driverName: 'C. Leclerc', gap: -3.567, distGap: -3.567, position: 3, classPosition: 3, inPit: false, isPlayer: false },
        { carIdx: 3, carNumber: '44', driverName: 'L. Hamilton', gap: -1.234, distGap: -1.234, position: 2, classPosition: 2, inPit: false, isPlayer: false },
        { carIdx: 4, carNumber: '99', driverName: 'You',         gap: 0,      distGap: 0,      position: 4, classPosition: 4, inPit: false, isPlayer: true  },
        { carIdx: 5, carNumber: '55', driverName: 'C. Sainz',    gap: 2.233,  distGap: 2.233,  position: 5, classPosition: 5, inPit: false, isPlayer: false },
        { carIdx: 6, carNumber: '4',  driverName: 'L. Norris',   gap: 4.566,  distGap: 4.566,  position: 6, classPosition: 6, inPit: true,  isPlayer: false },
      ]
    };

    function formatRelativeGap(distGap) {
      const abs = Math.abs(distGap).toFixed(3);
      return distGap < 0 ? '-' + abs + 's' : '+' + abs + 's';
    }

    function buildRelativeRows(data) {
      const { cars } = data;
      // cars is sorted by distGap; negatives = ahead, positives = behind
      const playerCar = cars.find(c => c.isPlayer);
      const ahead = cars.filter(c => !c.isPlayer && c.distGap < 0).slice(-MAX_AHEAD); // closest ahead last
      const behind = cars.filter(c => !c.isPlayer && c.distGap > 0).slice(0, MAX_BEHIND);

      const rows = [];

      for (const d of ahead) {
        const pos = d.classPosition > 0 ? d.classPosition : (d.position > 0 ? d.position : '');
        rows.push(`<tr>
          <td class="mono" style="font-weight:700">${pos}</td>
          <td style="font-weight:600">${d.carNumber || ''}</td>
          <td style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px">${d.driverName || ''}</td>
          <td class="mono ahead" style="font-size:11px">${formatRelativeGap(d.distGap)}</td>
        </tr>`);
      }

      // Player row
      const playerPos = playerCar ? (playerCar.classPosition > 0 ? playerCar.classPosition : (playerCar.position > 0 ? playerCar.position : '')) : '';
      const playerNum = playerCar ? (playerCar.carNumber || '') : '';
      rows.push(`<tr class="player-row">
        <td class="mono" style="font-weight:700">${playerPos}</td>
        <td style="font-weight:700">${playerNum}</td>
        <td>YOU</td>
        <td class="mono" style="font-size:11px">—</td>
      </tr>`);

      for (const d of behind) {
        const pos = d.classPosition > 0 ? d.classPosition : (d.position > 0 ? d.position : '');
        rows.push(`<tr>
          <td class="mono" style="font-weight:700">${pos}</td>
          <td style="font-weight:600">${d.carNumber || ''}</td>
          <td style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px">${d.driverName || ''}</td>
          <td class="mono behind" style="font-size:11px">${formatRelativeGap(d.distGap)}</td>
        </tr>`);
      }

      return rows.join('');
    }

    function renderDemoRelative() {
      const tbody = document.getElementById('relative-body');
      tbody.innerHTML = buildRelativeRows(demoRelative);
    }

    renderDemoRelative();

    function connectBridge(channels) {
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { setTimeout(() => connectBridge(channels), 3000); return; }
      ws.onopen = () => {
        bridgeConnected = true;
        updateConnectionStatus();
        ws.send(JSON.stringify({ type: 'subscribe', channels }));
      };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'bridge-connected') { bridgeConnected = true; updateConnectionStatus(); } else if (msg.type === 'status') {
            iracingConnected = msg.iracing;
            updateConnectionStatus();
          } else if (msg.type === 'data' && dataHandlers[msg.channel]) {
            dataHandlers[msg.channel](msg.data);
          }
        } catch(e) {}
      };
      ws.onclose = () => {
        bridgeConnected = false;
        iracingConnected = false;
        updateConnectionStatus();
        setTimeout(() => connectBridge(channels), 3000);
      };
      ws.onerror = () => { ws.close(); };
    }

    function onData(ch, fn) { dataHandlers[ch] = fn; }

    function updateConnectionStatus() {
      const el = document.getElementById('connection-status');
      const dis = document.getElementById('overlay-disconnected');
      if (!bridgeConnected) {
        if (el) el.innerHTML = '<span class="status-dot demo"></span> Demo Mode';
        if (dis) dis.style.display = 'none';
      } else if (!iracingConnected) {
        if (el) el.innerHTML = '<span class="status-dot waiting"></span> Waiting';
        if (dis) { dis.textContent = 'Waiting for iRacing...'; dis.style.display = 'flex'; }
        document.getElementById('relative-body').innerHTML = '';
      } else {
        if (el) el.innerHTML = '<span class="status-dot connected"></span> Live';
        if (dis) dis.style.display = 'none';
        document.getElementById('relative-body').innerHTML = '';
      }
    }

    let demoCleared = false;

    onData('relative', data => {
      const tbody = document.getElementById('relative-body');
      if (!data || !data.cars) return;

      if (!demoCleared) {
        demoCleared = true;
        tbody.innerHTML = '';
      }

      tbody.innerHTML = buildRelativeRows(data);
    });

    connectBridge(['relative']);

    // Lock state support
    try {
      const { ipcRenderer } = require('electron');
      ipcRenderer.on('lock-state', (event, locked) => {
        document.body.style.pointerEvents = locked ? 'none' : 'auto';
        const header = document.querySelector('.overlay-header');
        if (header) header.style.cursor = locked ? 'default' : 'move';
      });
    } catch(e) {}
  </script>
</body>
</html>
