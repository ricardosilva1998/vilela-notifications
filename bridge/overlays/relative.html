<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Relative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; color: #e8e6f0; font-size: 11px; scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; }
    .overlay-panel { background: rgba(12,13,20,0.88); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; backdrop-filter: blur(12px); overflow: hidden; width: 100%; height: 100vh; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); cursor: move; -webkit-app-region: drag; }
    .overlay-body { padding: 4px 0; }
    .overlay-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .overlay-table th { padding: 3px 6px; text-align: left; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.3); border-bottom: 1px solid rgba(255,255,255,0.06); white-space: nowrap; }
    .overlay-table td { padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; white-space: nowrap; }
    .overlay-table tr.player-row { background: rgba(145,70,255,0.2); }
    .overlay-table tr.player-row td { color: #fff; font-weight: 700; }
    .overlay-table tr.disconnected { opacity: 0.35; }
    .ahead { color: #3ecf8e; }
    .behind { color: #f04438; }
    .mono { font-family: 'JetBrains Mono', 'Consolas', monospace; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #3ecf8e; }
    .status-dot.disconnected { background: #f04438; }
    .status-dot.waiting { background: #f79009; }
    .status-dot.demo { background: #f79009; }
    .overlay-disconnected { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(12,13,20,0.9); color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 600; border-radius: 8px; }
    .class-badge { display: inline-block; padding: 1px 4px; border-radius: 3px; font-size: 8px; font-weight: 700; letter-spacing: 0.5px; }
    .license { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; }
    .irating { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.6); }
    .flag { font-size: 12px; line-height: 1; }
    .flag-img { width: 16px; height: 12px; vertical-align: middle; border-radius: 1px; }
    .brand-logo { width: 22px; height: 22px; display: inline-block; background-image: url('logos/car-icons-sprite.png'); background-size: 1024px 1024px; background-repeat: no-repeat; opacity: 0.85; vertical-align: middle; }
  </style>
</head>
<body>
  <div id="overlay-root" style="position:relative;width:100%;">
    <div class="overlay-panel" style="width:100%;">
      <div class="overlay-header">
        <span>RELATIVE</span>
        <span id="connection-status"><span class="status-dot demo"></span> Demo Mode</span>
      </div>
      <div id="session-header" style="display:none; padding: 4px 8px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 9px; color: rgba(255,255,255,0.5); font-family: 'JetBrains Mono', monospace; display: flex; gap: 8px; flex-wrap: wrap;"></div>
      <div class="overlay-body">
        <table class="overlay-table">
          <thead id="relative-head"></thead>
          <tbody id="relative-body"></tbody>
        </table>
      </div>
    </div>
    <div class="overlay-disconnected" id="overlay-disconnected"></div>
  </div>
  <script>
    // Load settings
    let _overlaySettings = {};
    try {
      const fs = require('fs');
      const path = require('path');
      const os = require('os');
      const settingsFile = path.join(os.homedir(), 'Documents', 'Atleta Bridge', 'settings.json');
      if (fs.existsSync(settingsFile)) {
        const all = JSON.parse(fs.readFileSync(settingsFile, 'utf8'));
        _overlaySettings = (all.overlayCustom && all.overlayCustom.relative) || {};
      }
    } catch(e) {}
    function getSetting(k, d) { return _overlaySettings[k] !== undefined ? _overlaySettings[k] : d; }

    // Configurable columns
    const ALL_COLUMNS = [
      { id: 'pos',     label: 'P' },
      { id: 'flag',    label: 'Flag' },
      { id: 'number',  label: '#' },
      { id: 'logo',    label: 'Logo' },
      { id: 'name',    label: 'Name' },
      { id: 'license', label: 'Lic' },
      { id: 'irating', label: 'iR' },
      { id: 'gap',     label: 'Gap' },
    ];
    const DEFAULT_COLUMNS = ['pos', 'flag', 'number', 'logo', 'name', 'license', 'irating', 'gap'];
    // Helper: getSetting may return native object (from settings.json) or string
    function parseSetting(val) { return typeof val === 'string' ? JSON.parse(val) : val; }

    // Migrate old column key names to new ones
    const KEY_MIGRATION = { position: 'pos', carNumber: 'number', driverName: 'name', bestLap: 'best', lastLap: 'last' };
    function migrateKey(k) { return KEY_MIGRATION[k] || k; }
    function migrateKeys(arr) { return arr.map(migrateKey); }
    function migrateEnabled(obj) {
      const out = {};
      Object.entries(obj).forEach(([k, v]) => { out[migrateKey(k)] = v; });
      return out;
    }

    let enabledColumns;
    try {
      const allColumns = migrateKeys(parseSetting(getSetting('columns', DEFAULT_COLUMNS)));
      let colEnabled = {};
      try { colEnabled = migrateEnabled(parseSetting(getSetting('columnsEnabled', {}))); } catch(e) {}
      enabledColumns = Object.keys(colEnabled).length > 0
        ? allColumns.filter(k => colEnabled[k])
        : allColumns;
    } catch(e) { enabledColumns = DEFAULT_COLUMNS; }

    // Row height and font size
    const rowHeight = parseInt(getSetting('rowHeight', '24')) || 24;
    const fontSize = parseInt(getSetting('fontSize', '11')) || 11;
    document.body.style.fontSize = fontSize + 'px';
    const _rstyle = document.createElement('style');
    _rstyle.textContent = `.overlay-table td { height: ${rowHeight}px; min-height: ${rowHeight}px; }`;
    document.head.appendChild(_rstyle);

    // Session header items — filter by enabled state
    const DEFAULT_HEADER_ITEMS = ['trackName', 'airTemp', 'sof', 'timeRemain'];
    let headerItems;
    try {
      const allHeaderItems = parseSetting(getSetting('headerItems', DEFAULT_HEADER_ITEMS));
      let headerEnabled = {};
      try { headerEnabled = parseSetting(getSetting('headerEnabled', {})); } catch(e) {}
      headerItems = Object.keys(headerEnabled).length > 0
        ? allHeaderItems.filter(k => headerEnabled[k])
        : allHeaderItems;
    } catch(e) { headerItems = DEFAULT_HEADER_ITEMS; }

    function buildTableHead() {
      const labels = { pos: 'P', flag: '', number: '#', logo: '', name: 'Driver', license: 'Lic', irating: 'iR', gap: 'Gap' };
      return '<tr>' + enabledColumns.map(c => `<th>${labels[c] || ''}</th>`).join('') + '</tr>';
    }

    // Estimated iRating gain/loss from position-based Elo calculation
    const showIRatingGain = parseSetting(getSetting('showIRatingGain', true));

    const BRIDGE_URL = 'ws://localhost:9100';
    const MAX_AHEAD = parseInt(getSetting('carsAhead', '5')) || 5;
    const MAX_BEHIND = parseInt(getSetting('carsBehind', '5')) || 5;
    let ws = null;
    let bridgeConnected = false;
    let iracingConnected = false;
    const dataHandlers = {};

    const COUNTRY_TO_ISO = {
      'Afghanistan':'af','Albania':'al','Algeria':'dz','Andorra':'ad','Angola':'ao','Argentina':'ar',
      'Armenia':'am','Australia':'au','Austria':'at','Azerbaijan':'az','Bahamas':'bs','Bahrain':'bh',
      'Bangladesh':'bd','Barbados':'bb','Belarus':'by','Belgium':'be','Belize':'bz','Benin':'bj',
      'Bermuda':'bm','Bolivia':'bo','Bosnia and Herzegovina':'ba','Botswana':'bw','Brazil':'br',
      'Brunei':'bn','Bulgaria':'bg','Cambodia':'kh','Cameroon':'cm','Canada':'ca','Chile':'cl',
      'China':'cn','Colombia':'co','Costa Rica':'cr','Croatia':'hr','Cuba':'cu','Cyprus':'cy',
      'Czech Republic':'cz','Czechia':'cz','Denmark':'dk','Dominican Republic':'do','Ecuador':'ec',
      'Egypt':'eg','El Salvador':'sv','Estonia':'ee','Ethiopia':'et','Fiji':'fj','Finland':'fi',
      'France':'fr','Georgia':'ge','Germany':'de','Ghana':'gh','Greece':'gr','Guatemala':'gt',
      'Guernsey':'gg','Honduras':'hn','Hong Kong':'hk','Hungary':'hu','Iceland':'is','India':'in',
      'Indonesia':'id','Iran':'ir','Iraq':'iq','Ireland':'ie','Israel':'il','Italy':'it',
      'Jamaica':'jm','Japan':'jp','Jersey':'je','Jordan':'jo','Kazakhstan':'kz','Kenya':'ke',
      'Kuwait':'kw','Latvia':'lv','Lebanon':'lb','Libya':'ly','Lithuania':'lt','Luxembourg':'lu',
      'Macao':'mo','Macau':'mo','Malaysia':'my','Malta':'mt','Mauritius':'mu','Mexico':'mx',
      'Moldova':'md','Monaco':'mc','Mongolia':'mn','Montenegro':'me','Morocco':'ma','Mozambique':'mz',
      'Myanmar':'mm','Namibia':'na','Nepal':'np','Netherlands':'nl','New Zealand':'nz','Nicaragua':'ni',
      'Nigeria':'ng','North Macedonia':'mk','Norway':'no','Oman':'om','Pakistan':'pk','Panama':'pa',
      'Paraguay':'py','Peru':'pe','Philippines':'ph','Poland':'pl','Portugal':'pt','Puerto Rico':'pr',
      'Qatar':'qa','Romania':'ro','Russia':'ru','Saudi Arabia':'sa','Scotland':'gb-sct','Senegal':'sn',
      'Serbia':'rs','Singapore':'sg','Slovakia':'sk','Slovenia':'si','South Africa':'za',
      'South Korea':'kr','Spain':'es','Sri Lanka':'lk','Sweden':'se','Switzerland':'ch',
      'Taiwan':'tw','Thailand':'th','Trinidad and Tobago':'tt','Tunisia':'tn','Turkey':'tr',
      'Ukraine':'ua','United Arab Emirates':'ae','United Kingdom':'gb','United States':'us',
      'Uruguay':'uy','Uzbekistan':'uz','Venezuela':'ve','Vietnam':'vn','Wales':'gb-wls',
      'Zimbabwe':'zw',
    };

    function countryToFlag(country) {
      if (!country || country === 'None') return '';
      const iso = COUNTRY_TO_ISO[country];
      if (iso) return `<img class="flag-img" src="flags/${iso}.svg" onerror="this.style.display='none'" alt="${country}">`;
      // Unknown country (like "GLO") — show iRacing logo from sprite
      return `<span style="display:inline-block;width:16px;height:12px;background-image:url('logos/car-icons-sprite.png');background-size:${1024*(16/128)}px ${1024*(16/128)}px;background-position:0 0;vertical-align:middle;border-radius:1px;opacity:0.7;"></span>`;
    }

    function getManufacturer(carMake) {
      if (!carMake) return '';
      const lower = carMake.toLowerCase();
      if (lower.includes('corvette')) return 'chevrolet';
      if (lower.includes('mx-5') || lower.includes('mx5') || lower.includes('miata')) return 'mazda';
      const first = lower.split(' ')[0];
      const map = { amr: 'aston martin', 'aston': 'aston martin', 'vw': 'volkswagen' };
      return (map[first] || first);
    }

    // Sprite positions from car-icons-sprite.png (1024x1024, 8 cols x 128px)
    const BRAND_SPRITE = {
      'audi':       { x: 128, y: 0 },
      'bmw':        { x: 256, y: 0 },
      'mercedes':   { x: 384, y: 0 },
      'ford':       { x: 512, y: 0 },
      'chevrolet':  { x: 640, y: 0 },
      'ferrari':    { x: 768, y: 0 },
      'lamborghini':{ x: 896, y: 0 },
      'mclaren':    { x: 0, y: 128 },
      'porsche':    { x: 128, y: 128 },
      'dallara':    { x: 256, y: 128 },
      'aston martin':{ x: 384, y: 128 },
      'volkswagen': { x: 512, y: 128 },
      'honda':      { x: 640, y: 128 },
      'toyota':     { x: 896, y: 128 },
      'pontiac':    { x: 0, y: 256 },
      'mazda':      { x: 128, y: 256 },
      'renault':    { x: 384, y: 256 },
      'subaru':     { x: 512, y: 256 },
      'holden':     { x: 640, y: 256 },
      'lotus':      { x: 768, y: 256 },
      'cadillac':   { x: 896, y: 256 },
      'kia':        { x: 0, y: 384 },
      'lexus':      { x: 128, y: 384 },
      'nissan':     { x: 256, y: 384 },
      'riley':      { x: 384, y: 384 },
      'ruf':        { x: 640, y: 384 },
      'radical':    { x: 896, y: 384 },
      'hyundai':    { x: 128, y: 512 },
      'ligier':     { x: 256, y: 512 },
      'acura':      { x: 384, y: 512 },
      'buick':      { x: 512, y: 512 },
    };

    function getBrandLogoStyle(carMake) {
      const mfr = getManufacturer(carMake);
      const pos = BRAND_SPRITE[mfr];
      if (!pos) return '';
      const scale = 22 / 128;
      const bgX = -(pos.x * scale);
      const bgY = -(pos.y * scale);
      const bgSize = 1024 * scale;
      return `background-position: ${bgX}px ${bgY}px; background-size: ${bgSize}px ${bgSize}px;`;
    }


    function licenseColor(lic) {
      if (!lic) return '#888';
      const letter = lic.charAt(0).toUpperCase();
      return { A: '#0077cc', B: '#00aa00', C: '#ccaa00', D: '#cc6600', R: '#cc0000' }[letter] || '#888';
    }

    function formatIR(ir) {
      if (!ir || ir <= 0) return '--';
      return ir >= 1000 ? (ir / 1000).toFixed(1) + 'k' : String(ir);
    }

    function formatRelativeGap(gap) {
      const abs = Math.abs(gap).toFixed(2);
      return gap < 0 ? '-' + abs + 's' : '+' + abs + 's';
    }

    // Demo data
    const demoRelative = {
      playerCarIdx: 4,
      cars: [
        { carIdx: 0, carNumber: '1',  driverName: 'M. Verstappen', carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'A 4.99', country: 'NL', iRating: 7200, gap: -8.120, distGap: -0.09, position: 1, classPosition: 1, inPit: false, isPlayer: false },
        { carIdx: 1, carNumber: '44', driverName: 'L. Hamilton',   carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'A 3.50', country: 'GB', iRating: 6850, gap: -5.430, distGap: -0.06, position: 2, classPosition: 2, inPit: false, isPlayer: false },
        { carIdx: 2, carNumber: '16', driverName: 'C. Leclerc',    carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'A 2.10', country: 'MC', iRating: 6450, gap: -3.567, distGap: -0.04, position: 3, classPosition: 3, inPit: false, isPlayer: false },
        { carIdx: 3, carNumber: '44', driverName: 'L. Hamilton',   carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'B 3.21', country: 'GB', iRating: 6000, gap: -1.234, distGap: -0.014, position: 3, classPosition: 3, inPit: false, isPlayer: false },
        { carIdx: 4, carNumber: '99', driverName: 'You',           carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'B 1.80', country: 'PT', iRating: 3210, gap: 0,      distGap: 0,      position: 4, classPosition: 4, inPit: false, isPlayer: true  },
        { carIdx: 5, carNumber: '55', driverName: 'C. Sainz',      carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'C 4.00', country: 'ES', iRating: 5900, gap: 2.233,  distGap: 0.025,  position: 5, classPosition: 5, inPit: false, isPlayer: false },
        { carIdx: 6, carNumber: '4',  driverName: 'L. Norris',     carClass: 'IR18', carClassColor: '#cc0000', safetyRating: 'C 2.90', country: 'GB', iRating: 5600, gap: 4.566,  distGap: 0.051,  position: 6, classPosition: 6, inPit: true,  isPlayer: false },
      ]
    };

    function buildRelativeRow(d, gapClass, gapStr, isPlayerRow) {
      const pos = d.classPosition > 0 ? d.classPosition : (d.position > 0 ? d.position : '-');
      const flag = countryToFlag(d.country);
      const licColor = licenseColor(d.safetyRating || d.license);
      const licStr = d.safetyRating || d.license || '';
      const irStr = formatIR(d.iRating);
      const classColor = d.carClassColor || '#fff';
      const carBrand = d.carMake || '';
      const disconnCls = d.disconnected ? ' disconnected' : '';

      const numCell = `<span style="background:${classColor};color:#000;padding:1px 4px;border-radius:3px;font-size:9px;font-weight:800;font-family:'JetBrains Mono',monospace;">${d.carNumber || ''}</span>`;
      const licCell = licStr
        ? `<span style="background:${licColor};color:#fff;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:600;font-family:'JetBrains Mono',monospace;">${licStr}</span>`
        : `<span style="background:rgba(255,255,255,0.1);color:#fff;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:600;font-family:'JetBrains Mono',monospace;">--</span>`;
      const irChange = d.estIRatingChange || 0;
      const irChangeStr = showIRatingGain && irChange !== 0 ? `<span style="color:${irChange > 0 ? '#3ecf8e' : '#f04438'};font-size:8px;margin-left:3px;">${irChange > 0 ? '+' : ''}${irChange}</span>` : '';
      const irCell = `<span style="background:rgba(255,255,255,0.1);color:#fff;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:600;font-family:'JetBrains Mono',monospace;">${irStr}${irChangeStr}</span>`;

      const logoStyle = getBrandLogoStyle(carBrand);
      const logoImg = logoStyle ? `<span class="brand-logo" style="${logoStyle}"></span>` : '';
      const nameCell = `<div class="driver-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px">${d.driverName || ''}</div>`;

      if (isPlayerRow) {
        const cells = {
          pos: `<td class="mono" style="font-weight:700">${pos}</td>`,
          flag: `<td class="flag">${flag}</td>`,
          number: `<td>${numCell}</td>`,
          logo: `<td>${logoImg}</td>`,
          name: `<td>${nameCell}</td>`,
          license: `<td>${licCell}</td>`,
          irating: `<td>${irCell}</td>`,
          gap: `<td class="mono" style="font-size:10px">—</td>`,
        };
        return `<tr class="player-row">${enabledColumns.map(c => cells[c] || '').join('')}</tr>`;
      }

      const cells = {
        pos: `<td class="mono" style="font-weight:700;color:rgba(255,255,255,0.7)">${pos}</td>`,
        flag: `<td class="flag">${flag}</td>`,
        number: `<td>${numCell}</td>`,
        logo: `<td>${logoImg}</td>`,
        name: `<td>${nameCell}</td>`,
        license: `<td>${licCell}</td>`,
        irating: `<td>${irCell}</td>`,
        gap: `<td class="mono ${gapClass}" style="font-size:10px">${gapStr}</td>`,
      };
      return `<tr class="${disconnCls}">${enabledColumns.map(c => cells[c] || '').join('')}</tr>`;
    }

    function buildRelativeRows(data) {
      const { cars, focusCar } = data;
      // Center car: use focusCar from telemetry (the spectated/selected driver), fallback to finding in cars list
      const centerCar = focusCar || cars.find(c => c.isSpectated) || cars.find(c => c.isPlayer);
      // Positive distGap = car is AHEAD (further along track), negative = BEHIND
      const ahead = cars.filter(c => c.distGap > 0).slice(0, MAX_AHEAD).reverse();
      const behind = cars.filter(c => c.distGap < 0).slice(-MAX_BEHIND);

      const rows = [];
      for (const d of ahead) rows.push(buildRelativeRow(d, 'ahead', formatRelativeGap(-d.gap), false));
      rows.push(buildRelativeRow(centerCar || { position: 0, classPosition: 0, carNumber: '', driverName: 'You', country: '', safetyRating: '', iRating: 0, carClassColor: '#fff' }, '', '', true));
      for (const d of behind) rows.push(buildRelativeRow(d, 'behind', formatRelativeGap(-d.gap), false));

      return rows.join('');
    }

    function renderDemoRelative() {
      document.getElementById('relative-body').innerHTML = buildRelativeRows(demoRelative);
    }

    document.getElementById('relative-head').innerHTML = buildTableHead();
    renderDemoRelative();

    function connectBridge(channels) {
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { setTimeout(() => connectBridge(channels), 3000); return; }
      ws.onopen = () => {
        bridgeConnected = true;
        updateConnectionStatus();
        ws.send(JSON.stringify({ type: 'subscribe', channels }));
      };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'bridge-connected') { bridgeConnected = true; updateConnectionStatus(); }
          else if (msg.type === 'status') { iracingConnected = msg.iracing; updateConnectionStatus(); }
          else if (msg.type === 'data' && dataHandlers[msg.channel]) { dataHandlers[msg.channel](msg.data); }
        } catch(e) {}
      };
      ws.onclose = () => { bridgeConnected = false; iracingConnected = false; updateConnectionStatus(); setTimeout(() => connectBridge(channels), 3000); };
      ws.onerror = () => { ws.close(); };
    }

    function onData(ch, fn) { dataHandlers[ch] = fn; }

    function updateConnectionStatus() {
      const el = document.getElementById('connection-status');
      const dis = document.getElementById('overlay-disconnected');
      if (!bridgeConnected) {
        if (el) el.innerHTML = '<span class="status-dot demo"></span> Demo Mode';
        if (dis) dis.style.display = 'none';
      } else if (!iracingConnected) {
        if (el) el.innerHTML = '<span class="status-dot waiting"></span> Waiting';
        if (dis) { dis.textContent = 'Waiting for iRacing...'; dis.style.display = 'flex'; }
        document.getElementById('relative-body').innerHTML = '';
      } else {
        if (el) el.innerHTML = '<span class="status-dot connected"></span> Live';
        if (dis) dis.style.display = 'none';
        document.getElementById('relative-body').innerHTML = '';
      }
    }

    let demoCleared = false;

    onData('relative', data => {
      if (!data || !data.cars) return;
      if (!demoCleared) { demoCleared = true; }
      document.getElementById('relative-body').innerHTML = buildRelativeRows(data);
    });

    onData('session', data => {
      if (!data) return;
      const el = document.getElementById('session-header');
      if (!el || headerItems.length === 0) { if (el) el.style.display = 'none'; return; }

      const formatTime = (s) => {
        if (!s || s <= 0 || s > 86400) return '--:--';
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = Math.floor(s % 60);
        return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`;
      };
      const formatSOF = (v) => v >= 1000 ? (v/1000).toFixed(1) + 'k' : String(v);

      const items = {
        trackName: data.trackName || '',
        airTemp: data.airTemp ? data.airTemp.toFixed(1) + '°C air' : '',
        trackTemp: data.trackTemp ? data.trackTemp.toFixed(1) + '°C track' : '',
        humidity: data.humidity ? Math.round(data.humidity) + '% hum' : '',
        sof: data.sof ? 'SOF ' + formatSOF(data.sof) : '',
        timeRemain: 'Rem ' + formatTime(data.sessionTimeRemain),
        timeOfDay: 'ToD ' + formatTime(data.timeOfDay),
        skies: data.skies || '',
        incidents: data.incidentCount !== undefined ? 'Inc ' + data.incidentCount + 'x' : '',
      };

      const parts = headerItems.map(k => items[k]).filter(Boolean);
      el.innerHTML = parts.map(t => `<span>${t}</span>`).join('<span style="opacity:0.3">|</span>');
      el.style.display = parts.length > 0 ? 'flex' : 'none';
    });

    connectBridge(['relative', 'session']);

    try {
      const { ipcRenderer } = require('electron');
      ipcRenderer.on('lock-state', (event, locked) => {
        document.body.style.pointerEvents = locked ? 'none' : 'auto';
        const header = document.querySelector('.overlay-header');
        if (header) header.style.cursor = locked ? 'default' : 'move';
      });

      // Click-through: transparent areas pass clicks through, visible panel captures them
      let _mouseOverPanel = false;
      document.addEventListener('mousemove', (e) => {
        const panel = document.querySelector('.overlay-panel');
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const over = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
        if (over && !_mouseOverPanel) {
          _mouseOverPanel = true;
          ipcRenderer.send('set-ignore-mouse', false);
        } else if (!over && _mouseOverPanel) {
          _mouseOverPanel = false;
          ipcRenderer.send('set-ignore-mouse', true);
        }
      });
      // Fallback: reset when mouse leaves the window entirely
      document.addEventListener('mouseleave', () => {
        if (_mouseOverPanel) {
          _mouseOverPanel = false;
          ipcRenderer.send('set-ignore-mouse', true);
        }
      });
    } catch(e) {}
  </script>
</body>
</html>
