<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Driver Card</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; color: #e8e6f0; }
    .overlay-panel { background: rgba(12,13,20,0.88); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; backdrop-filter: blur(12px); overflow: hidden; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #3ecf8e; }
    .status-dot.waiting { background: #f79009; }
    .status-dot.demo { background: #f79009; }
    .card-body { display: flex; gap: 16px; padding: 14px 16px; }
    .helmet-area { display: flex; align-items: center; justify-content: center; width: 50px; flex-shrink: 0; }
    .helmet-icon { width: 40px; height: 40px; filter: brightness(0) invert(0.9); }
    .driver-info { flex: 1; min-width: 0; }
    .driver-name { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
    .driver-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .badge { padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace; white-space: nowrap; line-height: 1.3; }
    .badge-pos { background: #9146ff; color: #fff; }
    .badge-ir { background: rgba(255,255,255,0.1); color: #fff; }
    .badge-class { color: #fff; }
    .lap-times { display: flex; gap: 16px; }
    .lap-block { }
    .lap-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.35); }
    .lap-value { font-size: 15px; font-weight: 600; font-family: 'JetBrains Mono', monospace; color: rgba(255,255,255,0.85); }
    .country-flag { width: 18px; height: 13px; border-radius: 2px; vertical-align: middle; margin-right: 4px; }
  </style>
</head>
<body>
  <div class="overlay-panel">
    <div class="overlay-header">
      <span>DRIVER CARD</span>
      <span id="connection-status"><span class="status-dot demo"></span></span>
    </div>
    <div class="card-body">
      <div class="helmet-area">
        <img class="helmet-icon" id="helmet-icon" src="helmets/helmet.png" alt="">
      </div>
      <div class="driver-info">
        <div class="driver-name"><img class="country-flag" id="driver-flag" style="display:none" alt=""><span id="driver-name">--</span></div>
        <div class="driver-meta">
          <span class="badge badge-pos" id="driver-pos">P-</span>
          <span class="badge badge-pos-gain" id="driver-pos-gain" style="display:none;font-weight:700;font-size:11px;margin-left:2px"></span>
          <span class="badge badge-ir" id="driver-ir">--</span>
          <span class="badge badge-class" id="driver-class">--</span>
        </div>
        <div class="lap-times">
          <div class="lap-block">
            <div class="lap-label">Best</div>
            <div class="lap-value" id="driver-best">--</div>
          </div>
          <div class="lap-block">
            <div class="lap-label">Last</div>
            <div class="lap-value" id="driver-last">--</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Load settings for helmet style
    try {
      const fs = require('fs');
      const path = require('path');
      const os = require('os');
      const settingsFile = path.join(os.homedir(), 'Documents', 'Atleta Bridge', 'settings.json');
      if (fs.existsSync(settingsFile)) {
        const all = JSON.parse(fs.readFileSync(settingsFile, 'utf8'));
        const s = (all.overlayCustom && all.overlayCustom.drivercard) || {};
        if (s.helmetStyle === 'helmet2') {
          document.getElementById('helmet-icon').src = 'helmets/helmet2.png';
        }
      }
    } catch(e) {}

    const _fs2 = require('fs');
    const _logPath = require('path').join(require('os').homedir(), 'atleta-bridge.log');
    function log(msg) {
      const line = '[' + new Date().toISOString() + '] ' + msg + '\n';
      console.log(msg);
      try { _fs2.appendFileSync(_logPath, line); } catch(e) {}
    }

    const BRIDGE_URL = 'ws://localhost:9100';
    let ws = null;
    let bridgeConnected = false;
    let iracingConnected = false;
    const dataHandlers = {};

    function connectBridge(channels) {
      log('[DriverCard] Connecting to ' + BRIDGE_URL);
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { log('[DriverCard] WS error: ' + e.message); setTimeout(() => connectBridge(channels), 3000); return; }
      ws.onopen = () => { log('[DriverCard] Connected'); bridgeConnected = true; updateStatus(); ws.send(JSON.stringify({ type: 'subscribe', channels })); };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'bridge-connected') { log('[DriverCard] Bridge confirmed'); bridgeConnected = true; updateStatus(); }
          else if (msg.type === 'status') { log('[DriverCard] iRacing: ' + msg.iracing); iracingConnected = msg.iracing; updateStatus(); }
          else if (msg.type === 'data' && dataHandlers[msg.channel]) { dataHandlers[msg.channel](msg.data); }
        } catch(e) {}
      };
      ws.onclose = () => { log('[DriverCard] Disconnected'); bridgeConnected = false; iracingConnected = false; updateStatus(); setTimeout(() => connectBridge(channels), 3000); };
      ws.onerror = () => { log('[DriverCard] WS error'); ws.close(); };
    }
    function onData(ch, fn) { dataHandlers[ch] = fn; }
    function updateStatus() {
      const el = document.getElementById('connection-status');
      if (!bridgeConnected) { if (el) el.innerHTML = '<span class="status-dot demo"></span>'; }
      else if (!iracingConnected) { if (el) el.innerHTML = '<span class="status-dot waiting"></span>'; }
      else { if (el) el.innerHTML = '<span class="status-dot connected"></span>'; }
    }

    const COUNTRY_TO_ISO = {
      'Afghanistan':'af','Albania':'al','Algeria':'dz','Andorra':'ad','Angola':'ao','Argentina':'ar',
      'Armenia':'am','Australia':'au','Austria':'at','Azerbaijan':'az','Bahamas':'bs','Bahrain':'bh',
      'Bangladesh':'bd','Barbados':'bb','Belarus':'by','Belgium':'be','Belize':'bz','Benin':'bj',
      'Bermuda':'bm','Bolivia':'bo','Bosnia and Herzegovina':'ba','Botswana':'bw','Brazil':'br',
      'Brunei':'bn','Bulgaria':'bg','Cambodia':'kh','Cameroon':'cm','Canada':'ca','Chile':'cl',
      'China':'cn','Colombia':'co','Costa Rica':'cr','Croatia':'hr','Cuba':'cu','Cyprus':'cy',
      'Czech Republic':'cz','Czechia':'cz','Denmark':'dk','Dominican Republic':'do','Ecuador':'ec',
      'Egypt':'eg','El Salvador':'sv','Estonia':'ee','Ethiopia':'et','Fiji':'fj','Finland':'fi',
      'France':'fr','Georgia':'ge','Germany':'de','Ghana':'gh','Greece':'gr','Guatemala':'gt',
      'Guernsey':'gg','Honduras':'hn','Hong Kong':'hk','Hungary':'hu','Iceland':'is','India':'in',
      'Indonesia':'id','Iran':'ir','Iraq':'iq','Ireland':'ie','Israel':'il','Italy':'it',
      'Jamaica':'jm','Japan':'jp','Jersey':'je','Jordan':'jo','Kazakhstan':'kz','Kenya':'ke',
      'Kuwait':'kw','Latvia':'lv','Lebanon':'lb','Libya':'ly','Lithuania':'lt','Luxembourg':'lu',
      'Macao':'mo','Macau':'mo','Malaysia':'my','Malta':'mt','Mauritius':'mu','Mexico':'mx',
      'Moldova':'md','Monaco':'mc','Mongolia':'mn','Montenegro':'me','Morocco':'ma','Mozambique':'mz',
      'Myanmar':'mm','Namibia':'na','Nepal':'np','Netherlands':'nl','New Zealand':'nz','Nicaragua':'ni',
      'Nigeria':'ng','North Macedonia':'mk','Norway':'no','Oman':'om','Pakistan':'pk','Panama':'pa',
      'Paraguay':'py','Peru':'pe','Philippines':'ph','Poland':'pl','Portugal':'pt','Puerto Rico':'pr',
      'Qatar':'qa','Romania':'ro','Russia':'ru','Saudi Arabia':'sa','Scotland':'gb-sct','Senegal':'sn',
      'Serbia':'rs','Singapore':'sg','Slovakia':'sk','Slovenia':'si','South Africa':'za',
      'South Korea':'kr','Spain':'es','Sri Lanka':'lk','Sweden':'se','Switzerland':'ch',
      'Taiwan':'tw','Thailand':'th','Trinidad and Tobago':'tt','Tunisia':'tn','Turkey':'tr',
      'Ukraine':'ua','United Arab Emirates':'ae','United Kingdom':'gb','United States':'us',
      'Uruguay':'uy','Uzbekistan':'uz','Venezuela':'ve','Vietnam':'vn','Wales':'gb-wls','Zimbabwe':'zw',
    };

    function formatLapTime(t) {
      if (!t || t <= 0) return '--';
      const m = Math.floor(t / 60);
      const s = (t % 60).toFixed(3);
      return m > 0 ? m + ':' + s.padStart(6, '0') : s;
    }

    function formatIR(ir) {
      if (!ir || ir <= 0) return '--';
      return ir >= 1000 ? (ir / 1000).toFixed(1) + 'k' : String(ir);
    }

    onData('standings', data => {
      if (!data || !data.length) return;

      // Find focused driver
      const focused = data.find(d => d.isSpectated) || data.find(d => d.isPlayer);
      if (!focused) return;

      document.getElementById('driver-name').textContent = focused.driverName || '--';
      const posEl = document.getElementById('driver-pos');
      posEl.textContent = 'P' + (focused.classPosition || focused.position || '-');

      // Position gain/loss
      const posGainEl = document.getElementById('driver-pos-gain');
      if (posGainEl) {
        const gain = focused.positionGain || 0;
        if (gain > 0) {
          posGainEl.textContent = '\u25B2' + gain;
          posGainEl.style.color = '#3ecf8e';
          posGainEl.style.display = '';
        } else if (gain < 0) {
          posGainEl.textContent = '\u25BC' + Math.abs(gain);
          posGainEl.style.color = '#f04438';
          posGainEl.style.display = '';
        } else {
          posGainEl.style.display = 'none';
        }
      }

      document.getElementById('driver-ir').textContent = formatIR(focused.iRating);
      document.getElementById('driver-best').textContent = formatLapTime(focused.bestLap);
      document.getElementById('driver-last').textContent = formatLapTime(focused.lastLap);

      // Country flag
      const flagEl = document.getElementById('driver-flag');
      const iso = COUNTRY_TO_ISO[focused.country];
      if (iso) {
        flagEl.src = 'flags/' + iso + '.svg';
        flagEl.style.display = '';
      } else {
        flagEl.style.display = 'none';
      }

      // Class badge with color — use black text on light backgrounds
      const classEl = document.getElementById('driver-class');
      const classColor = (focused.carClassColor || '').replace(/\s/g, '').toLowerCase();
      const isLight = !classColor || classColor === '#ffffff' || classColor === '#fff' || classColor === 'rgb(255,255,255)';
      if (!focused.carClass) {
        classEl.style.display = 'none';
      } else {
        classEl.style.display = '';
        classEl.textContent = focused.carClass;
        classEl.style.background = focused.carClassColor || '#fff';
        classEl.style.color = isLight ? '#111' : '#fff';
      }

      // iRating change
      const irEl = document.getElementById('driver-ir');
      const change = focused.estIRatingChange || 0;
      if (change > 0) {
        irEl.textContent = formatIR(focused.iRating) + ' +' + change;
        irEl.style.color = '#3ecf8e';
      } else if (change < 0) {
        irEl.textContent = formatIR(focused.iRating) + ' ' + change;
        irEl.style.color = '#f04438';
      } else {
        irEl.textContent = formatIR(focused.iRating);
        irEl.style.color = '#fff';
      }
    });

    connectBridge(['standings']);

    // Drag + click-through handled by overlay-utils.js
  </script>
<script src="overlay-utils.js"></script>
</body>
</html>
