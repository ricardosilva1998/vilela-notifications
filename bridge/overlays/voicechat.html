<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voice Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; color: #e8e6f0; scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; }
    .overlay-panel { background: rgba(12,13,20,0.88); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; backdrop-filter: blur(12px); overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); flex-shrink: 0; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.idle { background: #5c5b6e; }
    .status-dot.listening { background: #f04438; animation: pulse 0.8s ease-in-out infinite; }
    .status-dot.processing { background: #f79009; }
    .status-dot.confirming { background: #3b82f6; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .mic-select { padding: 6px 8px; font-size: 10px; color: #8b8a9e; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-bottom: none; }
    .mic-select select { background: #0c0d14; color: #e8e6f0; border: 1px solid rgba(255,255,255,0.1); border-radius: 3px; padding: 2px 4px; font-size: 10px; max-width: 200px; }

    .message-log { flex: 1; overflow-y: auto; padding: 8px 12px; scrollbar-width: none; }
    .message-log::-webkit-scrollbar { display: none; }
    .msg-entry { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .msg-time { font-size: 9px; color: rgba(255,255,255,0.3); }
    .msg-target { font-size: 10px; font-weight: 600; color: #9146ff; margin-left: 6px; }
    .msg-target.all { color: #3ecf8e; }
    .msg-target.team { color: #f79009; }
    .msg-text { font-size: 12px; color: #e8e6f0; margin-top: 2px; }
    .msg-error { font-size: 11px; color: #f04438; padding: 6px 0; }

    .confirm-bar { flex-shrink: 0; padding: 10px 12px; background: rgba(59,130,246,0.1); border-top: 1px solid rgba(59,130,246,0.3); display: none; }
    .confirm-bar.visible { display: block; }
    .confirm-target { font-size: 11px; color: #3b82f6; font-weight: 600; }
    .confirm-text { font-size: 12px; color: #e8e6f0; margin: 4px 0; word-break: break-word; }
    .confirm-hint { font-size: 9px; color: rgba(255,255,255,0.35); }

    .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; color: rgba(255,255,255,0.25); font-size: 11px; padding: 20px; line-height: 1.6; }

    .stop-bar { flex-shrink: 0; padding: 8px 12px; background: rgba(240,68,56,0.1); border-top: 1px solid rgba(240,68,56,0.3); display: none; text-align: center; }
    .stop-bar.visible { display: block; }
    .stop-btn { background: #f04438; color: #fff; border: none; border-radius: 6px; padding: 8px 20px; font-size: 12px; font-weight: 600; cursor: pointer; width: 100%; }
    .stop-btn:hover { background: #d03830; }
  </style>
</head>
<body>
  <div class="overlay-panel">
    <div class="overlay-header">
      <span><span class="status-dot idle" id="status-dot"></span> VOICE CHAT</span>
      <span id="status-label" style="font-size:9px; color:rgba(255,255,255,0.35);">Idle</span>
    </div>
    <div class="mic-select">
      Mic: <select id="mic-dropdown"><option value="">Loading...</option></select>
    </div>
    <div style="padding:6px 10px; font-size:9px; color:rgba(255,255,255,0.35); background:rgba(255,255,255,0.02); border-bottom:1px solid rgba(255,255,255,0.04); line-height:1.5;">
      <span style="color:#3ecf8e;">All:</span> "all [text]"<br>
      <span style="color:#9146ff;">PM:</span> "number [#] [text]" or "[name] [text]"<br>
      <span style="color:#f79009;">Team:</span> "team [text]"
    </div>
    <div class="message-log" id="message-log">
      <div class="empty-state" id="empty-state">
        Press push-to-talk, speak, then click Stop Recording.
      </div>
    </div>
    <div class="stop-bar" id="stop-bar">
      <button class="stop-btn" onclick="manualStop()">Stop Recording</button>
    </div>
    <div class="confirm-bar" id="confirm-bar">
      <div class="confirm-target" id="confirm-target"></div>
      <div class="confirm-text" id="confirm-text"></div>
      <div class="confirm-hint">Enter to send · Esc to cancel</div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const fs = require('fs');
    const path = require('path');
    const os = require('os');

    // Log to the same file as the main process
    const logPath = path.join(os.homedir(), 'atleta-bridge.log');
    function log(msg) {
      const line = `[${new Date().toISOString()}] [VoiceOverlay] ${msg}\n`;
      console.log(msg);
      try { fs.appendFileSync(logPath, line); } catch(e) {}
    }

    let state = 'idle';
    let drivers = [];
    let pendingCommand = null;
    let selectedDeviceId = '';

    // Audio recording
    let mediaStream = null;
    let audioContext = null;
    let processor = null;
    let audioChunks = [];

    // ─── Mic Device Enumeration ─────────────────────────────
    async function loadMicDevices() {
      const dropdown = document.getElementById('mic-dropdown');
      try {
        // Request permission first (needed to see device labels)
        await navigator.mediaDevices.getUserMedia({ audio: true }).then(s => s.getTracks().forEach(t => t.stop()));
        const devices = await navigator.mediaDevices.enumerateDevices();
        const mics = devices.filter(d => d.kind === 'audioinput');
        dropdown.innerHTML = mics.map(d =>
          `<option value="${d.deviceId}">${d.label || 'Microphone ' + d.deviceId.substring(0, 8)}</option>`
        ).join('');
        if (mics.length > 0) selectedDeviceId = mics[0].deviceId;
        dropdown.onchange = () => { selectedDeviceId = dropdown.value; };
        log('[VoiceChat] Found', mics.length, 'microphones');
      } catch(e) {
        dropdown.innerHTML = '<option value="">Mic access denied</option>';
        addError('Mic access denied: ' + e.message);
        log('[VoiceChat] Mic enumeration error:', e);
      }
    }
    loadMicDevices();

    // ─── Audio Recording (WAV capture) ──────────────────────
    async function startRecording() {
      try {
        const constraints = { audio: selectedDeviceId ? { deviceId: { exact: selectedDeviceId } } : true };
        mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
        audioContext = new AudioContext({ sampleRate: 16000 });
        const source = audioContext.createMediaStreamSource(mediaStream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        audioChunks = [];

        processor.onaudioprocess = (e) => {
          const data = e.inputBuffer.getChannelData(0);
          audioChunks.push(new Float32Array(data));
        };

        source.connect(processor);
        processor.connect(audioContext.destination);
        setState('listening');
        document.getElementById('stop-bar').classList.add('visible');
        log('[VoiceChat] Recording started, device:', selectedDeviceId);
      } catch(e) {
        addError('Mic error: ' + e.message);
        setState('idle');
        log('[VoiceChat] Recording error:', e);
      }
    }

    function manualStop() {
      log('Manual stop button pressed');
      ipcRenderer.send('voice-manual-stop'); // Tell main process recording stopped
      stopRecording();
    }

    function stopRecording() {
      document.getElementById('stop-bar').classList.remove('visible');
      if (!audioContext) return;
      try {
        processor.disconnect();
        mediaStream.getTracks().forEach(t => t.stop());
        audioContext.close();
      } catch(e) {}

      if (audioChunks.length === 0) {
        setState('idle');
        return;
      }

      setState('processing');

      // Convert to WAV
      const wavBuffer = encodeWAV(audioChunks, 16000);
      const tempDir = path.join(os.tmpdir(), 'atleta-voice');
      if (!fs.existsSync(tempDir)) fs.mkdirSync(tempDir, { recursive: true });
      const wavPath = path.join(tempDir, 'ptt_' + Date.now() + '.wav');
      fs.writeFileSync(wavPath, Buffer.from(wavBuffer));
      console.log('[VoiceChat] WAV saved:', wavPath, '(' + wavBuffer.byteLength + ' bytes)');

      // Send to main process for transcription
      ipcRenderer.send('voice-wav-ready', wavPath);

      audioChunks = [];
      audioContext = null;
      processor = null;
      mediaStream = null;
    }

    function encodeWAV(chunks, sampleRate) {
      // Merge all chunks
      let totalLength = 0;
      for (const c of chunks) totalLength += c.length;
      const merged = new Float32Array(totalLength);
      let offset = 0;
      for (const c of chunks) { merged.set(c, offset); offset += c.length; }

      // Convert to 16-bit PCM
      const pcm = new Int16Array(merged.length);
      for (let i = 0; i < merged.length; i++) {
        const s = Math.max(-1, Math.min(1, merged[i]));
        pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }

      // Build WAV header
      const buffer = new ArrayBuffer(44 + pcm.length * 2);
      const view = new DataView(buffer);
      const writeStr = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };

      writeStr(0, 'RIFF');
      view.setUint32(4, 36 + pcm.length * 2, true);
      writeStr(8, 'WAVE');
      writeStr(12, 'fmt ');
      view.setUint32(16, 16, true); // chunk size
      view.setUint16(20, 1, true); // PCM
      view.setUint16(22, 1, true); // mono
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true); // byte rate
      view.setUint16(32, 2, true); // block align
      view.setUint16(34, 16, true); // bits per sample
      writeStr(36, 'data');
      view.setUint32(40, pcm.length * 2, true);

      const pcmBytes = new Uint8Array(buffer, 44);
      const pcmView = new Uint8Array(pcm.buffer);
      pcmBytes.set(pcmView);

      return buffer;
    }

    // ─── WebSocket for driver list ──────────────────────────
    const BRIDGE_URL = 'ws://localhost:9100';
    let ws = null;
    function connectBridge() {
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { setTimeout(connectBridge, 3000); return; }
      ws.onopen = () => { ws.send(JSON.stringify({ type: 'subscribe', channels: ['standings'] })); };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'data' && msg.channel === 'standings') {
            drivers = (msg.data || []).filter(d => !d.isPlayer && d.driverName && d.driverName !== 'Pace Car');
          }
        } catch(e) {}
      };
      ws.onclose = () => { setTimeout(connectBridge, 3000); };
      ws.onerror = () => { ws.close(); };
    }
    connectBridge();

    // ─── UI ─────────────────────────────────────────────────
    function setState(s) {
      state = s;
      document.getElementById('status-dot').className = 'status-dot ' + s;
      const labels = { idle: 'Idle', listening: 'Listening...', processing: 'Processing...', confirming: 'Confirm' };
      document.getElementById('status-label').textContent = labels[s] || s;
    }
    function addMessage(targetLabel, targetType, text) {
      const msgLog = document.getElementById('message-log');
      const empty = document.getElementById('empty-state'); if (empty) empty.remove();
      const entry = document.createElement('div'); entry.className = 'msg-entry';
      const now = new Date();
      const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      entry.innerHTML = `<span class="msg-time">${time}</span><span class="msg-target ${targetType}">${targetLabel}</span><div class="msg-text">${escapeHtml(text)}</div>`;
      msgLog.appendChild(entry); msgLog.scrollTop = msgLog.scrollHeight;
    }
    function addError(text) {
      log('ERROR: ' + text);
      const msgLog = document.getElementById('message-log');
      const empty = document.getElementById('empty-state'); if (empty) empty.remove();
      const entry = document.createElement('div'); entry.className = 'msg-error'; entry.textContent = text;
      msgLog.appendChild(entry); msgLog.scrollTop = msgLog.scrollHeight;
    }
    function showConfirm(targetLabel, text) {
      document.getElementById('confirm-target').textContent = targetLabel;
      document.getElementById('confirm-text').textContent = '"' + text + '"';
      document.getElementById('confirm-bar').classList.add('visible');
    }
    function hideConfirm() { document.getElementById('confirm-bar').classList.remove('visible'); pendingCommand = null; }
    function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ─── Fuzzy Matching ─────────────────────────────────────
    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) for (let j = 1; j <= n; j++)
        dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
      return dp[m][n];
    }
    function matchDriver(words) {
      if (!drivers.length) return null;
      let bestMatch = null, bestScore = Infinity, bestWordsUsed = 0;
      for (let len = Math.min(3, words.length); len >= 1; len--) {
        const spoken = words.slice(0, len).join(' ').toLowerCase();
        for (const driver of drivers) {
          const full = driver.driverName.toLowerCase();
          for (const candidate of [full, full.split(' ')[0], full.split(' ').slice(-1)[0]]) {
            const score = levenshtein(spoken, candidate) / Math.max(spoken.length, candidate.length);
            if (score < bestScore && score < 0.45) { bestScore = score; bestMatch = driver; bestWordsUsed = len; }
          }
        }
      }
      return bestMatch ? { driver: bestMatch, wordsUsed: bestWordsUsed } : null;
    }

    // ─── Voice Parsing ──────────────────────────────────────
    function cleanPunctuation(str) {
      // Whisper adds commas, periods, etc. — strip them for keyword matching
      return str.replace(/[.,!?;:'"]/g, '').replace(/\s+/g, ' ').trim();
    }

    function parseVoiceCommand(rawText) {
      let text = cleanPunctuation(rawText).toLowerCase();
      if (text.startsWith('message ')) text = text.substring(8).trim();

      // For all/team, extract everything after the keyword
      if (text.startsWith('all ') || text === 'all') {
        const msg = text.substring(4).trim();
        if (!msg) return { error: 'Say "all" followed by your message' };
        return { command: msg, targetLabel: 'To: All', targetType: 'all', text: msg };
      }
      if (text.startsWith('team ') || text === 'team') {
        const msg = text.substring(5).trim();
        if (!msg) return { error: 'Say "team" followed by your message' };
        return { command: '/team ' + msg, targetLabel: 'To: Team', targetType: 'team', text: msg };
      }

      // "number X [text]" — send to car number X directly
      const numMatch = text.match(/^(?:number\s+)?(\d+)\s+(.+)/);
      if (numMatch) {
        const carNum = numMatch[1];
        const msg = numMatch[2];
        // Find driver name for display
        const driver = drivers.find(d => String(d.carNumber) === carNum);
        const driverLabel = driver ? driver.driverName + ' #' + carNum : 'Car #' + carNum;
        return { command: '/#' + carNum + ' ' + msg, targetLabel: 'To: ' + driverLabel + ' (private)', targetType: '', text: msg };
      }

      // Try fuzzy driver name matching
      const words = text.split(/\s+/);
      const match = matchDriver(words);
      if (match) {
        const msg = words.slice(match.wordsUsed).join(' ');
        if (!msg) return { error: 'No message text after driver name' };
        const carNum = match.driver.carNumber || '0';
        return { command: '/#' + carNum + ' ' + msg, targetLabel: 'To: ' + match.driver.driverName + ' #' + carNum + ' (private)', targetType: '', text: msg };
      }
      return { error: 'No driver found. Try "number [#] [text]" or "all [text]"' };
    }
    function processTranscript(transcript) {
      if (!transcript) { addError('No speech detected'); setState('idle'); return; }
      setState('processing');
      const result = parseVoiceCommand(transcript);
      if (result.error) { addError(result.error); setState('idle'); return; }
      pendingCommand = result;
      showConfirm(result.targetLabel, result.text);
      setState('confirming');
    }

    // ─── Keyboard / IPC ─────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (state === 'confirming') {
        if (e.key === 'Enter') { e.preventDefault(); if (pendingCommand) { ipcRenderer.send('voice-send-chat', { command: pendingCommand.command }); addMessage(pendingCommand.targetLabel, pendingCommand.targetType, pendingCommand.text); hideConfirm(); setState('idle'); } }
        else if (e.key === 'Escape') { e.preventDefault(); hideConfirm(); setState('idle'); }
      }
    });

    ipcRenderer.on('voice-start-recording', () => {
      log('IPC: voice-start-recording, state=' + state);
      if (state === 'confirming' || state === 'processing') return;
      startRecording();
    });
    ipcRenderer.on('voice-stop-recording', () => {
      log('IPC: voice-stop-recording, state=' + state + ', chunks=' + audioChunks.length);
      stopRecording();
    });
    ipcRenderer.on('voice-transcript', (event, text) => { processTranscript(text); });
    ipcRenderer.on('voice-error', (event, err) => { addError('Speech error: ' + err); setState('idle'); });
    ipcRenderer.on('voice-send-result', (event, r) => { if (!r.success) addError('Failed: ' + (r.reason || 'unknown')); });
    ipcRenderer.on('voice-settings-update', () => {});
    ipcRenderer.on('lock-state', (event, locked) => {
      document.body.style.pointerEvents = locked ? 'none' : 'auto';
      document.querySelector('.overlay-header').style.cursor = locked ? 'default' : 'move';
    });

    // Custom window dragging via IPC (bypasses transparent window limitations)
    let _dragging = false;
    let _dragStartX = 0, _dragStartY = 0;
    const dragHeader = document.querySelector('.overlay-header');
    if (dragHeader) {
      dragHeader.style.cursor = 'move';
      dragHeader.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        _dragging = true;
        _dragStartX = e.screenX;
        _dragStartY = e.screenY;
        e.preventDefault();
      });
    }
    document.addEventListener('mousemove', (e) => {
      if (!_dragging) return;
      const dx = e.screenX - _dragStartX;
      const dy = e.screenY - _dragStartY;
      _dragStartX = e.screenX;
      _dragStartY = e.screenY;
      ipcRenderer.send('drag-overlay', dx, dy);
    });
    document.addEventListener('mouseup', () => { _dragging = false; });

    // Click-through: transparent areas pass clicks through, visible panel captures them
    let _mouseOverPanel = false;
    document.addEventListener('mousemove', (e) => {
      const panel = document.querySelector('.overlay-panel');
      if (!panel) return;
      const r = panel.getBoundingClientRect();
      const over = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
      if (over && !_mouseOverPanel) {
        _mouseOverPanel = true;
        ipcRenderer.send('set-ignore-mouse', false);
      } else if (!over && _mouseOverPanel) {
        _mouseOverPanel = false;
        ipcRenderer.send('set-ignore-mouse', true);
      }
    });
    // Fallback: reset when mouse leaves the window entirely
    document.addEventListener('mouseleave', () => {
      if (_mouseOverPanel) {
        _mouseOverPanel = false;
        ipcRenderer.send('set-ignore-mouse', true);
      }
    });

    // ─── Gamepad Support ────────────────────────────────────
    // Gamepad API only works in renderer (browser context)
    let gamepadPttIndex = null;
    let gamepadPttButton = null;
    let gamepadPttWasPressed = false;
    let gamepadCaptureMode = false;

    // Load saved gamepad PTT from settings
    try {
      const _settingsFile = path.join(os.homedir(), 'Documents', 'Atleta Bridge', 'settings.json');
      if (fs.existsSync(_settingsFile)) {
        const _all = JSON.parse(fs.readFileSync(_settingsFile, 'utf8'));
        const _ptt = _all.voiceChat && _all.voiceChat.pushToTalkKey;
        if (_ptt && _ptt.type === 'gamepad') {
          gamepadPttIndex = _ptt.gamepadIndex;
          gamepadPttButton = _ptt.button;
          log('Gamepad PTT loaded: pad ' + gamepadPttIndex + ' btn ' + gamepadPttButton);
        }
      }
    } catch(e) {}

    // Capture mode — detect any gamepad button press
    ipcRenderer.on('voice-capture-gamepad-start', () => {
      gamepadCaptureMode = true;
      log('Gamepad capture mode started');
    });

    // Poll gamepads every 50ms
    setInterval(() => {
      const gamepads = navigator.getGamepads();
      if (!gamepads) return;

      for (let gi = 0; gi < gamepads.length; gi++) {
        const gp = gamepads[gi];
        if (!gp) continue;

        for (let bi = 0; bi < gp.buttons.length; bi++) {
          const btn = gp.buttons[bi];
          const pressed = btn.pressed || btn.value > 0.5;

          // Capture mode — first button press gets assigned
          if (gamepadCaptureMode && pressed) {
            gamepadCaptureMode = false;
            gamepadPttIndex = gi;
            gamepadPttButton = bi;
            const name = (gp.id || 'Gamepad ' + gi).substring(0, 25) + ' Btn ' + bi;
            const keyData = { type: 'gamepad', gamepadIndex: gi, button: bi, name };
            ipcRenderer.send('voice-gamepad-captured', keyData);
            log('Gamepad captured: ' + name);
            return;
          }
        }
      }

      // PTT mode — check if assigned button is pressed
      if (gamepadPttIndex !== null && gamepadPttButton !== null) {
        const gp = gamepads[gamepadPttIndex];
        if (gp && gp.buttons[gamepadPttButton]) {
          const pressed = gp.buttons[gamepadPttButton].pressed || gp.buttons[gamepadPttButton].value > 0.5;
          if (pressed && !gamepadPttWasPressed) {
            gamepadPttWasPressed = true;
            ipcRenderer.send('voice-gamepad-ptt', true);
          } else if (!pressed && gamepadPttWasPressed) {
            gamepadPttWasPressed = false;
            // Don't send release — we use toggle mode
          }
        }
      }
    }, 50);

    // Update gamepad settings when changed from control panel
    ipcRenderer.on('voice-settings-update', (event, s) => {
      if (s && s.pushToTalkKey && s.pushToTalkKey.type === 'gamepad') {
        gamepadPttIndex = s.pushToTalkKey.gamepadIndex;
        gamepadPttButton = s.pushToTalkKey.button;
      }
    });
  </script>
</body>
</html>
