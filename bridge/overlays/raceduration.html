<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Race Duration</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; color: #e8e6f0; }
    .overlay-panel { background: rgba(12,13,20,0.85); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; backdrop-filter: blur(12px); overflow: hidden; }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .status-dot.connected { background: #3ecf8e; }
    .status-dot.waiting { background: #f79009; }
    .status-dot.demo { background: #f79009; }
    .race-info { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 10px 14px; }
    .info-block { text-align: center; }
    .info-value { font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono', 'Consolas', monospace; color: #fff; }
    .info-label { font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .divider { width: 1px; height: 28px; background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <div class="overlay-panel">
    <div class="overlay-header">
      <span>RACE DURATION</span>
      <span id="connection-status"><span class="status-dot demo"></span></span>
    </div>
    <div class="race-info">
      <div class="info-block">
        <div class="info-value" id="time-remain">--:--</div>
        <div class="info-label">Time Left</div>
      </div>
      <div class="divider"></div>
      <div class="info-block">
        <div class="info-value" id="laps-remain">--</div>
        <div class="info-label">Laps Left <span id="focus-class" style="color:rgba(255,255,255,0.5);text-transform:none;letter-spacing:0;"></span></div>
      </div>
    </div>
  </div>

  <script>
    const BRIDGE_URL = 'ws://localhost:9100';
    let ws = null;
    let bridgeConnected = false;
    let iracingConnected = false;
    const dataHandlers = {};

    function connectBridge(channels) {
      try { ws = new WebSocket(BRIDGE_URL); } catch(e) { setTimeout(() => connectBridge(channels), 3000); return; }
      ws.onopen = () => { bridgeConnected = true; updateStatus(); ws.send(JSON.stringify({ type: 'subscribe', channels })); };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'bridge-connected') { bridgeConnected = true; updateStatus(); }
          else if (msg.type === 'status') { iracingConnected = msg.iracing; updateStatus(); }
          else if (msg.type === 'data' && dataHandlers[msg.channel]) { dataHandlers[msg.channel](msg.data); }
        } catch(e) {}
      };
      ws.onclose = () => { bridgeConnected = false; iracingConnected = false; updateStatus(); setTimeout(() => connectBridge(channels), 3000); };
      ws.onerror = () => { ws.close(); };
    }
    function onData(ch, fn) { dataHandlers[ch] = fn; }
    function updateStatus() {
      const el = document.getElementById('connection-status');
      if (!bridgeConnected) { if (el) el.innerHTML = '<span class="status-dot demo"></span>'; }
      else if (!iracingConnected) { if (el) el.innerHTML = '<span class="status-dot waiting"></span>'; }
      else { if (el) el.innerHTML = '<span class="status-dot connected"></span>'; }
    }

    function formatTime(s) {
      if (!s || s <= 0 || s > 86400) return '--:--';
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = Math.floor(s % 60);
      return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`;
    }

    // Track leader lap times per class
    let _focusClass = '';
    let _leaderBestLap = {};

    onData('session', data => {
      if (!data) return;
      const timeEl = document.getElementById('time-remain');
      const lapsEl = document.getElementById('laps-remain');

      // Time remaining
      const timeRemain = data.sessionTimeRemain || 0;
      timeEl.textContent = formatTime(timeRemain);

      // Color: green > 10min, yellow 5-10min, red < 5min
      if (timeRemain > 600) timeEl.style.color = '#3ecf8e';
      else if (timeRemain > 300) timeEl.style.color = '#f7c948';
      else if (timeRemain > 0) timeEl.style.color = '#f04438';
      else timeEl.style.color = '#fff';

      // Laps remaining from session (lap-based race)
      const sessionLaps = data.sessionLapsRemain || 0;
      if (sessionLaps > 0 && sessionLaps < 32767) {
        lapsEl.textContent = sessionLaps;
        return;
      }

      // Timed race: estimate laps from leader's pace
      if (_focusClass && _leaderBestLap[_focusClass] > 0 && timeRemain > 0) {
        const estLaps = Math.ceil(timeRemain / _leaderBestLap[_focusClass]) + 1;
        lapsEl.textContent = '~' + estLaps;
      } else {
        lapsEl.textContent = '--';
      }
    });

    onData('standings', data => {
      if (!data || !data.length) return;

      // Find focused driver's class
      const focused = data.find(d => d.isSpectated) || data.find(d => d.isPlayer);
      if (focused) {
        _focusClass = focused.carClass || '';
        const classEl = document.getElementById('focus-class');
        if (classEl) classEl.textContent = _focusClass ? '(' + _focusClass + ')' : '';
      }

      // Track best lap of class leader (CP1) for each class
      const classLeaders = {};
      data.forEach(d => {
        const cls = d.carClass || '';
        if (!cls) return;
        if (!classLeaders[cls] || d.classPosition < classLeaders[cls].classPosition) {
          classLeaders[cls] = d;
        }
      });
      Object.entries(classLeaders).forEach(([cls, leader]) => {
        if (leader.bestLap > 0) _leaderBestLap[cls] = leader.bestLap;
      });
    });

    connectBridge(['session', 'standings']);

    // Drag support
    try {
      const { ipcRenderer } = require('electron');
      ipcRenderer.on('lock-state', (event, locked) => {
        document.body.style.pointerEvents = locked ? 'none' : 'auto';
      });
      let _dragging = false, _dragStartX = 0, _dragStartY = 0;
      const dragHeader = document.querySelector('.overlay-header');
      if (dragHeader) {
        dragHeader.style.cursor = 'move';
        dragHeader.addEventListener('mousedown', (e) => {
          if (e.button !== 0) return;
          _dragging = true;
          _dragStartX = e.screenX;
          _dragStartY = e.screenY;
          e.preventDefault();
        });
      }
      document.addEventListener('mousemove', (e) => {
        if (!_dragging) return;
        const dx = e.screenX - _dragStartX;
        const dy = e.screenY - _dragStartY;
        _dragStartX = e.screenX;
        _dragStartY = e.screenY;
        ipcRenderer.send('drag-overlay', dx, dy);
      });
      document.addEventListener('mouseup', () => { _dragging = false; });
      document.addEventListener('mouseleave', () => { _dragging = false; });
    } catch(e) {}
  </script>
</body>
</html>
